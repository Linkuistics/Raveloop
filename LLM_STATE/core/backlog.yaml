- id: add-ravel-lite-rb-homebrew-formula-to-linkuistics-homebrew-taps
  title: Ship bottled Homebrew install via cargo-dist (no cargo build on user's machine)
  category: infra
  status: done
  dependencies: []
  description: |
    Ship `brew install linkuistics/taps/ravel-lite` as a **bottled install** — no Rust toolchain required on the user's machine. Mirrors the approach being adopted in the sibling project at `/Users/antony/Development/mdformat/`, which is solving the same problem at the same time with the same tooling; whichever lands first sets the concrete pattern.

    ## Approach

    Use [cargo-dist](https://opensource.axo.dev/cargo-dist/) to drive a release pipeline that produces pre-built binaries on version tags and publishes a Homebrew formula that installs those binaries directly.

    ### Concrete pieces

    - **`cargo-dist` config** in `Cargo.toml` (or `dist-workspace.toml`) declaring the release targets — at minimum `aarch64-apple-darwin` and `x86_64-apple-darwin`; Linux targets (`x86_64-unknown-linux-gnu`, `aarch64-unknown-linux-gnu`) if the formula should also serve Linux brew users.
    - **GitHub Actions workflow** (generated by `cargo dist init`) that fires on `v*` tags: builds per-target binaries, creates a GitHub release with the tarballs + checksums, and produces a Homebrew formula artifact.
    - **Homebrew formula** at `linkuistics/homebrew-taps/Formula/ravel-lite.rb` — a *bottle-style* formula whose `url` points at the GitHub release tarball for the user's platform, declares SHA256s, and has NO `depends_on "rust"`. Installation is a tarball extract into `#{prefix}/bin`, not a cargo build. cargo-dist can generate this formula as part of the release pipeline and the pipeline can open a PR (or direct commit) to the homebrew-taps repo.
    - **Release cadence**: continue using `cargo-release` to cut versions and push tags; the tag push triggers the cargo-dist workflow which handles everything downstream.

    ## Out of scope / non-goals

    - No from-source fallback in the formula. If a user needs a custom build they can `cargo install --path .` from a clone — the formula is specifically the bottled path.
    - No cross-compilation gymnastics beyond what cargo-dist provides out of the box. If a target is hard, drop it.

    ## Verification

    1. Tag a test release (e.g. `v0.0.0-test1`) and confirm the workflow produces per-target tarballs and an updated `ravel-lite.rb`.
    2. On a clean macOS machine (or fresh Homebrew prefix), run `brew install linkuistics/taps/ravel-lite` and confirm it installs without invoking a cargo build — verify install time is on the order of seconds, not minutes.
    3. `ravel-lite --version` on the installed binary prints the crate version and matches the git tag.

    ## Coordination note

    `/Users/antony/Development/mdformat/` is solving this same problem concurrently. Before starting, check mdformat's state — if cargo-dist is already wired up there, copy its shape. If not, coordinate design choices (target list, formula generation strategy, taps repo workflow) with the mdformat task so both projects converge on one pattern.

    ## Depends on

    Nothing blocking, but the dependent task `integrate-testanyware-vm-for-capturing-interactive-ravel-lite-commands` assumes a clean `brew install` inside a VM — landing a bottled install makes VM provisioning near-instant, which matters for that task's viability.
  results: |
    ## What was done

    Wired `dist` (formerly `cargo-dist`) for tag-driven, bottle-style
    Homebrew installation via `Linkuistics/homebrew-taps`.

    ### Cargo.toml

    - Added `repository`, `homepage`, `license` to `[package]` (cargo-dist
      refuses to publish a Homebrew formula without these — `homepage` was
      surfaced as a `dist plan` warning until added).
    - Added `[profile.dist]` (release + `lto = "thin"`, the cargo-dist
      default).
    - Added `[workspace.metadata.dist]` declaring the four release targets
      (`aarch64-apple-darwin`, `x86_64-apple-darwin`,
      `aarch64-unknown-linux-gnu`, `x86_64-unknown-linux-gnu`), the
      `homebrew` installer, the tap repository
      (`Linkuistics/homebrew-taps`), the formula name (`ravel-lite`), and
      the `homebrew` publish job. Pre-releases are excluded from the tap.
      No `shell`/`powershell` installers — task scope is bottled brew only.

    ### .github/workflows/release.yml

    - Generated by `dist init --yes` (343 lines, autogen header preserved
      for round-trip safety).
    - Trigger: `push.tags: '**[0-9]+.[0-9]+.[0-9]+*'` — matches any
      semver-shaped tag (so `cargo release patch --execute` flows directly
      into a release run).
    - `publish-homebrew-formula` job (line 281) checks out
      `Linkuistics/homebrew-taps` using `${{ secrets.HOMEBREW_TAP_TOKEN }}`
      and updates the formula in place.
    - Final announcement gates on the homebrew job succeeding (or
      skipping). PR pushes also fire the workflow as a smoke check (no
      publish step).

    ### README.md

    - Rewrote the `## Releasing` section to describe the new pipeline
      (cargo-release for the tag → dist for the build → tap for the
      formula) and added a `### Release pipeline (dist) prerequisites`
      subsection covering:
      - Creating the `Linkuistics/homebrew-taps` repository.
      - Generating a GitHub PAT with `repo` scope and write access.
      - Adding the token as the `HOMEBREW_TAP_TOKEN` repository secret on
        `Linkuistics/Ravel-Lite`.
      - Local commands: `dist plan` to dry-run, `dist init --yes` to
        regenerate the workflow after editing the metadata block.

    ### Cargo.toml metadata block — note for future editors

    `dist init --yes` rewrites the `[workspace.metadata.dist]` block in
    canonical form on every run, dropping any in-block comments. So
    explanatory prose for that block lives in README's "Release pipeline
    prerequisites" section, not in Cargo.toml comments — the README is
    durable across regenerations.

    ## Verification

    In-session:

    - `dist init --yes`: clean.
    - `dist plan`: clean (after `homepage` added). Output lists all four
      per-target tarballs, the `ravel-lite.rb` formula, checksums, and a
      source archive.
    - `cargo check`: clean (Cargo.toml syntactically/semantically valid).
    - `cargo build`: clean (verified earlier in the same work phase).
    - `cargo test --quiet`: 590 unit tests + every integration suite
      green (verified earlier in the same work phase; metadata-only
      changes can't affect runtime).

    Deferred (require real tag push, out of work-phase scope):

    - Tagging a test release (e.g. `v0.0.0-test1`) and confirming the
      workflow produces per-target tarballs + an updated `ravel-lite.rb`.
    - `brew install Linkuistics/taps/ravel-lite` on a clean macOS machine
      finishing in seconds (bottle install, no cargo build).
    - Installed `ravel-lite --version` matching the git tag.

    ## Coordination note

    `/Users/antony/Development/mdformat/` was referenced in the task
    description as a parallel adopter of the same pattern — but that
    directory does not exist on this machine, so no coordination was
    performed. The configuration here mirrors cargo-dist's own
    self-distribution shape (cargo-dist itself is shipped as a
    Homebrew bottle), which is the canonical reference.

    ## What this suggests next

    - Operator action: create the `Linkuistics/homebrew-taps` GitHub
      repository, generate the PAT, add the `HOMEBREW_TAP_TOKEN` secret.
      Until those land, the workflow will run but the homebrew publish job
      will fail with an authentication error.
    - First end-to-end test should be a deliberately-cut prerelease tag
      (e.g. `v1.0.2-test1`) so the publish-prereleases gate skips the tap
      update — that exercises the full pipeline without committing a real
      formula update.
    - Consider gating the cargo-dist version (`cargo-dist-version =
      "0.31.0"`) the same way the rest of the toolchain is pinned;
      cargo-dist evolves its workflow generator across versions, so a
      single source of truth for the version saves hard-to-debug CI drift.
- id: integrate-testanyware-vm-for-capturing-interactive-ravel-lite-commands
  title: Integrate TestAnyware VM for capturing interactive ravel-lite commands
  category: infra
  status: not_started
  dependencies:
  - add-ravel-lite-rb-homebrew-formula-to-linkuistics-homebrew-taps
  description: |
    Dogfood TestAnyware as the driver for running ravel-lite's interactive commands (create, run) inside a VM so tutorial sections can include real transcripts and — optionally — screenshots without requiring the user to manually drive their own terminal. Scope: (a) start a TestAnyware macOS VM with ravel-lite installed via the brew formula (T4); (b) drive 'ravel-lite create' and 'ravel-lite run' via TestAnyware's VNC + agent (input injection, screen capture, agent exec); (c) capture state files on the VM, extract them to the host, and include them as evidence in the tutorial chapters; (d) optional: capture PNG screenshots of the TUI for the tutorial. Supports T2; depends on T1 (pipeline) and T4 (brew formula) for a clean 'brew install' inside the VM. Scope carefully — this can become a rabbit hole; if VM-driven capture proves too costly, fall back to user-driven capture as originally planned.
