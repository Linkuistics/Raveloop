tasks:
- id: add-minimal-github-actions-ci-workflow-build-test-clippy
  title: 'Add minimal GitHub Actions CI workflow: build, test, clippy'
  category: infra
  status: not_started
  dependencies: []
  description: |
    Add a minimal `.github/workflows/ci.yml` that runs on every push and pull request targeting `main`, exercising the three gates: `cargo build`, `cargo test --quiet`, and `cargo clippy --lib --all-targets`.

    ## Why

    `Cargo.toml` already declares `[lints.rust] warnings = "deny"`, which makes `cargo clippy` strict for any developer who runs it locally. But nothing forces a developer to run it before pushing. The `fix-clippy` cycle surfaced this gap: the first GitHub Actions workflow closes the automatic enforcement loop without requiring any changes to the manifest-level strictness settings.

    ## Scope

    - One file: `.github/workflows/ci.yml`
    - Triggers: `push` and `pull_request` on `main`
    - Steps: checkout → `actions/cache` for `~/.cargo` and `target/` → `cargo build` → `cargo test --quiet` → `cargo clippy --lib --all-targets`
    - No matrix (single `ubuntu-latest` runner is sufficient for enforcement; the binary is cross-compiled for release separately via cargo-dist)
    - Rust toolchain: `stable`; pin to a channel, not a specific version

    ## Decisions already made

    - No `--no-deps` on clippy; all-targets is the right scope.
    - The `[lints.rust] warnings = "deny"` manifest setting already propagates `-D warnings` to clippy lint evaluation, so no extra flags are needed in the workflow body.
    - `cargo-dist` will supply its own release workflow via `cargo dist generate`; this CI workflow is strictly for correctness gating on every commit, not for release automation.

    ## Verification

    - Workflow runs green on a test push to a branch.
    - A deliberate clippy violation introduced on a branch causes the workflow to fail.
    - Merge to main only after the workflow passes.
- id: provision-homebrew-tap-infrastructure-and-cut-first-test-release
  title: Provision Homebrew tap infrastructure and cut first test release
  category: infra
  status: not_started
  dependencies: []
  description: |
    Provision the three operator prerequisites that make the cargo-dist Homebrew pipeline functional, then run the first end-to-end test release to confirm bottles publish correctly.

    ## Why

    `[workspace.metadata.dist]` and `.github/workflows/release.yml` are committed and ready. The pipeline is non-functional until: (1) the tap repository exists, (2) a PAT with write access is created, and (3) the secret is registered. None of these steps require code changes — they are operator actions on GitHub.

    ## Steps

    1. **Create the tap repository**: create `Linkuistics/homebrew-taps` as a public GitHub repo. The release workflow's `publish-homebrew-formula` job expects it to exist.

    2. **Generate a PAT**: in GitHub account settings → Developer settings → Personal access tokens, create a fine-grained (or classic) token with `repo` scope covering `Linkuistics/homebrew-taps`. Classic token with full `repo` scope is simplest.

    3. **Add the secret**: in `Linkuistics/Ravel-Lite` → Settings → Secrets and variables → Actions, add a repository secret named `HOMEBREW_TAP_TOKEN` with the PAT value.

    4. **Cut a prerelease test tag**: run `cargo release patch --execute` on a test branch, or push a manual tag like `v1.0.2-test1`. Because `dist.toml` excludes pre-releases from tap publication (`publish-prereleases = false`), the publish-homebrew-formula job will be skipped — this exercises the full build-and-bottle pipeline without writing a real formula update.

    5. **Verify end-to-end**: confirm per-target tarballs are produced (aarch64/x86_64 × macOS/Linux), checksums match, and a formula artifact is generated even if not published.

    6. **Cut the first real release**: once the prerelease test passes, cut a proper semver tag (e.g. `v1.0.2`) to exercise the full pipeline including formula publication.

    ## Verification

    - GitHub Actions workflow run on the prerelease tag produces four tarballs and a `ravel-lite.rb` artifact with no auth error.
    - On a clean macOS machine (or fresh Homebrew prefix): `brew install linkuistics/taps/ravel-lite` completes in seconds without invoking cargo.
    - `ravel-lite --version` on the installed binary matches the git tag.
- id: set-up-asciidoc-to-html-build-pipeline-for-ravel-lite-docs
  title: Set up AsciiDoc-to-HTML build pipeline for Ravel-Lite docs
  category: infra
  status: not_started
  dependencies: []
  description: |
    Set up an AsciiDoc-to-HTML build pipeline so that `docs/tutorial/*.adoc` and `docs/reference/*.adoc` can be converted to HTML and published to `www.linkuistics.com/projects/ravel-lite/`.

    ## Why

    The tutorial (T2) and reference pages (T3) are authored in AsciiDoc. Without a build step, they cannot be published. This task is a prerequisite for the tutorial content task and the docs publish task.

    ## Scope

    - Script or Makefile target that runs `asciidoctor` over source files under `docs/`
    - Output HTML lands in the sibling `www.linkuistics.com/projects/ravel-lite/` directory
    - Integrates with or establishes the `SYNC.yml` publication pattern for Ravel-Lite doc pages
    - Should be repeatable and idempotent

    ## Verification

    - Running the build script produces one HTML file per AsciiDoc source
    - Pages render correctly in a browser and match site brand
    - The sibling www repo's `SYNC.yml` lists the output pages so they sync correctly
