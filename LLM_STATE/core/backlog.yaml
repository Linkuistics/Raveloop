tasks:
- id: fix-stale-references-in-llm-work-audit-md-2-9-and-git-rs-32-doc-comment
  title: Fix stale references in llm-work-audit.md §2.9 and git.rs:32 doc-comment
  category: core
  status: done
  dependencies: []
  description: |
    Fix two stale references surfaced by the sync-docs cycle.

    ## What

    1. **`docs/analysis/llm-work-audit.md §2.9`** ("analyse-work: commit partitioning helper") describes a proposed `commit-work partition` verb using the framing "the LLM no longer partitions" — but under the current `commits.yaml` flow the LLM still authors the partition structure (paths alongside messages). Reframe §2.9 as "extract partition structure from LLM-authored `commits.yaml` into a Rust-generated preview" rather than "introduce partitioning".

    2. **`src/git.rs:32` doc comment** still reads "Stage plan directory and commit with the message from commit-message.md". `commit-message.md` is deleted; the function now applies `commits.yaml` via `apply_commits_spec`. Update the comment to reference the current mechanism.

    ## Why

    Both are low-cost, high-clarity fixes. The §2.9 framing misdirects any reader considering whether commit partitioning is already done. The `git.rs:32` comment will mislead anyone reading the commit path for the first time.

    ## Scope

    - Edit the one prose paragraph in `docs/analysis/llm-work-audit.md §2.9`.
    - Update the doc comment on `commit_plan_state_dir` (or the relevant function) in `src/git.rs:32`.
    - No code changes; docs + comment only.

    ## Verification

    Confirm the updated doc matches `src/git.rs::apply_commits_spec` behaviour and the current `analyse-work.md` step 9 description.
  results: |
    ## What was done

    Two stale references corrected.

    ### `src/git.rs:32` doc comment

    Old comment:
    ```
    /// Stage plan directory and commit with the message from commit-message.md
    /// (or a default message). Returns whether anything was committed.
    ```

    New comment names the actual mechanism, the actual current callers, and points to the sibling function that handles the work-phase path:

    > Stage the plan directory and commit it. The message comes from `commit-message.md` if present (and the file is removed after read); otherwise the default `run-plan: {phase_name} ({plan_name})` is used. Used by the reflect / dream / triage / save-*-baseline phases — none of which currently author `commit-message.md`, so the default-message branch is what fires in practice today. The work-phase commit is handled separately by `apply_commits_spec` against `commits.yaml`. Returns whether anything was committed.

    ### `docs/analysis/llm-work-audit.md §2.9`

    Replaced the misleading "**Prompt section replaced.** The LLM no longer partitions; it writes one commit message per group …" paragraph with a "**Relation to `commits.yaml`.**" paragraph that:

    - Acknowledges the LLM still authors `commits.yaml` end-to-end (paths *and* messages) under the current flow.
    - States explicitly that this verb is a Rust-generated *preview* the LLM can accept, refine, or discard — not a removal of partitioning from the LLM's job.
    - Captures the underlying intent: "extract the mechanical partition rubric into Rust as a starting point", not "introduce partitioning".

    The opening "Shape" sentence already framed the verb as proposing a partition (not as the partition source of record), so it didn't need editing.

    ## Why this mattered (and a discovery)

    The backlog framing claimed `commit-message.md` was deleted and that `git_commit_plan` "now applies `commits.yaml` via `apply_commits_spec`". That isn't quite right: `git_commit_plan` and `apply_commits_spec` are siblings, not a delegation. The function `git_commit_plan` is still alive — it's used by reflect / dream / triage / save-*-baseline. Inside that function, the `commit-message.md` branch is **dead in practice today**: searching `defaults/` and `src/` confirms no current phase prompt authors `commit-message.md` (the only remaining mention in `src/` is a UI highlight rule in `src/format.rs:101`). The work-phase commit goes through `apply_commits_spec` and `commits.yaml`.

    The new doc comment tells this story honestly: legacy branch first, current behaviour second, sibling function for the work-phase path. A reader landing on `git_commit_plan` for the first time now has a map to the actual mechanism without having to grep across the codebase.

    ## What didn't work / wasn't attempted

    - **Did not delete the legacy `commit-message.md` branch from `git_commit_plan`.** The task scope was limited to the doc comment; ripping out dead code would have been scope creep. If the team wants to retire that branch, that's a separate task — at minimum it requires confirming that no out-of-tree plan or external override authors `commit-message.md`, plus removing the `format.rs:101` highlight rule.

    ## What this suggests next

    - A small follow-up task could remove the legacy `commit-message.md` branch (and its highlight rule) once the team is confident no external plan still relies on it. The new doc comment is the discovery vehicle for that decision.
    - The audit doc has other §2.x entries written before the `commits.yaml` flow landed — worth a sweep to see whether any others now describe a state of the world that no longer exists.
