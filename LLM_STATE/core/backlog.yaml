- id: v1-to-v2-migration-with-auto-cleanup-of-materialised-defaults
  title: v1 to v2 migration with auto-cleanup of materialised defaults
  category: feature
  status: not_started
  dependencies:
  - switch-prompt-and-agent-reads-to-embedded-defaults-slim-init-to-plan-state-skeleton-only
  - replace-yaml-config-with-lua-mlua-and-layered-global-plan-resolution
  description: |
    On the first command that consumes config in a legacy v1 plan/config
    dir, detect the v1 layout, translate `config.yaml` (+ optional
    `*.local.yaml` deep-merged) into `config.lua`, delete every
    tool-materialised file, and stamp `config_version = 2`. Idempotent;
    runs at most once per dir.

    ## Why

    When the lua-config + embedded-defaults landings ship (separate
    tasks), every existing config dir on disk is in v1 layout: it
    contains materialised prompts, agent definitions, `config.yaml`, and
    possibly `config.local.yaml`. Without cleanup, those files become
    dead clutter the new binary ignores. Auto-migration on first run
    gives the user a zero-step upgrade and a clean disk.

    Zero current users → migration code only handles one transition
    (v1 → v2) and only runs once per dir. After the first cycle past
    this landing, every dir in existence is v2; the migration code can
    be deleted in a future v3.

    ## Scope

    Detection:

    - A config dir is v1 iff `config.lua` is absent AND any of
      (`config.yaml` exists, any `*.local.yaml` exists, `prompts/` dir
      exists, `agents/` dir exists with materialised content) is true.
    - Otherwise v2 (or fresh, indistinguishable for our purposes).

    Translation:

    - Read `<config>/config.yaml` deep-merged with
      `<config>/config.local.yaml` using the existing `merge_yaml`
      logic. The YAML reader stays available specifically for
      migration.
    - Same for each `<config>/agents/<name>/config.yaml` and
      `tokens.yaml` (+ their `.local.yaml` overlays).
    - Translate the merged maps into a single Lua source string: emit
      setter calls / table assignments equivalent to the YAML keys, plus
      `ravel.config.config_version = 2`.
    - Write `<config>/config.lua` first (with version stamp).

    Deletion:

    - Delete every file in the embedded-defaults set that exists on disk
      under the config dir, plus `config.yaml`, `config.local.yaml`, all
      agent `config.yaml` / `config.local.yaml` / `tokens.yaml` /
      `tokens.local.yaml` files, and any now-empty directories.
    - Order: write new `config.lua` first; delete legacy files last. If
      a deletion step fails, the next run re-detects v1 (because legacy
      files still exist) and retries cleanly.

    Tests:

    - Golden directory transformation: a captured v1 fixture dir → run
      migration → assert the resulting v2 dir matches an expected file
      list and the `config.lua` content matches a golden string.
    - Idempotency: re-running migration on a v2 dir is a no-op.
    - Crash recovery: simulate a crash between writing `config.lua` and
      deleting legacy files; assert the next run completes the migration
      cleanly.

    ## Decisions already made

    - One-jump migration (v1 → v2 directly). No intermediate v1.5 step.
    - Customised prompt content (rare/nonexistent given zero current
      users) is deleted without warning. Acceptable simplification.
    - `config_version = 2` stored in `config.lua` is the only marker
      needed; there is no separate sentinel file.
    - Migration is unconditional and silent (no prompt). Cost of
      upgrading.

    ## Verification

    - A captured v1 fixture dir migrates to a v2 dir whose only files
      are `config.lua` (new) plus, for the global dir, anything that's
      truly user-owned (in practice: just `config.lua`).
    - Re-running migration on a v2 dir is a no-op (same file mtimes
      acceptable, same content required).
    - A crash injected between writing `config.lua` and deleting legacy
      files leaves the dir in a state where the next run completes the
      migration without losing data.

    ## Dependencies

    Depends on the lua-config landing (the Lua reader must exist) and
    the embedded-defaults landing (so we know which paths to delete).
- id: rewrite-config-and-prompts-reference-page-for-lua-api
  title: Rewrite config-and-prompts reference page for Lua API
  category: docs
  status: not_started
  dependencies:
  - switch-prompt-and-agent-reads-to-embedded-defaults-slim-init-to-plan-state-skeleton-only
  - replace-yaml-config-with-lua-mlua-and-layered-global-plan-resolution
  - v1-to-v2-migration-with-auto-cleanup-of-materialised-defaults
  description: |
    Rewrite the `config-and-prompts` reference page for the Lua-based
    config and append-only prompt customisation API. Supersedes the
    existing "Reference: configuration and prompt-file formats" backlog
    task, which describes the now-defunct YAML config model.

    ## Why

    The shipped reference page (or its placeholder) describes the
    YAML + `*.local.yaml` overlay model and the on-disk prompt files.
    After the lua-config + embedded-defaults landings, none of that
    matches reality. Users need a single page that describes the new
    layout: what's embedded, what's user-owned, and how to customise
    via `config.lua`.

    ## Scope

    File:

    - `docs/reference/config-and-prompts.adoc` (or the path that matches
      the existing reference docs convention; check `docs/manifest.txt`).

    Cover:

    - The two-layer config model: global
      (`<config-dir>/config.lua`) and per-plan (`<plan>/config.lua`).
      Show the precedence chain for finding `<config-dir>`
      (`--config` → `RAVEL_LITE_CONFIG` → `dirs::config_dir()/ravel-lite`).
      Describe composition semantics: setters last-write-wins,
      registrators (`append_prompt`) accumulate.
    - The `ravel` global table API — every public function, with one
      minimal `config.lua` example per entry.
    - Prompt customisation via `ravel.append_prompt(phase, text)`,
      including the contract that user text is *appended* and cannot
      replace the embedded prompt.
    - Prompts themselves are not on disk; link to the embedded source on
      GitHub for reading
      (`https://github.com/Linkuistics/Ravel-Lite/tree/main/defaults`).
    - `config.config_version` field — what it is, why it's auto-stamped,
      when it bumps. Link to the migration behaviour for old
      installations.

    Manifest + build:

    - Update `docs/manifest.txt` if the page path or order changes.
    - Run `./scripts/build-docs.sh` to confirm the page renders cleanly
      into the linkuistics site.

    ## Decisions already made

    - Single page (not split per layer or per API function).
    - Prose + worked examples; no auto-generated reference table.
    - The existing
      `reference-configuration-and-prompt-file-formats-config-yaml-local-yaml-overlays-embedded-defaults-token-substitution-per-phase-prompts`
      task should be marked `blocked` with reason "superseded by
      lua-config redesign" once this task is in flight.

    ## Verification

    - Page renders without AsciiDoc errors via
      `./scripts/build-docs.sh`.
    - Every `ravel.*` function listed in the reference has a working
      code example.
    - A reader landing cold on the page can write a minimal
      `config.lua` that sets one model and registers one
      `append_prompt`, with no other knowledge.

    ## Dependencies

    Depends on the lua-config replacement (API surface must be settled),
    the embedded-defaults landing (so the doc accurately describes what's
    on disk vs embedded), and the migration landing (so upgrade
    behaviour can be documented from observed reality).
