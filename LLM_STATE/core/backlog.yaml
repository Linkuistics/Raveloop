- id: reference-state-file-formats-backlog-yaml-memory-yaml-session-log-yaml-latest-session-phase-md-commits-yaml
  title: 'Reference: state-file formats (backlog.yaml, memory.yaml, session-log.yaml, latest-session, phase.md, commits.yaml)'
  category: docs
  status: not_started
  dependencies: []
  description: |
    Write the state-file formats reference page: schema, examples, and read/write call sites for the durable plan-state files.

    ## Scope

    - File: `docs/reference/state-files.adoc`
    - Per file: full schema (every field with type, semantics, allowed values), a worked example, the phase that writes it, the phases that read it, and the gotchas a hand-editor needs to know.

    ### Files covered

    - **`backlog.yaml`** â€” tasks list, status enum, dependencies (must be ids; cycles and self-reference rejected by `set-dependencies`), results block, handoff block, category, description, blocked_reason.
    - **`memory.yaml`** â€” entries list, the four entry types (user, feedback, project, reference), description vs body, distillation rules.
    - **`session-log.yaml`** â€” per-cycle entries, what analyse-work writes here, append-only semantics.
    - **`latest-session.*`** â€” the per-cycle summary. **Verify whether the actual file is `.md` or `.yaml`** â€” the existing format.rs highlight rule says `.md` but memory notes mention `.yaml`. Document whichever is current and flag any inconsistency.
    - **`phase.md`** â€” the single-line current-phase indicator. Validation rules. Why it's a separate file rather than embedded in another.
    - **`commits.yaml`** â€” the commit spec written by analyse-work, consumed by git-commit-* phases. Per-commit structure (paths, message file).

    ## Style

    Friendly prose between schema blocks. Each file gets a short prose introduction, the schema as a code block (`[source,yaml]` with field-level comments), then prose on gotchas and editing rules.

    ## Verification

    - Page builds and renders.
    - Every schema cross-checked against `src/state/<file>/schema.rs` (or wherever the serde struct lives).
    - At least one example per file is realistic â€” lifted from a real plan, anonymised if needed.
    - The `.md` vs `.yaml` question for `latest-session.*` is resolved by reading the actual write path in `src/state/`.
- id: fix-html-cross-link-convention-in-website-docs-fragments
  title: Fix HTML cross-link convention in website/docs/ fragments
  category: docs
  status: done
  dependencies: []
  description: |
    Audit and fix the internal cross-link convention in all `website/docs/*.html`
    fragments so links resolve correctly under the new URL scheme.

    ## Why

    The phase-cycle reference-page work (2026-04-27) exposed two conflicting
    link forms in the rendered HTML:

    - `concepts.html` uses `<a href="reference-state-files.html">` â€” the
      legacy flattened-name scheme from the pre-2026-04-26 pipeline.
    - `phase-cycle.html` uses `<a href="state-files.html">` â€” sibling-relative,
      no prefix, but still includes `.html`.

    Under the new URL scheme (`/projects/ravel-lite/docs/<page>/`), the correct
    relative form is likely `state-files/` (trailing slash, no `.html` extension)
    because pages are served at directory URLs. Until this is verified against a
    live deploy, the canonical form is unconfirmed.

    ## Scope

    1. **Verify** the canonical URL form by inspecting a live deployed page â€”
       either via `curl -I` on a published `phase-cycle/` or `concepts/` URL,
       or by reading the `www.linkuistics.com` pipeline's routing config.
    2. **Audit** all `<a href="...">` cross-links inside
       `website/docs/concepts.html`, `website/docs/phase-cycle.html`,
       `website/docs/index.html`, and any other HTML fragments in
       `website/docs/`.
    3. **Normalise** every internal cross-link to the confirmed canonical form.
       Update `docs/reference/*.adoc` source files so the normalised links
       are generated on future re-renders, not just patched post-render.

    ## Verification

    - `grep -r 'href=' website/docs/` shows no `.html`-suffixed internal links
      (or whatever the canonical form turns out to be).
    - A spot-check of the canonical URL on the live site confirms links resolve.
  results: |
    ## What shipped

    - **Verified** the canonical link form by inspecting the eleventy pipeline:
      `lib/markdown.js::rewriteRelativeLinks` takes a sibling-relative
      `href="<page>.html"`, strips the extension, and emits an absolute
      directory URL `/projects/<slug>/<dir>/<page>/`. So source `.adoc` files
      must use `link:<page>.html[Title]` â€” no `reference-` prefix, with
      `.html` extension. The deployed structure (each page at
      `<page>/index.html`) confirms directory-style URLs.
    - **Normalised** every legacy `link:reference-<page>.html` form to the
      canonical `link:<page>.html` form across `docs/reference/concepts.adoc`
      (7 occurrences) and `docs/reference/index.adoc` (8 occurrences).
    - **Fixed** the cross-directory tutorial link in `index.adoc` from
      `link:tutorial-00-overview.html` to `link:../tutorials/00-overview.html`,
      which the eleventy `rewriteRelativeLinks` resolves correctly to
      `/projects/ravel-lite/tutorials/overview/` (with the `\d+-` prefix
      stripped from the segment).
    - **Re-rendered** `website/docs/concepts.html` and
      `website/docs/index.html` via the new `scripts/render-docs.sh` so
      on-disk fragments match the corrected sources.

    ## What worked

    `grep -nE 'link:reference-|link:tutorial-' docs/reference/ docs/tutorial/`
    returns no matches. Spot-check of rendered `concepts.html` shows every
    content-side cross-link is `<a href="<page>.html">` (sibling-relative,
    extension-suffixed) â€” the form the eleventy filter accepts. The
    `href="../tutorials/00-overview.html"` cross-directory form also resolves
    correctly per the filter's `posix.normalize` + segment-stripping logic.

    ## What didn't, and what's next

    Nothing blocked. The HTML cross-link convention is now consistent across
    every source file and rendered fragment. Future reference pages should
    follow the same convention: `link:<sibling-page>.html[Title]` for in-dir
    links, `link:../<other-dir>/<page>.html[Title]` for cross-directory links.

    The audit itself was scoped to the source `.adoc` files since that is the
    authoritative input â€” patching post-render `website/docs/*.html` would
    silently regress on the next render.
- id: reference-cross-plan-file-formats-subagent-dispatch-yaml-related-components-yaml-evidence-grades
  title: 'Reference: cross-plan file formats (subagent-dispatch.yaml, related-components.yaml, evidence grades)'
  category: docs
  status: not_started
  dependencies: []
  description: |
    Write the cross-plan file formats reference page: `subagent-dispatch.yaml` (triage hand-off mechanism) and `related-components.yaml` (peer-project edges), with schema, examples, evidence-grade semantics, and the lifecycle of each file.

    ## Scope

    - File: `docs/reference/cross-plan-files.adoc`

    ### Files covered

    - **`subagent-dispatch.yaml`**: schema, when triage writes it, how downstream consumers read it, how dispatched subagents behave, the contract between dispatcher and dispatched.
    - **`related-components.yaml`**: `schema_version: 2`, edges with `kind` / `lifecycle` / `participants` / `evidence_grade` / `evidence_fields` / `rationale`. How the `state related-components` verbs interact with the file. The discover/add-edge workflow.

    ### Cross-cutting

    - **Evidence grade semantics** (strong / medium / weak): what each grade implies, how the discover phase chooses, how downstream consumers should treat each grade differently.
    - **Edge kinds** (orchestrates, depends-on, etc.): the controlled vocabulary, when each kind applies.
    - **Lifecycle scopes** (dev-workflow, build, runtime, etc.): the controlled vocabulary.

    ### Cross-links

    - Cross-link to triage in the phase-cycle page.
    - Cross-link to `state related-components` in the CLI state page.

    ## Style

    Friendly prose, schema blocks (`[source,yaml]`), minimal lists, no emoji.

    ## Verification

    - Page builds and renders.
    - Schemas cross-checked against `src/state/related_components/` (and the triage dispatch code for the dispatch file).
    - Examples lifted from a real `related-components.yaml` â€” this very project's file (with edges to APIAnyware-MacOS, TestAnyware, Ravel, Atlas) is good source material.
- id: reference-cli-lifecycle-commands-run-create-init-version-global-flags
  title: 'Reference: CLI lifecycle commands (run, create, init, version, global flags)'
  category: docs
  status: done
  dependencies: []
  description: |
    Write the CLI reference page for lifecycle commands: `ravel-lite run`, `create`, `init` (+ `--force`), `version` (+ `--version`), and the global flags that apply to every command (`--config`, `RAVEL_LITE_CONFIG`, `--dangerous`).

    ## Scope

    - File: `docs/reference/cli-lifecycle.adoc`
    - Per command: invocation, flags (with defaults), what it does, what it writes, side effects, exit codes, gotchas.

    ### Commands

    - **`run`**: the main loop entry point. How phase resumption works (reads `phase.md` to decide where to start). What it reads to decide what to do. How it spawns agent subprocesses. Failure modes.
    - **`create`**: plan creation. Bootstrapping flow (initial backlog, memory placeholder, phase set to work). Required arguments. How it interacts with `state projects`.
    - **`init`**: project initialisation. What gets materialised onto disk. `--force` semantics â€” overwrites without prompting (vs the default which refuses if files exist).
    - **`version`** (+ `--version`): identity output (crate version + `git describe --tags --always --dirty` + UTC build timestamp). Why a running binary always identifies the commit it was built from.

    ### Global flags

    - `--config <path>`: explicit config file location.
    - `RAVEL_LITE_CONFIG`: env-var equivalent of `--config`.
    - `--dangerous`: what behaviours it unlocks, why it's gated.
    - Precedence rules (flag > env var > default).

    ## Style

    Friendly prose, minimal lists, no emoji. Each command gets at least one worked example.

    ## Verification

    - Page builds and renders.
    - Every flag and option cross-checked against the actual `clap` derive structure in `src/cli.rs`.
    - Exit codes cross-checked against the actual implementation.
  results: |
    ## What shipped

    `docs/reference/cli-lifecycle.adoc` rewritten from a 5-line placeholder
    to a 78-line reference page covering:

    - **Global flags** section with anchor `[[global-flags]]`: `--config`,
      `RAVEL_LITE_CONFIG`, `--dangerous` (Claude Code only â€” Pi ignores with
      warning), and the precedence chain `--config` â†’ `$RAVEL_LITE_CONFIG` â†’
      `dirs::config_dir()/ravel-lite`.
    - **`init`**: scaffolds a config dir; `--force` to overwrite existing
      files (refresh prompts after upgrade).
    - **`create`**: interactive Claude Code session for plan creation.
      Reuses the configured work-phase model; passes `--add-dir <parent>`.
      Inherits stdio (not the TUI) because plan creation is a conversation.
    - **`run`**: phase loop entry. Single-plan vs multi-plan mode dispatch;
      `--survey-state` required for multi-plan, rejected for single. `--debug`
      enables PTY capture and `--debug-file` for claude.
    - **`version`**: identity output with crate version + `git describe` +
      UTC build timestamp; same as `--version`.

    Each command's flags, defaults, side effects, and gotchas are documented.
    Cross-links to `cli-state.html`, `cli-survey.html`, `phase-cycle.html`,
    and `config-and-prompts.html` use the canonical sibling-relative form.

    ## What worked

    - Flags and behaviours cross-checked against `src/main.rs` (clap derive
      structure, `Commands::Run`, `Commands::Init`, etc.) and
      `src/config.rs::resolve_config_dir` (precedence chain).
    - Renders cleanly through `scripts/render-docs.sh` with no asciidoctor
      warnings (verified with `--failure-level=WARN`).
    - Cross-section anchor `<<global-flags>>` resolves to `#global-flags`
      in the rendered fragment.

    ## What didn't, and what's next

    Two minor accuracy notes worth flagging:

    - The page describes `--dangerous` as Claude-Code-only. Confirmed in
      `src/main.rs::run_phase_loop` which warns and no-ops the flag when
      `shared_config.agent != "claude-code"`.
    - The `survey` command is documented on a separate page
      (`cli-survey.adoc`) per the backlog's split â€” kept the cross-reference
      in this page's intro so a reader looking for "survey" lands there.
- id: reference-cli-state-commands-projects-backlog-memory-session-log-set-phase-related-components
  title: 'Reference: CLI state commands (projects, backlog, memory, session-log, set-phase, related-components)'
  category: docs
  status: done
  dependencies: []
  description: |
    Write the CLI reference page for `ravel-lite state` and all its subcommands: projects, backlog, memory, session-log, set-phase, related-components.

    ## Scope

    - File: `docs/reference/cli-state.adoc`

    ### Subcommand groups

    - **`state projects`**: add, list, rename, remove. The projects registry. How rename cascades through related state (memory note: rename has three cascade points in `run_rename`; consider Trait-based registry before adding a fourth).
    - **`state backlog`**: every CRUD verb â€” list, show, add, init, set-status, set-results, set-description, set-handoff, clear-handoff, set-title, set-dependencies, reorder, delete, lint-dependencies, repair-stale-statuses. Filter syntax for `list`. Format options (yaml / markdown / json) and what each format includes (markdown drops ids by design â€” see render.rs module doc).
    - **`state memory`**: CRUD verbs and the four entry types (user, feedback, project, reference).
    - **`state session-log`**: CRUD verbs.
    - **`state set-phase`**: phase enum, validation rules, when manual phase setting is appropriate (vs letting the orchestrator transition naturally).
    - **`state related-components`**: list, add-edge, discover. The advanced cross-plan dispatch flow (one-paragraph mention here, deep dive in the cross-plan-files reference page; cross-link).

    ## Style

    Friendly prose. Command tables only when the surface is dense enough to warrant one (the backlog verbs almost certainly do; memory probably doesn't). No emoji.

    ## Verification

    - Page builds and renders.
    - Every verb cross-checked against the actual `clap` derive structure (`src/cli.rs` and any subcommand modules).
    - Worked examples for the most common verbs (list, set-status, set-results, set-dependencies).

    ## Note on size

    This is the largest CLI page in the mini-site. If it grows beyond ~3000 words during writing, propose a follow-up split task (e.g. `cli-state-backlog.adoc` as its own page) rather than letting the page balloon.
  results: |
    ## What shipped

    `docs/reference/cli-state.adoc` rewritten from a 5-line placeholder to a
    ~210-line reference page documenting every `state` subcommand:

    - **Intro**: explains *why* `state` exists (one `Bash(ravel-lite state *)`
      allowlist entry replaces Read+Write tool-call pairs in phase prompts);
      enumerates the six namespaces and the two advanced ones; documents the
      consistent `--format yaml|json|markdown` convention and where each
      format applies.
    - **`state projects`**: list, add, remove, rename. Notes the rename
      cascade points (`related-components.yaml`, `discover-cache/`).
    - **`state backlog`**: rendered as a verb table (16 verbs); the densest
      surface in the CLI. Filter syntax for `list`, body-source semantics
      for `set-results`/`set-description`/`set-handoff`, the markdown-no-id
      convention with the rationale, and the `repair-stale-statuses` exit
      code 1 contract for scripting.
    - **`state memory`**: list, show, add, init, set-body, set-title, delete.
      Notes that the four memory entry types are conventions enforced by
      `memory-style.md`, not by the schema.
    - **`state session-log`**: list, show, append, set-latest, show-latest.
      Documents the load-bearing split between `session-log.yaml` (append-only
