tasks:
- id: remove-claude-code-debug-file-workaround-once-version-exceeds-2-1-116
  title: Remove Claude Code `--debug-file` workaround once version exceeds 2.1.116
  category: maintenance
  status: done
  dependencies: []
  description: |
    `invoke_interactive` in `src/agent/claude_code.rs` passes
    `--debug-file /tmp/claude-debug.log` as a workaround for a TUI
    rendering failure in Claude Code ≤2.1.116. The root cause was not
    found; debug mode happens to mask it via an unknown upstream mechanism.

    When the installed `claude` binary is updated past 2.1.116, remove both
    `args.push` lines adding `--debug-file` and `/tmp/claude-debug.log`.
    Verify that the Work phase TUI renders correctly without the flag
    before closing.

    **Caveat — a version bump alone is insufficient.** The fix is empirical: debug
    mode masks the TUI failure via an unknown upstream mechanism, not a documented
    patch. A later claude version may have bumped past 2.1.116 without actually
    touching the offending code path. Before removing the workaround:

    1. Reproduce the original TUI failure on the current binary *without* the flag
       (run `ravel-lite run` against a real plan, watch the Work phase render).
    2. If the bug no longer reproduces without the flag, adding the flag should
       also make no observable difference — confirm that.
    3. Only then remove the two `args.push` lines.

    An attempt on claude 2.1.117 was rolled back unverified — the code change is
    trivial (27-line deletion, produced by a subagent, reverted via `git checkout`)
    but the TUI verification step cannot be done by a subagent (no tty) and was
    not done by a human.
  results: |
    **Status: done.** Verified 2026-04-23.

    **Verification outcome:** User ran a rebuilt `ravel-lite` against `claude 2.1.117` without `--debug-file /tmp/claude-debug.log` and observed the Work-phase TUI rendering normally. The empirical bug that motivated the workaround (stuck-pilot / blank / non-responsive render on claude 2.1.113–2.1.116) does not reproduce on 2.1.117. The code deletion in commit `93d0de6` stands; no revert needed.

    **What was done across both work cycles (combined history):**

    - **2026-04-23, cycle 1** — Verified `claude` 2.1.117 installed. Removed from `src/agent/claude_code.rs::invoke_interactive`:
      - The two `args.push` lines adding `--debug-file /tmp/claude-debug.log` (was lines 205–206).
      - The 24-line WORKAROUND comment block preceding them (was lines 181–204). Ruled-out-hypothesis forensic detail (termios state, isatty, process-group leadership, foreground tty ownership, signal mask, O_NONBLOCK, etc.) is preserved in git blame; recoverable via `git log -S "WORKAROUND" -- src/agent/claude_code.rs` if the bug resurfaces.
      - `cargo check` clean; `cargo test` 406 lib tests + all integration suites pass. No test pinned the `--debug-file` args.
      - `.gitignore` unchanged; `/tmp/claude-debug.log` lives outside the repo.
      - Status set to `blocked` pending human TUI verification (the step a subagent cannot perform — no tty).

    - **2026-04-23, cycle 2 (this cycle)** — Human operator rebuilt `ravel-lite` and drove a live Work-phase TUI against `claude 2.1.117` without `--debug-file`. TUI rendered normally. Verification gate passed. Status flipped to `done`.

    **Follow-up housekeeping (handed off, not done here):**

    - Memory entry `claude-code-tui-requires-debug-file-workaround-for-2-1-116` in `LLM_STATE/core/memory.yaml` describes code that no longer exists. It was updated in cycle 1 to describe the pending-verification state but is now also stale — the verification has succeeded. The reflect phase that follows this work cycle should either delete it or rewrite it for historical context (e.g. "bug observed on claude 2.1.113–2.1.116; not reproducible on 2.1.117; workaround removed in commit 93d0de6"). Memory mutation is reflect's job, not work's, so this cycle does not touch it.

    - The other open backlog task (`smoke-test-discover-pipeline-against-real-project-catalog`) remains the sole not-started item and is also human-in-the-loop. Triage may want to surface whether there is any headless-doable work left on this plan, or whether subsequent cycles should expect to be interactive-only until new tasks land.

    **No source or config files were modified this cycle.** Only plan-state files (`LLM_STATE/core/backlog.yaml`) changed, which is owned by the git-commit-work phase that follows analyse-work. The working tree is otherwise clean.
- id: smoke-test-discover-pipeline-against-real-project-catalog
  title: Smoke-test discover pipeline against real project catalog
  category: validation
  status: not_started
  dependencies: []
  description: |
    Perform a live end-to-end smoke-test of the `state related-projects discover` + `discover-apply` pipeline against the real project catalog, as specified in `docs/r7-related-projects-discovery-plan.md` § Task 12 Step 3.

    **Steps:**
    1. Run `ravel-lite state related-projects discover` against the real config root (with the actual `claude` binary).
    2. Inspect `discover-proposals.yaml` — confirm proposals are structurally valid and semantically plausible.
    3. Run `ravel-lite state related-projects discover-apply` and confirm `related-projects.yaml` is updated as expected.
    4. Re-run discover and confirm the cache is hit (no fresh claude invocations for unchanged projects).

    **Why:** Unit and integration tests use a fake-claude shim. This step validates the prompt templates, Stage 1 surface extraction, Stage 2 global reasoning, and apply merge against a live model and real codebase.

    **Cannot be done headlessly** — requires a real `claude` binary on PATH and a populated project catalog. A human must verify the semantic quality of proposals.
