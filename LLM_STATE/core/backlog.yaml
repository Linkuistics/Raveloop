tasks:
- id: implement-ontology-v2-types-and-defaults-ontology-yaml-additive
  title: Implement ontology v2 types and defaults/ontology.yaml (additive)
  category: feature
  status: done
  dependencies: []
  description: |
    **Priority: HIGH.** Foundation task — unlocks the ontology-v2 work stream.

    Introduce the schema-v2 types and the language-neutral ontology file **additively**, without renaming anything yet. After this task, v1 code still compiles and runs; v2 types exist and are unit-tested but have no production caller.

    ## Scope

    - New module `src/ontology/` with the types defined in
      `docs/component-ontology.md` §9.4 and §9.5:
      - `EdgeKind` (16 kebab-case variants, §6)
      - `LifecycleScope` (7 variants, §4.2)
      - `EvidenceGrade` (`strong | medium | weak`)
      - `Edge` with `kind`, `lifecycle`, `participants`, `evidence_grade`, `evidence_fields`, `rationale`
      - `RelatedComponentsFile` with `schema_version: 2`
    - `EdgeKind::is_directed()`, `as_str()`, `parse()`, `all()` per the sketch in §9.4.
    - `Edge::canonical_key`, `Edge::validate` (enforcing invariants in §9.5).
    - `RelatedComponentsFile::add_edge` (idempotent, dedup by canonical key).
    - `rename_component_in_edges(&mut self, old, new)`.
    - Atomic save helper (mirroring existing `save_atomic` pattern).
    - `defaults/ontology.yaml` matching §10's sketch: every `EdgeKind` variant, every `LifecycleScope`, every `EvidenceGrade`, with descriptions.
    - **Drift test**: `src/ontology/mod.rs` test reads `defaults/ontology.yaml` at test time and asserts bijection with the Rust enums. Adding a kind in one place without the other fails the test (mirrors `init.rs` drift tests for coding-style files).
    - Unit tests covering: serde round-trip, canonical-key dedup for directed + symmetric kinds, invariant violations (empty rationale, 1 participant, reversed directed kind, etc.).

    ## Out of scope

    - Any rename of `related_projects` / `RelatedProjectsFile` / `RELATED_PROJECTS_FILE` / `related-projects.yaml`.
    - Any change to `src/discover/**` or `defaults/discover-stage*.md`.
    - CLI changes.
    - The v1 → v2 migrator (deferred to the next task).

    ## Exit criteria

    - `cargo test -p ravel-lite ontology` passes.
    - `cargo build` passes with no warnings touching the new module.
    - `defaults/ontology.yaml` is embedded via the existing `EmbeddedFile` registration pattern if applicable (check `init.rs`).
    - `docs/component-ontology.md` is the truth source; if implementation requires amendments, update the doc in the same task.
  results: |
    **Shipped.** Foundation for the ontology-v2 work stream is in place; v1 code is untouched, v2 types compile and carry full test coverage, and `defaults/ontology.yaml` is drift-guarded against the Rust enum surface.

    ## What landed

    ### New module `src/ontology/`

    Four files, matching the shape of `src/state/backlog/`:

    - `schema.rs` — `EdgeKind` (17 kebab-case variants across 7 families), `LifecycleScope` (7 variants), `EvidenceGrade` (3 variants), `Edge`, `RelatedComponentsFile`. `EdgeKind::{is_directed, as_str, parse, all}` per the §9.4 sketch; identical shape on `LifecycleScope` and `EvidenceGrade`. `Edge::validate` enforces the §9.5 invariants (exactly 2 distinct participants; symmetric kinds require sorted participants; `rationale` non-empty; `evidence_fields` non-empty unless `Weak`). `Edge::canonical_key` returns `(kind, lifecycle, participants')` per §7.3, with `participants'` sorted for symmetric kinds and preserved for directed kinds. `RelatedComponentsFile::add_edge` is idempotent by canonical key; `rename_component_in_edges` rewrites every matching participant and re-sorts symmetric edges.
    - `yaml_io.rs` — `load`, `load_or_default`, `save_atomic`. Hard-errors on `schema_version != 2` with a message that explicitly names the delete-and-regenerate upgrade path (memory entry `generated-derived-artifacts-need-no-migrators-delete-and-regenerate`). Atomic write via temp-file-then-rename on the same filesystem.
    - `defaults.rs` — `OntologyYaml` / `KindEntry` / `LifecycleEntry` / `EvidenceGradeEntry` types for parsing `defaults/ontology.yaml`. `EMBEDDED_ONTOLOGY_YAML` via `include_str!`. `parse_embedded()` is the drift-guard entry point and the future-`{{ONTOLOGY_KINDS}}` prompt-render entry point.
    - `mod.rs` — re-exports and a `drift_tests` submodule.

    ### `defaults/ontology.yaml`

    Language-neutral data form of docs §5 + §6 + §3.2. Every `EdgeKind` variant, every `LifecycleScope`, every `EvidenceGrade`, with descriptions. `schema_version: 1` for the ontology file itself (independent of `related-components.yaml`'s `schema_version: 2` — two things that version independently).

    Registered in `init.rs` `EMBEDDED_FILES` so `ravel-lite init` ships it alongside the phase prompts. Wired into `src/lib.rs` as `pub mod ontology`.

    ### Drift tests

    Five bijection tests in `drift_tests`, modelled on `every_default_coding_style_file_is_embedded` in `init.rs` (memory `init-rs-drift-detection-test-guards-coding-style-registration`):

    1. Edge-kind set bijection (YAML ↔ Rust enum) — errors on both "YAML has kind missing in Rust" and "Rust has kind missing in YAML".
    2. Lifecycle set bijection.
    3. Evidence-grade set bijection.
    4. `directed` flag in YAML matches `EdgeKind::is_directed` for each kind.
    5. Every YAML kind declares at least one lifecycle, and every referenced lifecycle is a known `LifecycleScope`.

    These together would catch any of: adding a kind in Rust without YAML, adding a kind in YAML without Rust, flipping a directed flag in one place, or mistyping a lifecycle name.

    ## What worked

    - **Four-file split along the backlog pattern.** `schema.rs` / `yaml_io.rs` / `defaults.rs` / `mod.rs` mirrors `src/state/backlog/{schema,yaml_io,verbs,mod}.rs` closely enough that a future reader who knows one knows the other. Kept each file small and cohesive per the universal coding-style rule.
    - **No host-application leakage (§9.6).** `load` / `save_atomic` take a `&Path` directly; no `config_root`, no `plan_dir`, no phases anywhere in `src/ontology/`. Phase B's extraction to a standalone crate becomes a file-move + `Cargo.toml` adjustment, not a decoupling refactor.
    - **Dual-independent schema versions.** Pinning `related-components.yaml` at `SCHEMA_VERSION = 2` while the ontology file itself is at `ONTOLOGY_FILE_SCHEMA_VERSION = 1` makes the two evolutions orthogonal. Adding a new `EdgeKind` does not bump the on-disk edge-graph schema version; adding a new evidence-field convention would.
    - **The "unsorted symmetric participants" test.** It caught a real gap in my first draft of `Edge::validate` that only enforced distinctness, not sorting. Symmetric edges that land with reversed participants would have caused silent dedup failures against the `canonical_key` output.

    ## What didn't work first time

    - **Backlog description typo.** The task brief said "16 kebab-case variants"; the canonical spec (§5) and direction table (§6) both list 17. I went with 17 (specification family is `conforms-to`, `co-implements`, `describes` — three, not two). If the next task's prompt rewrite depends on a count, it should read from `ontology.yaml` / `EdgeKind::all()`, not from memory of this description.

    ## What this suggests next

    - Task #2 in the chain (`migrate-callers-and-rename-to-related-components-no-migrator-delete-and-regenerate`) is now unblocked. Its scope note specifically calls out that Stage 2's transitional v1-emission must be swapped at the same time — `src/ontology/` now has everything Stage 2's code will need (`EdgeKind::parse`, `add_edge`, `save_atomic`).
    - `parse_embedded_ontology_yaml()` is already exported from `ontology::` — task #3's `{{ONTOLOGY_KINDS}}` prompt renderer can call it directly. No helper needs to be invented later.
    - Tests: 34 new unit tests pass; full workspace is 927 tests green; clippy clean.
- id: migrate-callers-and-rename-to-related-components-no-migrator-delete-and-regenerate
  title: Migrate callers and rename to related-components (no migrator; delete-and-regenerate)
  category: refactor
  status: not_started
  dependencies:
  - implement-ontology-v2-types-and-defaults-ontology-yaml-additive
  description: |
    **Priority: HIGH.** Swaps all internal consumers onto v2 types and ships the file rename. After this task, Ravel-Lite reads and writes `related-components.yaml` natively. There is no v1→v2 migrator: `related-projects.yaml` is an entirely-generated artifact, so the upgrade procedure is "delete v1 and re-run discover" per `docs/component-ontology.md` §12.

    **Depends on:** `implement-ontology-v2-types-and-defaults-ontology-yaml-additive` (types must exist).

    ## Scope

    Rename / refactor per `docs/component-ontology.md` §14.1:

    - **Module**: `src/related_projects.rs` contents absorbed into `src/ontology/` (or deleted if the v2 types live there already). Public items re-exported from `ontology::` under new names.
    - **Types**: `RelatedProjectsFile` → `RelatedComponentsFile`; `rename_project_in_edges` → `rename_component_in_edges`.
    - **Constants**: `RELATED_PROJECTS_FILE` → `RELATED_COMPONENTS_FILE`; value `"related-components.yaml"`.
    - **Load path**: hard error on `schema_version != 2` and on the old filename `related-projects.yaml`. Error message names the file, the observed version, the expected version, and the `discover --apply` command the user needs to run (§12.2). No in-memory upgrade.
    - **Callers**: every Rust file that referenced the old names updates to the new. Includes `src/projects.rs` rename cascade, `src/discover/apply.rs`, `src/multi_plan.rs`, `src/main.rs` CLI dispatch, `tests/state_related_projects.rs`.
    - **Test fixtures**: existing unit tests in `src/related_projects.rs:606–1077` rewritten against v2 shapes where they touch edges; preserve coverage of canonical-key / rename-cascade semantics.
    - **Legacy markdown migrator** (`state migrate-related-projects`): retire the CLI verb by default in this task (the `read_related_plans_markdown` per-plan integration remains untouched; only the *graph-populating* migrator retires). If this proves too aggressive, teach it to emit v2 `describes` / `depends-on` edges instead — note in the task's Results which path was taken.

    **Transitional behaviour** during this task's lifetime (not shipped): `src/discover/stage2.rs` still emits v1-shape `sibling` / `parent-of` edges into the proposals file. Since the v2 apply path rejects v1 shapes, Stage 2 must either be updated in this task to emit neutral placeholder edges *or* the Stage 2 rewrite (the next task) must be bundled. Preferred: take Stage 2 along here minimally (swap to v2 output schema, emit `weak`-grade edges with best-available kind) so the system stays runnable end-to-end; then the next task does the **prompt** rewrite and the full vocabulary swap.

    ## Out of scope

    - Stage 2 prompt rewrite for the new kind vocabulary (separate task).
    - CLI verb rename (`state related-projects` → `state related-components`); that happens here, but the deprecated-alias behaviour is the only CLI-facing change. New `add-edge` args (`lifecycle`, `evidence-grade`, etc.) are a separate task.
    - Extraction to a workspace crate (deferred).
    - Any form of v1→v2 schema migration. Delete-and-regenerate is the supported upgrade path.

    ## Exit criteria

    - `cargo test` green.
    - Loading a v1 `related-projects.yaml` produces a clear hard error naming the `discover --apply` command; no silent upgrade.
    - Loading a v2 file and re-saving is byte-identical (serde round-trip).
    - `ravel-lite state related-projects list` still works via the deprecated alias, emits a stderr deprecation warning, and delegates to the new verb.
    - No Rust symbol matches `grep -rn 'RelatedProjectsFile\\|RELATED_PROJECTS_FILE\\|rename_project_in_edges' src/` except in the deprecated-alias shim.
- id: rewrite-stage-2-discover-prompt-for-ontology-v2-vocabulary
  title: Rewrite Stage 2 discover prompt for ontology v2 vocabulary
  category: feature
  status: not_started
  dependencies:
  - migrate-callers-and-rename-to-related-components-no-migrator-delete-and-regenerate
  description: |
    **Priority: HIGH.** Flips Stage 2 from emitting v1 (`sibling` / `parent-of`) to emitting v2 directly, using the component-ontology vocabulary.

    **Depends on:** the caller-migration task.

    ## Scope

    - **Prompt rewrite** of `defaults/discover-stage2.md` per `docs/component-ontology.md` §13.2:
      - "Edge kinds" section replaced by `{{ONTOLOGY_KINDS}}` — a new template token rendered from `defaults/ontology.yaml` at Stage 2 launch time, not hard-coded in the prompt.
      - New "Decision tree" section explicitly walking the kind-picking order (§13.2 has the sketch).
      - Output schema updated: proposals emit `kind`, `lifecycle`, `participants`, `evidence_grade`, `evidence_fields`, `rationale`. `supporting_surface_fields` renamed to `evidence_fields`.
      - "Insufficient signals" section repurposed as the `weak` evidence-grade threshold; still listed verbatim as traps to avoid.
    - **Stage 2 code** (`src/discover/stage2.rs`, `src/discover/schema.rs`):
      - `ProposalRecord` gains `lifecycle`, `evidence_grade`, `evidence_fields` (these were likely stubbed in the previous task's transitional bundling; this task completes them).
      - `ProposalsFile` bumps `schema_version` to 2 definitively.
      - Stage 2 substitutes `{{ONTOLOGY_KINDS}}` using the loader from the ontology crate (`ontology::render_prompt_block()` or similar helper — define in this task).
    - **Apply phase** (`src/discover/apply.rs`) accepts v2 proposal shape natively.
    - **Drift test**: a test asserts that the kind list in `defaults/discover-stage2.md` (via the rendered token) is in bijection with `defaults/ontology.yaml` — same test style as the existing `shipped_pi_prompts_have_no_dangling_tokens`.
    - **Golden-file test** (optional but recommended): one fixture LLM output covering three v2 edge kinds + three lifecycles, asserting Stage 2 parses and applies correctly.

    ## Out of scope

    - Stage 1 `interaction_role_hints` field (separate task; Stage 2 must work without it).
    - CLI `add-edge` argument extension for `lifecycle` / `evidence-grade` (separate task; Stage 2 writes directly via the library, not the CLI).
    - Workspace-crate extraction.

    ## Exit criteria

    - Running `ravel-lite state related-components discover --apply` against a real catalog produces a v2 `related-components.yaml` with non-empty `lifecycle` + `evidence_grade` on every edge.
    - The Ravel-Lite → {Ravel, APIAnyware-MacOS, TestAnyware} smoke test that motivated v2 now produces `generates @ codegen` + `orchestrates @ dev-workflow` (or the evidence-appropriate variants) — not `parent-of`.
    - No dangling `{{…}}` tokens in the rendered Stage 2 prompt.
    - All drift tests green.
- id: extend-cli-for-ontology-v2-and-add-stage-1-interaction-role-hints
  title: Extend CLI for ontology v2 and add Stage 1 interaction_role_hints
  category: feature
  status: not_started
  dependencies:
  - rewrite-stage-2-discover-prompt-for-ontology-v2-vocabulary
  description: |
    **Priority: MEDIUM.** Brings the interactive CLI and Stage 1 surface-extraction up to v2 parity. After this task the CLI is fully v2-capable for humans, and Stage 2 gains Stage-1-sourced priors.

    **Depends on:** the Stage 2 prompt-rewrite task.

    ## Scope

    ### CLI extensions (`ravel-lite state related-components …`)

    Per `docs/component-ontology.md` §14.1:

    - **`add-edge`** signature extended:
      ```
      add-edge <kind> <lifecycle> <a> <b> \
        --evidence-grade <strong|medium|weak> \
        --evidence-field <string> [--evidence-field …] \
        --rationale <string>
      ```
      Validates `kind` against `EdgeKind::parse`, `lifecycle` against `LifecycleScope::parse`, `evidence-fields` non-empty unless `evidence-grade=weak`.
    - **`remove-edge`**: accepts `kind + lifecycle + a + b`. A v1-style remove without `lifecycle` is an error (not a silent "remove any matching").
    - **`list`** gains `--kind <K>` and `--lifecycle <L>` filters in addition to the existing `--plan <PLAN_DIR>` filter.
    - Deprecated alias `state related-projects` is kept through this release and removed at the end of it.

    ### Stage 1 optional hint field

    Per §13.1:

    - `SurfaceRecord` gains optional `interaction_role_hints: Vec<String>`. Closed vocabulary (enum strings: `generator`, `orchestrator`, `test-harness`, `spec-document`, `spawner`, `documented-by`, `client`, `server`, `library`, `tool`); unknowns rejected.
    - `defaults/discover-stage1.md` gains a "Role hints (optional)" section describing the vocabulary and when to emit each hint. Hints are advisory — Stage 2 still picks edges from cross-referenced evidence.
    - Stage 2 prompt updated to include the hint field in each component's surface dump, and the decision tree given a note that hints are priors, not verdicts.

    ### Tests

    - CLI integration tests for all extended subcommands, plus the deprecated-alias warning path.
    - Stage 1 drift test already exists for `SurfaceRecord` fields — extend to cover the new field.
    - Stage 2 prompt drift test: the rendered hint vocabulary matches the `SurfaceRecord` enum.

    ## Out of scope

    - Workspace-crate extraction (separate task).
    - Removing the deprecated `state related-projects` alias — that happens in the release after this one.

    ## Exit criteria

    - Manual smoke test: `add-edge generates codegen Ravel-Lite Ravel --evidence-grade strong --evidence-field Ravel-Lite.produces_files --evidence-field Ravel.consumes_files --rationale "…"` round-trips through YAML.
    - `list --kind generates --lifecycle codegen` filters correctly.
    - `state related-projects list` still works with a stderr deprecation banner.
    - A fresh discover run populates `interaction_role_hints` for at least one catalog project whose README clearly declares a role (e.g., Ravel-Lite declares itself as an orchestrator).
- id: add-set-description-verb-to-backlog-cli
  title: Add set-description verb to backlog CLI
  category: feature
  status: done
  dependencies: []
  description: |
    **Priority: MEDIUM.** Closes a conspicuous gap in the backlog CLI surface: every other mutable task field has a `set-*` verb (`set-status`, `set-title`, `set-results`, `set-handoff`), but the `description` field (the task body markdown, set at `add` time) has none. When a task description references external prose that is later restructured — e.g., a `docs/*.md` section renumber — there is no clean way to refresh the reference, forcing hand-edits of `backlog.yaml` that violate the "mechanical work belongs in Rust" rule.

    **Motivation.** Concretely surfaced during session 2026-04-23: splitting `docs/component-ontology.md` into a reference doc plus a migration doc invalidated four §-refs in three active backlog entries (§11.2, §12, §13.2, §14.1). Refreshing them cleanly required a verb that does not exist. The rot pattern recurs whenever a task description cites external file paths, line numbers, or section anchors that move.

    ## Scope

    - **New verb** `ravel-lite state backlog set-description <PLAN_DIR> <TASK_ID>` that mirrors `set-results` exactly:
      - `--body <value>` — inline string, or `-` to read stdin.
      - `--body-file <path>` — read body from a file path.
      - Exactly one of `--body` / `--body-file` required.
      - Refuse empty / whitespace-only bodies (descriptions are required at `add` time, so the field's invariant is non-empty).
    - **Atomic write** via the same helper used by the other `set-*` verbs — no partial-update window.
    - **Round-trip preservation** of other task fields (status, results, handoff, dependencies, title, id).
    - **CLI help text** describing when to use `set-description` vs. `set-results` — the former rewrites the task brief (intent, scope, constraints), the latter appends a summary of what was done.

    ## Out of scope

    - No `append-description` variant. If history matters, users keep a `## Change log` section inside the body and overwrite.
    - No diff output. The verb is a blind replace; callers that want to see the delta use `show` before and after.
    - No structured-field editing (e.g. editing only dependencies). Those fields have their own verbs or are immutable by design.

    ## Tests

    - Integration test: add task → `set-description` via `--body-file` → `show` returns the new body.
    - Integration test: `set-description` via `--body -` (stdin) round-trips.
    - Integration test: `set-description` on a non-existent task id errors cleanly.
    - Integration test: empty body rejected.
    - Integration test: setting description does not clobber status, results, handoff, title.

    ## Exit criteria

    - `ravel-lite state backlog --help` lists `set-description` alongside the other `set-*` verbs.
    - All five integration tests above pass.
    - No regression in the existing backlog test suite.
    - Documentation (if any exists — check `docs/structured-backlog-r1-plan.md`) updated to mention the new verb.
  results: |
    **Shipped.** Closes the CLI-surface gap identified in the task's motivation — every mutable task field now has a `set-*` verb.

    ## What landed

    - `run_set_description(plan_dir, id, body)` in `src/state/backlog/verbs.rs`. Mirrors `run_set_results` exactly except for one added invariant: `body.trim().is_empty()` is rejected with a clear error. This subsumes two cases in one check — the "neither `--body` nor `--body-file` supplied" case (which `resolve_body` already collapses to `""`) and the explicit whitespace-only case. One rule, one error path.
    - Trailing-newline normalisation via the shared `ensure_trailing_newline` helper, so bodies without a terminal `\n` still land as valid markdown.
    - CLI subcommand `SetDescription` in `src/main.rs`, wired through `dispatch_backlog` the same way `SetResults` / `SetHandoff` are. Help text explicitly disambiguates from `set-results` (what was done) and `set-handoff` (promote/archive hand-off) — the former rewrites the brief; the latter two append task history.
    - Five unit tests in `verbs.rs` and five integration tests in `tests/state_backlog.rs` covering: happy path via `--body-file`, happy path via `--body -` (stdin), unknown-id error, empty/whitespace rejection, and preservation of every other task field (status, title, results, handoff, id) across a description rewrite.

    ## What worked

    - **Runtime empty-body check over clap `ArgGroup`.** The task description required "exactly one of `--body` / `--body-file`". A simple `body.trim().is_empty()` check in the handler subsumes both "neither provided" (resolve_body → `""`) and "whitespace-only" into a single error message. No clap `ArgGroup`, no `required_unless_present`, no bifurcated error paths.
    - **The "preserve sibling fields" test.** Rather than asserting the description changed in isolation, the test first mutates four other fields (status, title, results, handoff), then rewrites the description, then asserts all five fields have their expected values after `show`. This is the test that would have caught a blind overwrite that accidentally cleared siblings.

    ## What didn't work first time

    - The first draft of the sibling-fields test used `for args in [...] { args }` with positional-arg ordering that put `plan_dir` after the task id, which `clap` rejected. I briefly left a broken scaffolded version in the file before noticing and replacing it with a `run(&[&str])` closure that orders arguments explicitly per-call. Removed before commit.

    ## What this suggests next

    - The memory entry `rename-cascade-registry-design-consideration` warned about a four-cascade extension point in `run_rename`; the same pressure applies to backlog CLI verbs — this is the fifth `set-*` verb (status / results / handoff / title / description). No refactor needed yet; pattern remains legible. Revisit if a sixth appears.
    - `set-description` is a blind replace. If a later task needs diff visibility (e.g., triage wants to see what a triage-subagent's description rewrite changed), the caller should run `show` before and after and diff client-side — the task description explicitly scoped out a diff-output variant.
- id: extract-component-ontology-to-workspace-crate-phase-b
  title: Extract component-ontology to workspace crate (Phase B)
  category: refactor
  status: not_started
  dependencies:
  - extend-cli-for-ontology-v2-and-add-stage-1-interaction-role-hints
  description: |
    **Priority: LOW (deferred).** Phase B of the extraction plan. Do not start until entry criteria below are met.

    **Depends on:** the CLI + Stage 1 hints task.

    ## Entry criteria (from `docs/component-ontology.md` §11.2)

    - Phase A (the v2 ontology in `src/ontology/`) has been stable for ≥1 release.
    - A second consumer inside Ravel-Lite is on the near horizon (e.g., a phase prompt renderer that walks the graph to inject context about a plan's component neighbours). If no second consumer is imminent, do not extract — the single-consumer crate is unjustified churn.

    ## Scope

    - Move `src/ontology/` → `crates/component-ontology/` in a Cargo workspace.
    - Convert the root `Cargo.toml` to a workspace manifest if it isn't already.
    - Update Ravel-Lite's `Cargo.toml` to depend on `component-ontology` via `path = "crates/component-ontology"`.
    - Verify zero Ravel-Lite-specific concepts in the extracted crate: no `LLM_STATE`, no phases, no plans, no backlog, no subagents. The crate's universe is edges, kinds, lifecycles, components, evidence.
    - Verify the dependency list is minimal (§11.4): `serde`, `serde_yaml`, `anyhow`, `thiserror` only.
    - Publish `defaults/ontology.yaml` as a crate-vendored file (include via `include_str!` or ship in the crate root and have Ravel-Lite copy at install).
    - Ship crate at `0.1.0` with a short README describing the standalone use case.
    - Verify `cargo build -p component-ontology` succeeds independently.
    - Verify all Ravel-Lite tests still pass.

    ## Out of scope

    - Publication to crates.io (Phase C; deferred until a second out-of-repo consumer exists).
    - Renaming the crate. `component-ontology` is intentionally the final name.
    - Introducing a trait registry for edge kinds — the flat enum suffices; premature.

    ## Exit criteria

    - Workspace builds and tests cleanly.
    - `component-ontology` crate has a standalone README documenting its public API.
    - No Ravel-Lite code imports `ravel_lite::ontology::…`; all imports route through `component_ontology::…`.
    - Semver policy documented in the crate README.
