tasks:
- id: fix-double-slash-path-join-in-work-phase-prompt-body-composition
  title: Fix double-slash path join in work-phase prompt body composition
  category: infra
  status: not_started
  dependencies: []
  description: |
    Fix the path-concatenation bug that produces double-slash paths (e.g., `//Users/.../ravel-lite-config//fixed-memory/...`) in the work-phase prompt body.

    ## What

    The `fixed-memory` section of the work-phase prompt is composed by concatenating `<config_root>/` with a path that already starts with a `/`-prefixed segment, rather than using a proper `Path::join`. The resulting double-slash paths are cosmetically wrong in the prompt body and, more critically, leak into claude's saved per-machine permission rules — observed in a colleague's `localSettings` as a `Read(//Users/.../ravel-lite-config/**)` rule.

    ## Where

    Likely `src/prompt.rs` or wherever `coding-style.md` (or any fixed-memory path) is referenced in the embedded work-phase template. Track down the join site and replace concatenation with `Path::join` or `path.join(segment)`.

    ## Verification

    - Work-phase prompt contains no `//` path sequences.
    - The colleague's future localSettings no longer accumulates double-slash Read rules from ravel-lite spawns.
- id: remove-redundant-add-dir-from-invoke-interactive-work-phase-spawn
  title: Remove redundant --add-dir from invoke_interactive work-phase spawn
  category: infra
  status: not_started
  dependencies: []
  description: |
    Remove the redundant `--add-dir <plan_dir>` argument from `invoke_interactive` in `src/agent/claude_code.rs` (work-phase spawn only).

    ## Why

    The plan directory is always a descendant of `ctx.project_dir`, which is the cwd claude is launched in. Claude already implicitly trusts its launch cwd, so `--add-dir <plan_dir>` adds nothing for trust purposes on the interactive work phase. Keeping it may trigger an unseen trust-grant modal on fresh machines, which is the leading hypothesis for the work-phase hang described in `diagnose-claude-tui-invisible-after-work-phase-banner-on-a-fresh-machine`.

    Headless phases (`-p` mode) legitimately need `--add-dir` and `--allowed-tools` (per memory: "Claude spawn with file-write needs --allowed-tools"). The interactive work phase does not — removing it from `invoke_interactive` is safe and is a correct simplification regardless of whether it resolves the hang.

    ## Where

    `src/agent/claude_code.rs` — `invoke_interactive` function, approximately line 39. Remove the `--add-dir <plan_dir>` arg; leave headless-phase spawn args untouched.

    ## Verification

    - Work-phase claude spawn no longer passes `--add-dir <plan_dir>`.
    - Headless phase spawns are unaffected.
    - On the affected colleague's machine, work phase no longer hangs after the banner.
- id: diagnose-claude-tui-invisible-after-work-phase-banner-on-a-fresh-machine
  title: 'Diagnose: claude TUI invisible after work-phase banner on a fresh machine'
  category: infra
  status: not_started
  dependencies: []
  description: |
    ## Symptom

    On a colleague's machine (macOS, local terminal, no multiplexer),
    running `ravel-lite run` past the work-phase banner produces a hang:
    the banner prints, then nothing more renders, and the terminal appears
    frozen. `ps aux | grep claude` confirms a claude process is alive.
    Claude version 2.1.119 on the affected machine. Same plan, same repo,
    same orchestrator binary work normally on the maintainer's machine, so
    the bug is environmental, not a deterministic code defect.

    ## What we already know rules out

    - **Not a multiplexer/handoff layer issue**: local terminal, no tmux,
      no screen, no mosh, no nested ssh.
    - **Not claude itself broken**: `claude` invoked standalone in the
      same project dir works fine.
    - **Not a process-death issue**: claude is alive (ps confirms), so
      ravel-lite's `std::process::Command::new("claude").status()` in
      `src/agent/claude_code.rs:183` is correctly blocked waiting for
      claude to exit. The hang is on claude's side.
    - **Not "no further log lines = hung"**: claude's debug log emits
      init events only; once it transitions to its Ink TUI the absence of
      log lines is expected.

    ## Working hypothesis ladder

    **(A) — strongest** — Trust/permission modal claude renders that the
    user can't see. Trust state lives in `~/.claude.json` per machine and
    accumulates as users approve directories over time. The
    maintainer's machine has every directory ravel-lite has ever passed
    already trusted; a fresh machine doesn't. The colleague's debug log
    shows claude *applying* a stored rule (`Read(//Users/.../ravel-lite-
    config/**)`) into localSettings during init — partial pre-existing
    trust, possibly inconsistent. If `--add-dir <plan_dir>` triggers a
    fresh modal, the user can't answer it because the modal isn't
    visible (cursor-position state at handoff with ratatui's inline
    viewport).

    **(B)** — Inline-viewport handoff bug. ratatui in `src/ui.rs:244` runs
    in `Viewport::Inline(1)` mode, never enters alt-screen. Modern
    Claude Code (Ink-based) also draws inline. They compete for cursor-
    anchored rendering in the same main-screen region. The suspend
    volley in `src/ui.rs:298` was tuned by trial and error; it may miss
    a reset that matters on this specific terminal/scrollback state.

    **(C)** — Stale/corrupt entry in the colleague's `~/.claude.json` that
    puts claude into a bad waiting state on first contact with `--add-
    dir`. Cousin of (A), distinguished only by remediation: (A) needs
    the user to grant trust, (C) needs the user to delete a corrupt
    record.

    ## Side-discovery worth landing regardless

    - **Path-concatenation bug** producing the literal double-slash
      `/Users/.../ravel-lite-config//fixed-memory/...` in the work-phase
      prompt body. Whoever composes the fixed-memory section concatenates
      `<config_root>/` with `/fixed-memory/...` instead of joining
      cleanly. Cosmetic in the prompt, but the path leaks into claude's
      saved permission rules — the colleague's localSettings already
      contains a double-slash `Read(//Users/.../ravel-lite-config/**)`
      rule that originated from this. Hunt down the join site (likely
      `src/prompt.rs` or wherever `coding-style.md` is referenced in the
      embedded work-phase template) and use a proper path join.
    - **Redundant `--add-dir <plan_dir>` on the work phase**. The plan
      directory is always a descendant of `ctx.project_dir`, which is the
      cwd claude is launched in. claude already trusts cwd implicitly. The
      `--add-dir` adds nothing for trust purposes and may be the trigger
      for the unseen modal in hypothesis (A). Headless phases use `-p`
      and need `--add-dir` for their own reasons (per memory note
      `Claude spawn with file-write needs --allowed-tools`); the work
      phase does not. Removing it from `invoke_interactive` in
      `src/agent/claude_code.rs:39` (work-phase only) is a safe
      simplification and may be a complete fix on its own.

    ## Decisive next test

    Have the affected user run, by hand, the spawn ravel-lite would
    issue, in a fresh terminal:

    ```bash
    cd ~/.dev/dull/frontend/apps/launcher-web
    claude --add-dir ~/.dev/dull/frontend/apps/launcher-web/LLM_STATE/<plan>
    ```

    Three outcomes:

    - **Locks up identically** → not a ravel-lite handoff bug. The
      combination of `--add-dir` and their environment alone reproduces
      it. Fix is on the spawn-args side: drop the redundant `--add-dir`
      and/or pre-grant trust.
    - **Works fine** → the bug is in ravel-lite's terminal handoff
      specifically. Investigation pivots to `src/ui.rs:298` reset volley
      and the `terminal.clear() + disable_raw_mode()` ordering.
    - **Shows a visible y/n modal once, then proceeds** → first-run trust
      is the cause; document a one-time trust acceptance step or fix in
      ravel-lite by dropping the redundant `--add-dir`.

    ## Cheap parallel bypasses they can try

    1. Inspect their trust state:

       ```bash
       jq '.projects | keys' ~/.claude.json | grep launcher-web
       ```

       Absence of the plan-dir path is evidence for (A).

    2. Set `dangerous: true` for the work phase in their plan's
       `config.lua` so ravel-lite appends `--dangerously-skip-
       permissions` (read path: `params[<phase>][dangerous]` in
       `src/agent/claude_code.rs:32-37`). If the lockup disappears, (A) is
       confirmed. If it persists, dig into (B).

    ## What "done" looks like for this task

    - Root cause identified by either the manual-spawn test or the
      `dangerous: true` test above.
    - Either ravel-lite changes (most likely: drop `--add-dir` from
      `invoke_interactive`, fix the double-slash join in prompt
      composition) or a documented user-side remediation (one-time
      trust step).
    - Regression catch: a smoke note or test that exercises a fresh-
      trust-state scenario, since the bug is invisible from the
      maintainer's machine where trust is already granted.

    ## Notes for the next session

    - The colleague has Claude 2.1.119; verify maintainer's version is
      compatible (mismatched versions can change `--add-dir` semantics).
    - The colleague's env: macOS, local terminal, no multiplexer, plan
      at `~/.dev/dull/frontend/apps/launcher-web/LLM_STATE/<plan>`,
      ravel-lite-config at `~/.dev/ravel-lite-config/`.
    - Their localSettings already contains a malformed double-slash
      `Read(//Users/.../ravel-lite-config/**)` rule from a prior run.
      When fixed, they may want to clean that up too.
- id: v1-to-v2-migration-with-auto-cleanup-of-materialised-defaults
  title: v1 to v2 migration with auto-cleanup of materialised defaults
  category: feature
  status: not_started
  dependencies: []
  description: |
    On the first command that consumes config in a legacy v1 plan/config
    dir, detect the v1 layout, translate `config.yaml` (+ optional
    `*.local.yaml` deep-merged) into `config.lua`, delete every
    tool-materialised file, and stamp `config_version = 2`. Idempotent;
    runs at most once per dir.

    ## Why

    When the lua-config + embedded-defaults landings ship (separate
    tasks), every existing config dir on disk is in v1 layout: it
    contains materialised prompts, agent definitions, `config.yaml`, and
    possibly `config.local.yaml`. Without cleanup, those files become
    dead clutter the new binary ignores. Auto-migration on first run
    gives the user a zero-step upgrade and a clean disk.

    Zero current users → migration code only handles one transition
    (v1 → v2) and only runs once per dir. After the first cycle past
    this landing, every dir in existence is v2; the migration code can
    be deleted in a future v3.

    ## Scope

    Detection:

    - A config dir is v1 iff `config.lua` is absent AND any of
      (`config.yaml` exists, any `*.local.yaml` exists, `prompts/` dir
      exists, `agents/` dir exists with materialised content) is true.
    - Otherwise v2 (or fresh, indistinguishable for our purposes).

    Translation:

    - Read `<config>/config.yaml` deep-merged with
      `<config>/config.local.yaml` using the existing `merge_yaml`
      logic. The YAML reader stays available specifically for
      migration.
    - Same for each `<config>/agents/<name>/config.yaml` and
      `tokens.yaml` (+ their `.local.yaml` overlays).
    - Translate the merged maps into a single Lua source string: emit
      setter calls / table assignments equivalent to the YAML keys, plus
      `ravel.config.config_version = 2`.
    - Write `<config>/config.lua` first (with version stamp).

    Deletion:

    - Delete every file in the embedded-defaults set that exists on disk
      under the config dir, plus `config.yaml`, `config.local.yaml`, all
      agent `config.yaml` / `config.local.yaml` / `tokens.yaml` /
      `tokens.local.yaml` files, and any now-empty directories.
    - Order: write new `config.lua` first; delete legacy files last. If
      a deletion step fails, the next run re-detects v1 (because legacy
      files still exist) and retries cleanly.

    Tests:

    - Golden directory transformation: a captured v1 fixture dir → run
      migration → assert the resulting v2 dir matches an expected file
      list and the `config.lua` content matches a golden string.
    - Idempotency: re-running migration on a v2 dir is a no-op.
    - Crash recovery: simulate a crash between writing `config.lua` and
      deleting legacy files; assert the next run completes the migration
      cleanly.

    ## Decisions already made

    - One-jump migration (v1 → v2 directly). No intermediate v1.5 step.
    - Customised prompt content (rare/nonexistent given zero current
      users) is deleted without warning. Acceptable simplification.
    - `config_version = 2` stored in `config.lua` is the only marker
      needed; there is no separate sentinel file.
    - Migration is unconditional and silent (no prompt). Cost of
      upgrading.

    ## Verification

    - A captured v1 fixture dir migrates to a v2 dir whose only files
      are `config.lua` (new) plus, for the global dir, anything that's
      truly user-owned (in practice: just `config.lua`).
    - Re-running migration on a v2 dir is a no-op (same file mtimes
      acceptable, same content required).
    - A crash injected between writing `config.lua` and deleting legacy
      files leaves the dir in a state where the next run completes the
      migration without losing data.

    ## Dependencies

    Depends on the lua-config landing (the Lua reader must exist) and
    the embedded-defaults landing (so we know which paths to delete).
