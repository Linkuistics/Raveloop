- id: add-set-dependencies-verb-backfill-deps-on-existing-tasks-teach-triage-to-maintain-the-field
  title: Add set-dependencies verb; backfill deps on existing tasks; teach triage to maintain the field
  category: infra
  status: not_started
  dependencies: []
  description: |
    Backlog tasks currently have an empty `dependencies: []` field even when the description prose encodes a real dependency (e.g. T3 says "Depends on T1" but the YAML field is empty). This matters for two reasons: (a) the `--ready` filter on `ravel-lite state backlog list` relies on the `dependencies` field, so with empty deps it will happily surface T3 as "ready" even when T1 hasn't landed; (b) downstream tooling (ordering heuristics, cross-plan propagation) has no machine-readable graph to work from.

    Scope — three parts:

    1. **Add a `set-dependencies` CLI verb.** `ravel-lite state backlog set-dependencies <plan> <id> --deps <id1,id2>` (or `--deps ""` to clear). Validate every id exists in the same plan's backlog (same check `run_add` already performs); reject self-references; reject cycles (the add-path does not currently check cycles because deps must already exist when a task is created, but post-hoc edits can create them). Mirrors the shape of `run_add`'s dep validation. Add unit tests covering: happy path, unknown-id rejection, cycle rejection, self-reference rejection, empty-string clears.

    2. **Retroactively fix the current LLM_STATE/core backlog.** Once the verb exists, set deps on the six existing tasks to match the prose:
       - T3 `write-reference-page-covering-all-user-facing-cli-verbs` → depends on T1
       - T5 `integrate-testanyware-vm-...` → depends on T1 and T4
       - T2 `write-user-guide-covering-install-...` → depends on T1
       - T6 `publish-new-docs-update-projects-ravel-lite-html-hub-and-sync-yml` → depends on T2 and T3
       - T1 and T4 stay dependency-free.
       (T5 also mentions being "supported by T1 and T4" — that is a real hard dependency for the VM-driven capture, so include both.)

    3. **Extend the triage phase.** `defaults/phases/triage.md` currently does not instruct the agent to maintain the `dependencies` field. Add an instruction block: when triage adjusts the backlog (adds, renames, promotes from handoffs, or reads prose that names another task), it should keep the structured `dependencies` field in sync with the narrative. Specifically: when a new task's description says "depends on X" / "blocked by X" / "requires X", the triage agent must also pass `--dependencies X` at add time; when retitling or reshuffling, re-read the affected descriptions and call the new `set-dependencies` verb if the prose and field disagree. Keep the instruction surgical — a few sentences pointing at the verb and the invariant, not a new section.

    Done when: verb exists with tests green, the six tasks above show correct `dependencies` arrays in `backlog list`, and triage.md mentions the invariant and points at `set-dependencies`.
