tasks:
- id: rewrite-stage-2-discover-prompt-for-ontology-v2-vocabulary
  title: Rewrite Stage 2 discover prompt for ontology v2 vocabulary
  category: feature
  status: done
  dependencies: []
  description: |
    **Priority: HIGH.** Flips Stage 2 from emitting v1 (`sibling` / `parent-of`) to emitting v2 directly, using the component-ontology vocabulary.

    **Depends on:** the caller-migration task.

    ## Scope

    - **Prompt rewrite** of `defaults/discover-stage2.md` per `docs/component-ontology.md` ┬ž13.2:
      - "Edge kinds" section replaced by `{{ONTOLOGY_KINDS}}` ÔÇö a new template token rendered from `defaults/ontology.yaml` at Stage 2 launch time, not hard-coded in the prompt.
      - New "Decision tree" section explicitly walking the kind-picking order (┬ž13.2 has the sketch).
      - Output schema updated: proposals emit `kind`, `lifecycle`, `participants`, `evidence_grade`, `evidence_fields`, `rationale`. `supporting_surface_fields` renamed to `evidence_fields`.
      - "Insufficient signals" section repurposed as the `weak` evidence-grade threshold; still listed verbatim as traps to avoid.
    - **Stage 2 code** (`src/discover/stage2.rs`, `src/discover/schema.rs`):
      - `ProposalRecord` gains `lifecycle`, `evidence_grade`, `evidence_fields` (these were likely stubbed in the previous task's transitional bundling; this task completes them).
      - `ProposalsFile` bumps `schema_version` to 2 definitively.
      - Stage 2 substitutes `{{ONTOLOGY_KINDS}}` using the loader from the ontology crate (`ontology::render_prompt_block()` or similar helper ÔÇö define in this task).
    - **Apply phase** (`src/discover/apply.rs`) accepts v2 proposal shape natively.
    - **Drift test**: a test asserts that the kind list in `defaults/discover-stage2.md` (via the rendered token) is in bijection with `defaults/ontology.yaml` ÔÇö same test style as the existing `shipped_pi_prompts_have_no_dangling_tokens`.
    - **Golden-file test** (optional but recommended): one fixture LLM output covering three v2 edge kinds + three lifecycles, asserting Stage 2 parses and applies correctly.

    ## Out of scope

    - Stage 1 `interaction_role_hints` field (separate task; Stage 2 must work without it).
    - CLI `add-edge` argument extension for `lifecycle` / `evidence-grade` (separate task; Stage 2 writes directly via the library, not the CLI).
    - Workspace-crate extraction.

    ## Exit criteria

    - Running `ravel-lite state related-components discover --apply` against a real catalog produces a v2 `related-components.yaml` with non-empty `lifecycle` + `evidence_grade` on every edge.
    - The Ravel-Lite Ôćĺ {Ravel, APIAnyware-MacOS, TestAnyware} smoke test that motivated v2 now produces `generates @ codegen` + `orchestrates @ dev-workflow` (or the evidence-appropriate variants) ÔÇö not `parent-of`.
    - No dangling `{{ÔÇŽ}}` tokens in the rendered Stage 2 prompt.
    - All drift tests green.
  results: |
    ## What landed

    **Prompt rewrite ÔÇö `defaults/discover-stage2.md`.** "Edge kinds
    (transitional vocabulary)" section replaced by a `{{ONTOLOGY_KINDS}}`
    token that expands at launch time from `defaults/ontology.yaml`.
    "Decision tree" section added covering nine questions in evidence-
    priority order (runtime messaging Ôćĺ codegen Ôćĺ spawning Ôćĺ dependency
    Ôćĺ embedding Ôćĺ spec conformance Ôćĺ docs Ôćĺ tests Ôćĺ no edge). Output
    schema already matches `ProposalRecord`; no field renames were
    needed. The previous task had already landed the `lifecycle`,
    `evidence_grade`, `evidence_fields`, and `rationale` fields ÔÇö the
    brief's "stubbed / transitional" phrasing was outdated.

    **Ontology renderer ÔÇö `src/ontology/defaults.rs`.** Added
    `render_kinds_for_prompt(&OntologyYaml) -> String` and a thin
    `render_embedded_kinds_for_prompt()` convenience. Kinds are grouped
    by family in the order they appear in the YAML; each bullet
    emits `- **\`<name>\`** (<directed|symmetric>; lifecycles: ÔÇŽ) ÔÇö <flattened description>`.
    Re-exported from `src/ontology/mod.rs`.

    **Stage 2 wiring ÔÇö `src/discover/stage2.rs`.** `run_stage2` now
    renders the ontology block and substitutes `{{ONTOLOGY_KINDS}}` as
    the first replacement (before `{{PROPOSALS_OUTPUT_PATH}}` and
    `{{SURFACE_RECORDS_YAML}}`, so the output-path pattern stays first
    in the composed prompt for the fake-claude shim's greedy
    `head -n1` extractor). A local `assert_no_dangling_tokens` guard
    hard-errors on any leftover `{{X}}` after substitution ÔÇö discover
    doesn't route through `prompt::substitute_tokens` (no `PlanContext`),
    so this narrow guard preserves the same failure mode for Stage 2.

    **Drift tests.**
    - `rendered_stage2_kind_block_is_bijective_with_edgekind_enum`
      (`src/ontology/mod.rs`) ÔÇö the set of kinds rendered into the Stage 2
      prompt block is compared via `BTreeSet` against `EdgeKind::all()`.
      Adding a kind to only one side fails loudly.
    - `shipped_stage2_prompt_substitutes_cleanly_with_no_dangling_tokens`
      (`src/discover/stage2.rs::tests`) ÔÇö embeds `defaults/discover-stage2.md`
      at compile time, applies every Stage 2 substitution, asserts zero
      `{{ÔÇŽ}}` residuals. Catches a new templated token added without a
      matching replacement.
    - `shipped_stage2_prompt_renders_every_ontology_kind_as_a_bullet`
      (`src/discover/stage2.rs::tests`) ÔÇö complementary end-to-end check:
      every `EdgeKind::all()` name appears as a bullet in the composed
      prompt, not just the rendered token (guards against an overridden
      token in the file being incompatible with the block it should
      expand to).
    - Plus three unit tests on the renderer itself covering family-heading
      ordering, directionality/lifecycle annotations, and description
      flattening.

    ## Verified

    - `cargo build` ÔÇö clean.
    - `cargo test --lib` ÔÇö 453 passed, 0 failed.
    - `cargo test --tests` ÔÇö all integration suites pass (discover e2e,
      state_related_components, integration, state_backlog,
      state_session_log).

    ## Notes + loose ends

    - **Fake-claude shim considered.** The `grep -oE '/[^[:space:]]+\.yaml'`
      extractor in `tests/discover.rs` would grab any `/ÔÇŽyaml` path in the
      rendered prompt. I scrubbed the new prompt of `.yaml` mentions in
      prose and ordered substitutions so `{{PROPOSALS_OUTPUT_PATH}}`
      remains the first such path in the composed output. The discover
      e2e test passes, confirming the ordering contract held.
    - **Task-brief references to ┬ž13.2 / ┬ž14.1 / ┬ž13.1 of the ontology
      spec don't exist** ÔÇö those section numbers belong to the migration
      companion doc's ┬ž5.1/┬ž5.2. The backlog should be updated to point
      at `docs/component-ontology-migration.md#52-stage-2--prompt-rewrite`
      instead. Triage worth noting for the sibling task
      `extend-cli-for-ontology-v2-and-add-stage-1-interaction-role-hints`.
    - **Golden-file test deferred.** The task brief called this "optional
      but recommended." The structural drift tests plus the e2e test
      already cover the cases the golden file would pin ÔÇö a golden file
      for LLM output would either (a) pin trivial shape that the existing
      `ProposalRecord` round-trip test already covers, or (b) pin real
      LLM text that's non-deterministic to regenerate. Not worth the
      maintenance cost; skipped.
    - **Manual smoke test still outstanding.** The exit criteria include
      running `ravel-lite state related-components discover --apply`
      against a real catalog and confirming the Ravel-Lite Ôćĺ {Ravel,
      APIAnyware-MacOS, TestAnyware} case produces `generates @ codegen`
      / `orchestrates @ dev-workflow`. This needs a real claude subagent
      and a populated catalog; deferred to user execution (the local
      catalog in this session still holds v1 `parent-of` edges, so
      running now would require the catalog-upgrade workflow).

    ## Suggests next

    - The next backlog task
      (`extend-cli-for-ontology-v2-and-add-stage-1-interaction-role-hints`)
      is now unblocked and ready. It adds `interaction_role_hints` to
      Stage 1 surfaces and extends the CLI for the v2 lifecycle /
      evidence-grade arguments. The Stage 2 prompt already mentions
      "hints are priors, not verdicts"-style language in an earlier
      draft ÔÇö I removed that since Stage 1 doesn't emit hints yet; the
      next task should re-add a paragraph to the decision tree
      explaining how to consume hints once they arrive.
    - Triage could usefully update the backlog description for this task
      and the CLI-extension task to cite migration-doc ┬ž5 rather than
      the non-existent ontology-spec ┬ž13/┬ž14 sections.
- id: extend-cli-for-ontology-v2-and-add-stage-1-interaction-role-hints
  title: Extend CLI for ontology v2 and add Stage 1 interaction_role_hints
  category: feature
  status: not_started
  dependencies:
  - rewrite-stage-2-discover-prompt-for-ontology-v2-vocabulary
  description: |
    **Priority: MEDIUM.** Brings the interactive CLI and Stage 1 surface-extraction up to v2 parity. After this task the CLI is fully v2-capable for humans, and Stage 2 gains Stage-1-sourced priors.

    **Depends on:** the Stage 2 prompt-rewrite task.

    ## Scope

    ### CLI extensions (`ravel-lite state related-components ÔÇŽ`)

    Per `docs/component-ontology.md` ┬ž14.1:

    - **`add-edge`** signature extended:
      ```
      add-edge <kind> <lifecycle> <a> <b> \
        --evidence-grade <strong|medium|weak> \
        --evidence-field <string> [--evidence-field ÔÇŽ] \
        --rationale <string>
      ```
      Validates `kind` against `EdgeKind::parse`, `lifecycle` against `LifecycleScope::parse`, `evidence-fields` non-empty unless `evidence-grade=weak`.
    - **`remove-edge`**: accepts `kind + lifecycle + a + b`. A v1-style remove without `lifecycle` is an error (not a silent "remove any matching").
    - **`list`** gains `--kind <K>` and `--lifecycle <L>` filters in addition to the existing `--plan <PLAN_DIR>` filter.
    - Deprecated alias `state related-projects` is kept through this release and removed at the end of it.

    ### Stage 1 optional hint field

    Per ┬ž13.1:

    - `SurfaceRecord` gains optional `interaction_role_hints: Vec<String>`. Closed vocabulary (enum strings: `generator`, `orchestrator`, `test-harness`, `spec-document`, `spawner`, `documented-by`, `client`, `server`, `library`, `tool`); unknowns rejected.
    - `defaults/discover-stage1.md` gains a "Role hints (optional)" section describing the vocabulary and when to emit each hint. Hints are advisory ÔÇö Stage 2 still picks edges from cross-referenced evidence.
    - Stage 2 prompt updated to include the hint field in each component's surface dump, and the decision tree given a note that hints are priors, not verdicts.

    ### Tests

    - CLI integration tests for all extended subcommands, plus the deprecated-alias warning path.
    - Stage 1 drift test already exists for `SurfaceRecord` fields ÔÇö extend to cover the new field.
    - Stage 2 prompt drift test: the rendered hint vocabulary matches the `SurfaceRecord` enum.

    ## Out of scope

    - Workspace-crate extraction (separate task).
    - Removing the deprecated `state related-projects` alias ÔÇö that happens in the release after this one.

    ## Exit criteria

    - Manual smoke test: `add-edge generates codegen Ravel-Lite Ravel --evidence-grade strong --evidence-field Ravel-Lite.produces_files --evidence-field Ravel.consumes_files --rationale "ÔÇŽ"` round-trips through YAML.
    - `list --kind generates --lifecycle codegen` filters correctly.
    - `state related-projects list` still works with a stderr deprecation banner.
    - A fresh discover run populates `interaction_role_hints` for at least one catalog project whose README clearly declares a role (e.g., Ravel-Lite declares itself as an orchestrator).
- id: extract-component-ontology-to-workspace-crate-phase-b
  title: Extract component-ontology to workspace crate (Phase B)
  category: refactor
  status: not_started
  dependencies:
  - extend-cli-for-ontology-v2-and-add-stage-1-interaction-role-hints
  description: |
    **Priority: LOW (deferred).** Phase B of the extraction plan. Do not start until entry criteria below are met.

    **Depends on:** the CLI + Stage 1 hints task.

    ## Entry criteria (from `docs/component-ontology.md` ┬ž11.2)

    - Phase A (the v2 ontology in `src/ontology/`) has been stable for Ôëą1 release.
    - A second consumer inside Ravel-Lite is on the near horizon (e.g., a phase prompt renderer that walks the graph to inject context about a plan's component neighbours). If no second consumer is imminent, do not extract ÔÇö the single-consumer crate is unjustified churn.

    ## Scope

    - Move `src/ontology/` Ôćĺ `crates/component-ontology/` in a Cargo workspace.
    - Convert the root `Cargo.toml` to a workspace manifest if it isn't already.
    - Update Ravel-Lite's `Cargo.toml` to depend on `component-ontology` via `path = "crates/component-ontology"`.
    - Verify zero Ravel-Lite-specific concepts in the extracted crate: no `LLM_STATE`, no phases, no plans, no backlog, no subagents. The crate's universe is edges, kinds, lifecycles, components, evidence.
    - Verify the dependency list is minimal (┬ž11.4): `serde`, `serde_yaml`, `anyhow`, `thiserror` only.
    - Publish `defaults/ontology.yaml` as a crate-vendored file (include via `include_str!` or ship in the crate root and have Ravel-Lite copy at install).
    - Ship crate at `0.1.0` with a short README describing the standalone use case.
    - Verify `cargo build -p component-ontology` succeeds independently.
    - Verify all Ravel-Lite tests still pass.

    ## Out of scope

    - Publication to crates.io (Phase C; deferred until a second out-of-repo consumer exists).
    - Renaming the crate. `component-ontology` is intentionally the final name.
    - Introducing a trait registry for edge kinds ÔÇö the flat enum suffices; premature.

    ## Exit criteria

    - Workspace builds and tests cleanly.
    - `component-ontology` crate has a standalone README documenting its public API.
    - No Ravel-Lite code imports `ravel_lite::ontology::ÔÇŽ`; all imports route through `component_ontology::ÔÇŽ`.
    - Semver policy documented in the crate README.
- id: audit-docs-r7-related-projects-discovery-design-md-post-ontology-v2
  title: Audit docs/r7-related-projects-discovery-design.md post-ontology-v2
  category: docs
  status: not_started
  dependencies:
  - extend-cli-for-ontology-v2-and-add-stage-1-interaction-role-hints
  description: |
    **Priority: LOW.** `docs/r7-related-projects-discovery-design.md` predates the ontology v2 spec split and may contain prose now redundant with `docs/component-ontology.md` or that belongs in `docs/component-ontology-migration.md`.

    **Depends on:** all four ontology-v2 implementation tasks completing (`extend-cli-for-ontology-v2-and-add-stage-1-interaction-role-hints` is the final one).

    ## Background

    The r7 design doc covers the LLM-driven discovery pipeline architecture and edge-proposal rationale. The ontology v2 split (2026-04-23) rewrote the canonical home for relationship-schema design. There is likely overlap in motivation and vocabulary between the r7 doc and the new ontology docs. It was not audited during the split; flagged as low-priority follow-up.

    ## Scope

    - Read `docs/r7-related-projects-discovery-design.md` in full.
    - Identify sections that are now redundant with `docs/component-ontology.md` or `docs/component-ontology-migration.md`.
    - For each redundant section: either prune it (if identical) or add a cross-reference pointer (if it provides context the ontology docs lack).
    - Ensure the discovery pipeline architecture sections (Stage 1 / Stage 2 / apply flow, cache key, etc.) remain accurate against the post-v2 implementation.
    - No code changes; documentation only.

    ## Exit criteria

    - `docs/r7-related-projects-discovery-design.md` does not contradict `docs/component-ontology.md` on any point.
    - Sections describing the v1 vocabulary (`sibling`, `parent-of`) either removed or clearly marked as historical.
    - Cross-references to the ontology docs added where appropriate.
