- id: add-snapshot-test-for-format-result-text-two-part-output-shape
  title: Add snapshot test for format_result_text two-part output shape
  category: core
  status: done
  dependencies: []
  description: |
    Add an end-to-end snapshot test in `tests/format_result_text.rs` (or inline in `src/format.rs` tests) that pins the two-part output shape against a representative example LLM response.

    ## What

    The two-part contract introduced by `restore-intent-label-richness-in-headless-phase-preamble-for-action-renderer` is:

    1. Narrative preamble — brief paragraph + one labelled intent line per action (`[PROMOTED] subject — reason`, etc.)
    2. Blank line, then verbatim renderer output from `ravel-lite state phase-summary render`

    `format_result_text` in `src/format.rs` understands all `ACTION_INTENTS` labels and the `→ continuation` pattern. Tests in that module cover individual label behaviours but there is no test that gives `format_result_text` a full two-part example and asserts that:
    - Intent-bearing labels (`[PROMOTED]`, `[ARCHIVED]`, `[BLOCKER]`, `[DISPATCH]`) render with the styled title + dim reason two-row layout
    - Structural labels from the renderer (`[NEW]`, `[DONE]`, `[STALE]`, `[OBSOLETE]`, `[REPRIORITISED]`, `[STATS]`) render correctly after the blank-line separator
    - Prose paragraph text passes through unmodified

    ## Why

    Without a snapshot test, a prompt drift (a phase prompt that stops asking the LLM to emit intent labels) produces no test failure. The regression introduced by `ce240f9` went undetected until a later review because there were no tests validating the full pipeline.

    ## Scope

    - One integration test or inline snapshot test that constructs a representative multi-part string (preamble + intent labels + blank line + structural labels) and asserts on rendered output.
    - No changes to `src/format.rs` unless a bug is found while writing the test.

    ## Verification

    `cargo test` — all existing tests still pass; new test passes.
  results: |
    ## What was done

    Added `format_result_text_pins_two_part_triage_output_shape` inline in `src/format.rs` (alongside the other 25+ `format_result_text_*` tests, which is the project's established convention — a separate `tests/format_result_text.rs` would have needed to re-implement the private `flat_text` / `flat_text_all` helpers).

    The test feeds a representative full triage transcript through `format_result_text` — narrative preamble with all five intent-bearing labels, a blank-line separator, and a structural label list mimicking the renderer's diff output — and asserts six contracts simultaneously:

    1. **Every intent-bearing label** (`PROMOTED`, `ARCHIVED`, `REPRIORITISED`, `BLOCKER`, `DISPATCH`) renders with a bold-intent tag span at the correct `Intent` and a dim reason span carrying the right text.
    2. **Structural labels** (`DONE`, `NEW`, `OBSOLETE`, `STATS`) render after the blank-line separator with their renderer-side intent (`Added`, `Removed`, dim).
    3. **`REPRIORITISED` appears in *both* halves** (intent preamble + structural diff) and both occurrences render — pins the new label-routing contract added in this same cycle by `triage-must-include-a-reason-for-every-reprioritisation`.
    4. **Preamble prose** (free-form sentence) survives unchanged as dim text — the pass-through path that's easy to silently break with a regex tweak.
    5. **The two halves are separated by ≥1 blank line** — pins the visual contract that the renderer's structural list isn't visually fused to the LLM's preamble.
    6. **Renderer is ANSI-free end-to-end** — guards the renderer-agnostic styling contract documented at `src/format.rs:9-11`.

    A doc-comment on the test names the regression class it targets (commit `ce240f9`, where a prompt-side drift dropped intent labels and went undetected because no test exercised the full pipeline). That's the *why* of this test, captured where any future maintainer touching the test will see it.

    ## Why structural assertions, not a verbatim-string snapshot

    Considered both. The existing 25+ `format_result_text_*` tests in this module all use targeted span lookups (style + text) rather than verbatim string snapshots — that's the deliberate project style. A verbatim-string snapshot would also be brittle to `LABEL_WIDTH` shifts (it changes whenever a new label lands in `ACTION_INTENTS`), producing false positives on innocuous changes. The structural-assertion approach catches the real regression class (any label-class drops out, any intent re-mapping, any pass-through path silently breaks) without false-positive churn.

    ## Verification

    - `cargo test --quiet --lib format::tests::format_result_text_pins_two_part_triage_output_shape` → passes in isolation.
    - `cargo test --quiet` → 586 lib tests pass (was 585), all integration tests pass.

    ## What didn't work / wasn't attempted

    - **Pre-existing clippy failure surfaced.** While running `cargo clippy --lib` to lint the new test code, it failed on `src/state/backlog/render.rs:95` (`unnecessary_sort_by` — clippy suggests `sort_by_key` over a `cmp` closure). Confirmed pre-existing on `main` via `git stash` + clippy + `git stash pop`. Not in scope for this task; should be its own follow-up. The fix is mechanical (one line) but is unrelated to the snapshot test.

    ## What this suggests next

    - **File a small follow-up backlog task** for the clippy `unnecessary_sort_by` warning at `src/state/backlog/render.rs:95`. Worth adding `cargo clippy --lib -- -D warnings` to a CI check (or a pre-commit hook) so future drifts surface immediately.
    - If a verbatim snapshot ever becomes desirable (e.g. for snapshot-style review of TUI output), `insta` is the natural choice — but the case for it isn't strong today; structural assertions match the existing test style and are less brittle.
- id: triage-must-include-a-reason-for-every-reprioritisation
  title: Triage must include a reason for every reprioritisation
  category: core
  status: done
  dependencies: []
  description: |
    Triage currently emits a structural `[REPRIORITISED] <title>` line via the renderer (diffed from the backlog baseline), but the LLM is never asked to supply a reason in the narrative preamble. The other intent-bearing labels (`[PROMOTED]`, `[ARCHIVED]`, `[BLOCKER]`, `[DISPATCH]`) all carry a `subject — reason` form; reprioritisation is the one asymmetry.

    ## What

    Edit `defaults/phases/triage.md`:

    1. In step 5 ("Reprioritize based on what the cycle revealed…"), instruct the LLM to include a `[REPRIORITISED] <task title> — <reason>` line in the narrative preamble for every reorder it performs.
    2. Add `[REPRIORITISED] <task title> — <reason>` to the bullet list in the "Output format" section (lines 134-138) alongside the other four intent labels.

    Apply to *every* reorder, not a softer threshold — if a reorder isn't worth a one-line justification, it isn't worth doing.

    ## Why

    The two-part output contract is: structural labels (renderer-derived) carry the *what*; intent labels (LLM-authored) carry the *why*. Reprioritisation has the structural half but is missing the intent half — readers of the triage transcript can see that priority changed but not what cycle learning drove the change.

    ## Scope

    - Prose-only edit to one prompt file. No Rust changes — `src/format.rs:134` already classifies `REPRIORITISED` as an intent-bearing label, so the renderer/colorizer is ready.

    ## Verification

    - The amended prompt parses (no syntax issues — it is plain markdown).
    - The new label format is consistent in punctuation and structure with the other four entries in the Output format section.
  results: |
    ## What was done

    Edited `defaults/phases/triage.md` to require the LLM to author a reason for every reprioritisation, restoring symmetry with the other four intent-bearing labels (`[PROMOTED]`, `[ARCHIVED]`, `[BLOCKER]`, `[DISPATCH]`).

    Two prose changes:

    1. **Step 5** ("Reprioritize based on what the cycle revealed…") now spells out that for every reorder performed, the LLM must include a `[REPRIORITISED] <task title> — <one-line reason>` line in the narrative preamble. The inline guidance also explains *what counts as a reason* (the cycle learning that drove the change — a memory entry, a new dependency, a blocker that emerged) and rejects empty justifications ("felt better here" is explicitly disallowed). A short trailing sentence reinforces the structural-vs-intent distinction: the renderer's structural `[REPRIORITISED]` line records the *what*; the new preamble line records the *why*.
    2. **Output format bullet list** (lines 142-146) now includes `[REPRIORITISED] <task title> — <reason>` (step 5) alongside the other four intent labels, in the order the steps fire.

    No Rust changes were needed — `src/format.rs:134` already classifies `REPRIORITISED` as `Intent::Changed`, so the colorizer / two-row layout in `format_result_text` will pick up the new label naturally.

    ## What worked

    - The change is contained to one prompt file. The two-part output contract (renderer-derived structural labels for *what*, LLM-authored intent labels for *why*) was already cleanly factored, so the missing piece really was a prompt-side asymmetry, not an architectural gap.
    - Full `cargo test` passes (585 unit + integration tests). Nothing pinned the real prompt content — `tests/phase_loop.rs` and `tests/dream.rs` write a stub `"triage on {{PLAN}}"` body for their fixtures, so prompt-content changes don't ripple into tests.

    ## What didn't work / wasn't attempted

    - The change won't apply to plans that have already been initialised against an older `defaults/phases/triage.md` until the user runs `ravel-lite init --force` against those plans. This is the documented visibility/auditability model (no surprise prompt mutations under the user's feet), so it is intentional rather than a gap — but worth noting if the user expects the new behaviour to apply to existing plans without re-init.
    - No snapshot test was added for the new label form. A snapshot test for the two-part output shape is already on the backlog as `add-snapshot-test-for-format-result-text-two-part-output-shape`; that task is the natural home for `[REPRIORITISED]`-bearing example coverage. Folding it in now would have widened scope.

    ## What this suggests next

    - When `add-snapshot-test-for-format-result-text-two-part-output-shape` is picked up, ensure the representative example includes a `[REPRIORITISED]` line so the new contract is locked in by a test.
    - If the user wants this propagated to existing plans (this project's own `LLM_STATE/core/phase.md`-equivalent triage prompt, plus any external Ravel-Lite-managed plans), they will need to run `ravel-lite init --force` against each. Worth surfacing once during reflect / triage if the change is judged broadly important.
    - Consider whether `analyse-work.md` has any analogous gap — it generates a session log and commit message from the diff and does not currently own intent-label discipline, but a similar audit might find one.
