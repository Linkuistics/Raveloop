tasks:
- id: switch-prompt-and-agent-reads-to-embedded-defaults-slim-init-to-plan-state-skeleton-only
  title: Switch prompt and agent reads to embedded defaults; slim init to plan-state skeleton only
  category: feature
  status: not_started
  dependencies: []
  description: |
    Stop materialising tool-shipped defaults to disk. Read prompts and
    agent definitions from the embedded set at runtime; `init` writes
    only user-owned plan-state. Combines the read-side flip and the
    write-side slim into one landing because they describe the same
    change to the materialisation model.

    ## Why

    `init` currently dual-ships defaults: embedded into the binary AND
    copied to disk via `EmbeddedFile` entries in `src/init.rs`. Runtime
    reads from disk. This forces users to re-run `init --force` after
    every release, which is a footgun (it overwrites local edits with no
    warning) and an upgrade tax (users must remember to re-run for every
    release).

    Removing the disk copy means: one source of truth (the embedded set);
    upgrades just install a new binary; no `--force` reset to remember.
    Customisation moves to the Lua config layer (separate task), which
    is finer-grained and append-only — it cannot break the embedded
    prompts the runtime parses.

    The drift guard
    `every_file_under_defaults_is_registered_in_embedded_files` already
    ensures the embedded set is complete; this task makes it the *only*
    source.

    ## Scope

    Read-side (audit and flip):

    - Every `read_to_string(...)` (or equivalent) under `src/` that
      resolves into the resolved config dir or a `defaults/`-shaped path.
    - `substitute_tokens` callers and prompt loaders.
    - Pi subagent definition reads (`agents/pi/subagents/`).
    - Replace each with the embedded-bytes accessor exposed from
      `src/init.rs`.

    Write-side (`init.rs`):

    - Drop the materialisation step.
    - Plan dir: `init` writes only `backlog.yaml`, `memory.yaml`,
      `phase.md`, `latest-session.yaml`, `commits.yaml`, `session-log.yaml`.
    - Global config dir: created empty (or with a starter `config.lua`
      comment-only stub — decide during implementation).

    Drift guard:

    - Extend
      `every_file_under_defaults_is_registered_in_embedded_files` so
      registration also implies "no path reads from disk for this file"
      — i.e. fail the test if any `src/` reader resolves into a path that
      matches an embedded file.

    Tests:

    - Add coverage for every flipped reader: assert the runtime still
      works against a plan/config dir with no disk-materialised default
      files present.

    ## Decisions already made

    - Customisation is append-only via Lua hooks (separate task). Users
      cannot replace embedded prompts on disk.
    - Existing on-disk materialised files remain on disk after upgrade
      until the v1→v2 migration runs (separate task) — this task does
      not delete anything from existing user dirs.
    - This task does not touch `config.yaml` / `*.local.yaml` reading.
      Prompts and agent definitions only. The Lua config replacement is
      the separate task.

    ## Verification

    - All existing tests pass.
    - `every_file_under_defaults_is_registered_in_embedded_files` passes.
    - A new test (or fixture) confirms that spawning Claude Code / Pi for
      any phase succeeds against a plan dir + config dir that contain
      only user-owned plan-state (no `prompts/`, no agent definitions
      materialised).
    - `ravel-lite init <fresh-dir>` produces a plan dir whose file list
      matches the user-owned set above and nothing else.
- id: replace-yaml-config-with-lua-mlua-and-layered-global-plan-resolution
  title: Replace YAML config with Lua (mlua) and layered global+plan resolution
  category: feature
  status: not_started
  dependencies: []
  description: |
    Replace the YAML config (`config.yaml` + `*.local.yaml` deep-merge
    overlay) with Lua-based config (`config.lua`). Layer global → plan
    (plan extends/overrides global). Drop the YAML overlay code path
    entirely.

    ## Why

    YAML is fine for declarative settings but cannot express hooks. The
    customisation primitive we want — `ravel.append_prompt(phase, text)`,
    appended *after* the embedded prompt — is naturally a Lua function
    call, not a YAML scalar. Going Lua now (with zero current users)
    means no migration burden for end users, and the config layer
    becomes a real extension surface that future hooks (post-phase
    callbacks, task filters, custom model selection logic) can join
    without churn.

    The `*.local.yaml` deep-merge overlay disappears in the same step:
    its semantic (per-machine override of the tool-shipped defaults) is
    now expressed in Lua at either the global or plan layer, with full
    imperative power.

    ## Scope

    Dependency:

    - Add `mlua` to `Cargo.toml`. Feature flags TBD; LuaJIT-capable is
      preferred but not required at v1.

    Lua API surface (initial):

    - `ravel.config` table with the top-level fields matching today's
      `SharedConfig` (e.g. `agent`, `headroom`).
    - `ravel.set_model(phase, name)` — replaces today's `models.<phase>`
      keys per agent.
    - `ravel.set_agent(name)` and per-phase agent override hook (shape
      TBD).
    - `ravel.append_prompt(phase, text)` — the append-only prompt
      customisation hook. Multiple registrations accumulate.
    - `ravel.config.config_version` integer field — auto-stamped to
      current on write/migration; absence implies "current binary's
      version".

    Layered resolution:

    - Resolve `<global>` via the existing chain in `src/config.rs`
      (`--config` flag → `RAVEL_LITE_CONFIG` → `dirs::config_dir()/ravel-lite`).
      This unchanged piece is `resolve_config_dir`.
    - Run `<global>/config.lua` (if present) in a Lua state.
    - Run `<plan>/config.lua` (if present) in the same Lua state, after
      global. Setters last-write-wins; `append_prompt` accumulates.
    - Read final `ravel.config` table and registered hooks.

    Removals:

    - `load_shared_config`, `load_agent_config`, `load_tokens` and their
      `*.local.yaml` overlay paths in `src/config.rs` — gone.
    - `merge_yaml` helper — keep available for the migration task only;
      delete in a follow-up once migration ships.
    - Tokens (`tokens.yaml` / `tokens.local.yaml`): map onto the Lua API
      (per-token setter) or drop if redundant — decide during
      implementation.

    Tests:

    - Golden: a `config.lua` mirroring an old `config.yaml` produces the
      same `SharedConfig`/`AgentConfig` values as the YAML did.
    - Layering: global sets X; plan-level overrides X; plan-level
      appends a prompt; final state includes the override + the appended
      prompt and not the original X.
    - Missing-file fallthrough: no `config.lua` at either layer
      produces sensible defaults (or a clear error, per design choice).

    ## Decisions already made

    - Append-only prompt customisation; never replace.
    - No sandboxing — config is trusted code (wezterm/nvim threat
      model).
    - API versioning is by binary; removed/renamed functions surface a
      clear runtime error. There is no schema migration of Lua files.
    - Single `config.lua` per layer; no glob or multiple files.
    - The existing `--config` / `RAVEL_LITE_CONFIG` / XDG-default chain
      for finding the *global* dir is preserved verbatim.

    ## Verification

    - Building and running ravel-lite works against a hand-authored
      `config.lua` that sets `agent`, one model, and one
      `append_prompt`.
    - Unit tests for the Lua bindings (every `ravel.*` function) pass.
    - Layering test: plan-level config produces overrides without losing
      global settings on unrelated keys.
    - `append_prompt` text appears appended to (not replacing) the
      embedded prompt that the spawned agent receives.

    ## Dependencies

    None at the code level — this task can land in parallel with the
    embedded-defaults flip. The migration task depends on this.
- id: add-scripts-release-doctor-sh-prereq-verification-before-release-pipeline
  title: 'Add scripts/release-doctor.sh: prereq verification before release pipeline'
  category: infra
  status: not_started
  dependencies: []
  description: |
    Add a `scripts/release-doctor.sh` script (or integrate an upfront check into `release-build.sh`) that verifies all four prerequisites for running the release pipeline and emits a punch-list of anything missing.

    ## Why

    The first end-to-end release run (v1.0.2) found that three rustup targets (`x86_64-apple-darwin`, `aarch64-unknown-linux-gnu`, `x86_64-unknown-linux-gnu`) and two binaries (`zig`, `cargo-zigbuild`) were absent from the dev machine. The README lists them under "one-time setup" but nothing automated enforces their presence before `release-build.sh` is invoked. A doctor script surfaces missing prereqs immediately rather than failing partway through the build.

    ## Scope

    Prerequisites to verify:

    - `zig` is installed and on PATH (`which zig` or `zig version`)
    - `cargo-zigbuild` is installed (`cargo zigbuild --help` exits 0)
    - rustup targets present: `aarch64-apple-darwin`, `aarch64-unknown-linux-gnu`, `x86_64-unknown-linux-gnu` (via `rustup target list --installed`)
    - `gh auth status` exits 0 (GitHub CLI authenticated)

    Output format:

    - Print each check with a pass/fail marker
    - If any fail, print a remediation command for each missing item and exit non-zero
    - If all pass, print "All prerequisites met" and exit 0

    Integration option:

    - Standalone `scripts/release-doctor.sh` is the primary deliverable
    - Optionally invoke it as the first step of `release-build.sh` so the check is automatic; gate on exit code

    ## Decisions

    - Check-only; the script never installs anything itself
    - Standalone invocability required (user should be able to run it before committing to a release attempt)
    - Minimal dependencies; pure bash, no external tools beyond those already on the release path

    ## Verification

    - Running `scripts/release-doctor.sh` on a clean machine with all prereqs missing prints four failure lines and exits 1
    - Running it on the dev machine (all prereqs present since v1.0.2) prints four pass lines and exits 0
    - `release-build.sh` (if wired) fails fast with the doctor output rather than progressing to a build failure
