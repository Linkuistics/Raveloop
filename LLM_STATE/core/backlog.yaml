- id: audit-llm-work-for-extractable-deterministic-cli-helpers-rust-datalog
  title: Audit LLM work for extractable deterministic CLI helpers (Rust/Datalog)
  category: infra
  status: not_started
  dependencies: []
  description: |
    We have already abstracted plan-state interaction out of the LLM and
    into the `ravel-lite state …` CLI (backlog, memory, session-log,
    phase, related-components). The win was real: less context burned per
    turn, less non-determinism, more auditability, and a codified
    standing memory — "mechanical ops belong in Rust, not in the LLM".

    Push the same principle across the remaining prompt surface. The LLM
    still performs a lot of work inside `defaults/phases/*.md` and
    `defaults/agents/**` that is mechanical, pattern-matchable, or
    expressible as a deterministic query — counting, diffing, selecting,
    extracting hand-off markers, reasoning over dependency graphs,
    selecting cross-plan propagation targets, word/token accounting for
    dream, etc. Each such sub-task spent in the LLM is context and cost
    paid for work a CLI could do faster, cheaper, and the same way every
    time. Goal of this audit: reduce context (hence cost), improve output
    quality, and push as much behaviour as possible into the deterministic
    tier.

    Scope — three parts:

    1. **Enumerate.** Read every prompt under `defaults/phases/` and
       `defaults/agents/`, plus the Rust code that assembles prompt
       inputs. For each prompt, list the distinct sub-tasks the LLM is
       being asked to do, and mark each as either (a) genuine judgement
       ("is this memory entry redundant?", "is this learning worth
       promoting?") or (b) mechanical/queryable ("count tasks by status",
       "find tasks whose description names another task id", "list memory
       entries not referenced by any task", "compute the transitive
       closure of task dependencies", "detect `[HANDOFF]` markers in
       Results blocks").

    2. **Propose CLI extractions.** For each mechanical sub-task, propose
       a deterministic replacement — a `ravel-lite query …` verb (or
       similar) with typed, composable YAML/JSON output. Where the
       natural shape is relational (graph reachability, joins across
       backlog / memory / session-log / related-components), consider a
       Datalog evaluator (e.g. `ascent`, `crepe`) as the engine; the LLM
       would then call or write a query expression rather than do the
       selection by hand. For each candidate, note which prompt section
       shrinks and roughly by how much context.

    3. **Rank.** Produce a prioritised list of extractable helpers,
       scored by (expected tokens/context saved per cycle) × (expected
       quality gain from determinism). Each row: (a) current prompt
       section it replaces, (b) proposed verb / query shape, (c)
       input + output types, (d) rough context savings, (e) risk notes
       (what judgement-call, if any, the extraction would wrongly
       automate away).

    Deliverable: a single brief at `docs/analysis/llm-work-audit.adoc`
    (or `.md`) containing the audit, the ranked candidates, and — for
    the top 1–3 — concrete proposed CLI shapes. Implementation of any
    extraction is **out of scope** for this task; each top-ranked
    candidate is promotable to its own backlog task (triage will do so
    when the audit lands).

    Reference: the standing memory "Never do in an LLM what you can do in
    code" (Claude-Code auto-memory
    `feedback_mechanical_ops_in_runner.md`). This task operationalises
    that principle across the full prompt surface, not just the runner.
