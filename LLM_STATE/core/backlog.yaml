tasks:
- id: set-up-asciidoc-doc-build-pipeline-with-linkuistics-site-template
  title: Set up AsciiDoc doc build pipeline with linkuistics site template
  category: infra
  status: done
  dependencies: []
  description: |
    Introduce an AsciiDoc-to-HTML pipeline for Ravel-Lite docs that publishes into the linkuistics.com site. Deliverables: (a) Ravel-Lite/docs/ directory with tutorial/ and reference/ subtrees; (b) asciidoctor HTML5 template that wraps each chapter in the linkuistics site chrome (nav bar with back-to-projects link, .prose container, footer) and inserts prev/next chapter navigation; (c) scripts/build-docs.sh (or Makefile target 'docs') that compiles every .adoc into ../www.linkuistics.com/projects/ravel-lite/*.html using the template; (d) one pilot chapter (e.g., 00-overview.adoc) that builds end-to-end and renders correctly against the site's existing CSS; (e) README note on build prerequisites (brew install asciidoctor). No GitHub Actions; local manual build. Design goal: template and recipe are reusable across projects (TheGreatExplainer will consume the same pattern) so keep linkuistics-specific bits parametric where sensible. Prerequisite for T2 and T3.
  results: |
    ## Pipeline shape

    AsciiDoc → HTML pipeline built as a pure shell script (`scripts/build-docs.sh`) wrapping `asciidoctor --no-header-footer`. The embedded-mode body output is substituted into `docs/templates/page-shell.html` alongside title, prev/next chapter nav, and project-specific config values. No asciidoctor template-engine system (`-T`), no Makefile, no Ruby — just asciidoctor + bash.

    Parametric split, as the task's reusability goal required:
    - `docs/templates/page-shell.html` — site chrome (universal, copy-as-is for other projects)
    - `scripts/build-docs.sh` — build driver (universal, copy-as-is for other projects)
    - `docs/build-config.sh` — per-project vars: `PROJECT_NAME`, `PROJECT_SLUG`, back-link URL, output dir (project-specific, edit per project)
    - `docs/manifest.txt` — chapter order for prev/next nav (project-specific)

    For TheGreatExplainer (or any future project), copy the template + script verbatim and only edit `build-config.sh` + `manifest.txt`.

    ## Deliverables

    - [x] (a) `docs/tutorial/` and `docs/reference/` subtrees created
    - [x] (b) HTML5 template in `docs/templates/page-shell.html` — wraps each chapter in the linkuistics nav bar (logo + tagline + "← Ravel-Lite" back link + Collaborator badge), `.prose` container, and footer. Prev/next chapter links injected at the bottom of each page using the existing `.detail-link` class.
    - [x] (c) `scripts/build-docs.sh` (executable) builds every `.adoc` listed in `manifest.txt` into `<OUTPUT_DIR>/*.html`. Paths like `tutorial/00-overview.adoc` are flattened to `tutorial-00-overview.html` so the site stays one dir deep under `projects/ravel-lite/`.
    - [x] (d) Pilot chapter `docs/tutorial/00-overview.adoc` builds end-to-end to `www.linkuistics.com/projects/ravel-lite/tutorial-00-overview.html` and renders correctly against the existing site CSS (verified visually via Playwright — nav chrome, h1/h2 spacing, code blocks, link colors, and footer all match prior art in `projects/ravel/user-guide.html`).
    - [x] (e) README `## Documentation` section added between Principles and Releasing, covering build prerequisites (`brew install asciidoctor`), `./scripts/build-docs.sh` invocation, and the portability story.

    ## What worked

    - **Embedded mode over custom template engines.** Asciidoctor's `--no-header-footer` emits body-only HTML with its standard wrapper classes (`.paragraph`, `.listingblock`, `.sect1`, etc.). The linkuistics `.prose` CSS uses descendant selectors (`.prose p`, `.prose h2`), so the asciidoctor wrappers are effectively transparent — styling cascades through correctly with zero new CSS. Much simpler than driving Slim/ERB templates.
    - **Bash `${var//pat/repl}` for substitution, once the `&` back-reference bug was pinned.** Using literal string replacement sidesteps regex-metachar escaping, which makes the substitution robust against arbitrary asciidoctor body content. See Gotcha below.
    - **Parametric config via a sourced shell file** (`docs/build-config.sh`). No need for env-var juggling or a separate args parser; the script just sources it and reads globals.

    ## What didn't work (fixed mid-flight)

    - **Bash 5.2+ back-reference bug.** First build produced `<code>{{BODY}}lt;project{{BODY}}gt;/...` where `&lt;` should have been. Root cause: bash 5.2 added an undocumented feature where a leading `&` in the replacement half of `${var//pat/repl}` is replaced by the matched pattern. Any replacement that might contain `&` (HTML entities, numeric character references, stray `&`) is affected. Fixed by adding an `esc()` helper that escapes `&` → `\&` before every substitution. The escape is applied uniformly to every variable, not just body/nav, to guard against future surprises (e.g., a title containing "Foo & Bar").
    - **Output dir didn't exist on first run.** Initial script errored if `OUTPUT_DIR` was missing. Changed to `mkdir -p` the per-project subdir while still hard-failing if the parent site checkout is absent — matches how `projects/ravel/`, `projects/testanyware/`, etc. are created on demand in the site repo.

    ## Gotcha for future readers / writers of this pipeline

    `&` is special in bash 5.2+ string substitution. If you add a new `{{PLACEHOLDER}}` to the template, route it through `esc()` in `build-docs.sh`, not raw `$var` substitution — otherwise any value containing `&` will corrupt the output. The comment block above the `esc()` calls in `build-docs.sh` captures this; keep the comment if you refactor.

    ## What this suggests next

    - T2 (tutorial) and T3 (reference) are unblocked — add `.adoc` files under `docs/tutorial/` and `docs/reference/`, append each to `docs/manifest.txt`, rerun `./scripts/build-docs.sh`.
    - T6 (publish + update `projects/ravel-lite.html` hub + `SYNC.yml`) should cite `build-docs.sh` as the generator when bumping the synced_at SHA on the hub page.
    - The empty `docs/reference/` subdir doesn't show up in `git status` (git ignores empty dirs); T3 will populate it naturally.
    - Build artifact under `.playwright-mcp/` was left from visual verification; added to `.gitignore` so future work-phase runs that use the browser tools don't leak the scratch dir into commits.
- id: add-ravel-lite-rb-homebrew-formula-to-linkuistics-homebrew-taps
  title: Add ravel-lite.rb Homebrew formula to linkuistics/homebrew-taps
  category: infra
  status: not_started
  dependencies: []
  description: |
    Create Formula/ravel-lite.rb in /Users/antony/Development/homebrew-taps/ so that 'brew install linkuistics/taps/ravel-lite' works. Apache-2.0, from-source cargo build (depends_on 'rust' => :build; install runs 'cargo install --locked --root #{prefix} --path .'). Tag the Ravel-Lite repo at the current release and point the formula's url at github.com/linkuistics/Ravel-Lite with tag: "vX.Y.Z". Basic 'test do' asserting 'ravel-lite --version' prints the crate version. Verify locally with 'brew install --build-from-source linkuistics/taps/ravel-lite' before committing. No GitHub Actions; no pre-built binaries.
- id: write-reference-page-covering-all-user-facing-cli-verbs
  title: Write reference page covering all user-facing CLI verbs
  category: docs
  status: not_started
  dependencies: []
  description: |
    Single-page reference-tour in AsciiDoc (docs/reference/index.adoc or docs/reference.adoc). TOC at top, then prose entries for each user-facing verb: run, create, init (+ --force), version, state projects (add/list/rename/remove), state backlog (CRUD), state memory (CRUD), state session-log, state set-phase, state related-components (list/add-edge/discover — briefly; advanced), survey and survey-format (one-liner mention), --config / RAVEL_LITE_CONFIG / --dangerous. Each entry: invocation, flags, what it does, side effects, gotchas. Friendly prose, minimal lists, no emoji. Depends on T1.
- id: integrate-testanyware-vm-for-capturing-interactive-ravel-lite-commands
  title: Integrate TestAnyware VM for capturing interactive ravel-lite commands
  category: infra
  status: not_started
  dependencies: []
  description: |
    Dogfood TestAnyware as the driver for running ravel-lite's interactive commands (create, run) inside a VM so tutorial sections can include real transcripts and — optionally — screenshots without requiring the user to manually drive their own terminal. Scope: (a) start a TestAnyware macOS VM with ravel-lite installed via the brew formula (T4); (b) drive 'ravel-lite create' and 'ravel-lite run' via TestAnyware's VNC + agent (input injection, screen capture, agent exec); (c) capture state files on the VM, extract them to the host, and include them as evidence in the tutorial chapters; (d) optional: capture PNG screenshots of the TUI for the tutorial. Supports T2; depends on T1 (pipeline) and T4 (brew formula) for a clean 'brew install' inside the VM. Scope carefully — this can become a rabbit hole; if VM-driven capture proves too costly, fall back to user-driven capture as originally planned.
