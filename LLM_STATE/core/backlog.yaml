- id: fix-scenario-run-chapter-03-chapter-04-cross-talk-send-exit-after-backlog-poll
  title: 'Fix scenario_run chapter-03/chapter-04 cross-talk: send /exit after backlog poll'
  category: infra
  status: done
  dependencies: []
  description: |
    After the `polling for populated backlog` loop in `scenario_run` succeeds (i.e., `backlog.yaml` exists on the VM), the driver immediately starts typing `ravel-lite run ...` into the GUI Terminal — but claude is still mid-conversation in the chapter-03 create flow, asking "Want me to commit it?". The typing is absorbed by claude rather than the shell.

    ## Decision

    Add an explicit `/exit` + Return step after the backlog-polling loop, then wait for the shell prompt to return before invoking `ravel-lite run`. This is the correct layer to fix it: the chapter-03 scenario_run step knows when backlog creation succeeded and is the natural place to ensure claude has exited before handing the terminal back.

    ## Reference

    `scripts/capture/ravel-lite-tutorial.sh` — the `scenario_run` function, around line 568 (the `polling for populated backlog` comment block). The fix is ~5 lines: send `/exit` via `testanyware input`, then poll for the shell prompt (e.g., `$` at line start) before continuing.

    ## Done when

    A full capture run from chapter 01 through chapter 04 completes without the chapter-03/chapter-04 cross-talk bug (no manual `/exit` intervention required).
  results: |
    ## What was done

    Added an explicit `/exit` + sentinel-echo handshake at the tail of `capture_chapter03_create_session` in `scripts/capture/ravel-lite-tutorial.sh`:

    1. After the existing `screenshot_at "03-conversation-completion"`, send `/exit` + Return into the GUI Terminal.
    2. Type `echo CHAPTER_03_CLAUDE_EXITED` + Return.
    3. `testanyware find-text … "CHAPTER_03_CLAUDE_EXITED" --timeout 30` waits for that sentinel to render before the function returns.

    The shell echoes the sentinel verbatim once it's the active reader; claude's TUI does not, so seeing the sentinel rendered proves we're back at a real prompt. The handshake is also robust to claude having already exited on its own — `/exit` becomes a harmless command-not-found at the shell, the sentinel still renders, and find-text still matches.

    Also fixed a stale comment in the function's docstring that referenced an unused `CHAPTER_03_CREATE_DONE` marker (the actual completion signal is the agent-channel poll on `backlog.yaml`).

    ## Why this layer

    The task's original framing offered two layers for the same root cause: (a) ravel-lite auto-detects plan completion and exits claude, or (b) the capture script sends `/exit` at a known sync point. Option (a) was tagged "principled" in the task description but has now been ruled out by user design decision (2026-04-28): work-phase claude must remain interactive after plan completion so the user can add more input. That makes (b) the canonical fix, not a workaround — it's the right layer because the scenario script is the only place that knows "the plan is done AND it is now safe to take the Terminal back."

    ## What worked

    - `bash -n` syntax-checks clean.
    - The fix uses only primitives already in use elsewhere in the script (`testanyware input type` / `input key return` / `find-text --timeout`), so no new dependency on testanyware features.
    - The dirty-tree footprint is just the script and the backlog — no incidental changes.

    ## What did not work / could not be done here

    Full end-to-end verification (the task's stated "Done when" — a clean chapter-01-through-04 capture run) requires spinning up a TestAnyware VM and executing `scripts/capture/ravel-lite-tutorial.sh`. That is not feasible inside this work phase; it is a real capture run, takes several minutes per cycle, and consumes paid VM resources. The next time the capture script is run end-to-end, the chapter-03/chapter-04 cross-talk should be absent. If find-text times out on the sentinel after 30s, the symptom will be a hard error in chapter 03 rather than the silent absorption-into-claude that the original bug produced — i.e., it will fail loudly, which is the desired failure mode.

    ## What this suggests next

    - The next capture run is the empirical test for this fix. If the run completes chapter 03 → 04 cleanly with no manual `/exit`, this task's "Done when" is satisfied for real.
    - The "Stop kept TestAnyware VM ravel-lite-tutorial-20260428T045749Z" backlog item is independent operational cleanup; still pending.
    - Sibling task "Auto-exit work-phase claude after plan completion" was moved to `blocked` with the user's design rationale captured. The blocked-reason links forward to this task as the canonical alternative; future triage shouldn't reopen the auto-exit idea unless that design constraint changes.
