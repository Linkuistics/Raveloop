- id: reference-state-file-formats-backlog-yaml-memory-yaml-session-log-yaml-latest-session-phase-md-commits-yaml
  title: 'Reference: state-file formats (backlog.yaml, memory.yaml, session-log.yaml, latest-session, phase.md, commits.yaml)'
  category: docs
  status: not_started
  dependencies: []
  description: |
    Write the state-file formats reference page: schema, examples, and read/write call sites for the durable plan-state files.

    ## Scope

    - File: `docs/reference/state-files.adoc`
    - Per file: full schema (every field with type, semantics, allowed values), a worked example, the phase that writes it, the phases that read it, and the gotchas a hand-editor needs to know.

    ### Files covered

    - **`backlog.yaml`** — tasks list, status enum, dependencies (must be ids; cycles and self-reference rejected by `set-dependencies`), results block, handoff block, category, description, blocked_reason.
    - **`memory.yaml`** — entries list, the four entry types (user, feedback, project, reference), description vs body, distillation rules.
    - **`session-log.yaml`** — per-cycle entries, what analyse-work writes here, append-only semantics.
    - **`latest-session.*`** — the per-cycle summary. **Verify whether the actual file is `.md` or `.yaml`** — the existing format.rs highlight rule says `.md` but memory notes mention `.yaml`. Document whichever is current and flag any inconsistency.
    - **`phase.md`** — the single-line current-phase indicator. Validation rules. Why it's a separate file rather than embedded in another.
    - **`commits.yaml`** — the commit spec written by analyse-work, consumed by git-commit-* phases. Per-commit structure (paths, message file).

    ## Style

    Friendly prose between schema blocks. Each file gets a short prose introduction, the schema as a code block (`[source,yaml]` with field-level comments), then prose on gotchas and editing rules.

    ## Verification

    - Page builds and renders.
    - Every schema cross-checked against `src/state/<file>/schema.rs` (or wherever the serde struct lives).
    - At least one example per file is realistic — lifted from a real plan, anonymised if needed.
    - The `.md` vs `.yaml` question for `latest-session.*` is resolved by reading the actual write path in `src/state/`.
- id: fix-html-cross-link-convention-in-website-docs-fragments
  title: Fix HTML cross-link convention in website/docs/ fragments
  category: docs
  status: not_started
  dependencies: []
  description: |
    Audit and fix the internal cross-link convention in all `website/docs/*.html`
    fragments so links resolve correctly under the new URL scheme.

    ## Why

    The phase-cycle reference-page work (2026-04-27) exposed two conflicting
    link forms in the rendered HTML:

    - `concepts.html` uses `<a href="reference-state-files.html">` — the
      legacy flattened-name scheme from the pre-2026-04-26 pipeline.
    - `phase-cycle.html` uses `<a href="state-files.html">` — sibling-relative,
      no prefix, but still includes `.html`.

    Under the new URL scheme (`/projects/ravel-lite/docs/<page>/`), the correct
    relative form is likely `state-files/` (trailing slash, no `.html` extension)
    because pages are served at directory URLs. Until this is verified against a
    live deploy, the canonical form is unconfirmed.

    ## Scope

    1. **Verify** the canonical URL form by inspecting a live deployed page —
       either via `curl -I` on a published `phase-cycle/` or `concepts/` URL,
       or by reading the `www.linkuistics.com` pipeline's routing config.
    2. **Audit** all `<a href="...">` cross-links inside
       `website/docs/concepts.html`, `website/docs/phase-cycle.html`,
       `website/docs/index.html`, and any other HTML fragments in
       `website/docs/`.
    3. **Normalise** every internal cross-link to the confirmed canonical form.
       Update `docs/reference/*.adoc` source files so the normalised links
       are generated on future re-renders, not just patched post-render.

    ## Verification

    - `grep -r 'href=' website/docs/` shows no `.html`-suffixed internal links
      (or whatever the canonical form turns out to be).
    - A spot-check of the canonical URL on the live site confirms links resolve.
- id: reference-cross-plan-file-formats-subagent-dispatch-yaml-related-components-yaml-evidence-grades
  title: 'Reference: cross-plan file formats (subagent-dispatch.yaml, related-components.yaml, evidence grades)'
  category: docs
  status: not_started
  dependencies: []
  description: |
    Write the cross-plan file formats reference page: `subagent-dispatch.yaml` (triage hand-off mechanism) and `related-components.yaml` (peer-project edges), with schema, examples, evidence-grade semantics, and the lifecycle of each file.

    ## Scope

    - File: `docs/reference/cross-plan-files.adoc`

    ### Files covered

    - **`subagent-dispatch.yaml`**: schema, when triage writes it, how downstream consumers read it, how dispatched subagents behave, the contract between dispatcher and dispatched.
    - **`related-components.yaml`**: `schema_version: 2`, edges with `kind` / `lifecycle` / `participants` / `evidence_grade` / `evidence_fields` / `rationale`. How the `state related-components` verbs interact with the file. The discover/add-edge workflow.

    ### Cross-cutting

    - **Evidence grade semantics** (strong / medium / weak): what each grade implies, how the discover phase chooses, how downstream consumers should treat each grade differently.
    - **Edge kinds** (orchestrates, depends-on, etc.): the controlled vocabulary, when each kind applies.
    - **Lifecycle scopes** (dev-workflow, build, runtime, etc.): the controlled vocabulary.

    ### Cross-links

    - Cross-link to triage in the phase-cycle page.
    - Cross-link to `state related-components` in the CLI state page.

    ## Style

    Friendly prose, schema blocks (`[source,yaml]`), minimal lists, no emoji.

    ## Verification

    - Page builds and renders.
    - Schemas cross-checked against `src/state/related_components/` (and the triage dispatch code for the dispatch file).
    - Examples lifted from a real `related-components.yaml` — this very project's file (with edges to APIAnyware-MacOS, TestAnyware, Ravel, Atlas) is good source material.
- id: reference-cli-lifecycle-commands-run-create-init-version-global-flags
  title: 'Reference: CLI lifecycle commands (run, create, init, version, global flags)'
  category: docs
  status: not_started
  dependencies: []
  description: |
    Write the CLI reference page for lifecycle commands: `ravel-lite run`, `create`, `init` (+ `--force`), `version` (+ `--version`), and the global flags that apply to every command (`--config`, `RAVEL_LITE_CONFIG`, `--dangerous`).

    ## Scope

    - File: `docs/reference/cli-lifecycle.adoc`
    - Per command: invocation, flags (with defaults), what it does, what it writes, side effects, exit codes, gotchas.

    ### Commands

    - **`run`**: the main loop entry point. How phase resumption works (reads `phase.md` to decide where to start). What it reads to decide what to do. How it spawns agent subprocesses. Failure modes.
    - **`create`**: plan creation. Bootstrapping flow (initial backlog, memory placeholder, phase set to work). Required arguments. How it interacts with `state projects`.
    - **`init`**: project initialisation. What gets materialised onto disk. `--force` semantics — overwrites without prompting (vs the default which refuses if files exist).
    - **`version`** (+ `--version`): identity output (crate version + `git describe --tags --always --dirty` + UTC build timestamp). Why a running binary always identifies the commit it was built from.

    ### Global flags

    - `--config <path>`: explicit config file location.
    - `RAVEL_LITE_CONFIG`: env-var equivalent of `--config`.
    - `--dangerous`: what behaviours it unlocks, why it's gated.
    - Precedence rules (flag > env var > default).

    ## Style

    Friendly prose, minimal lists, no emoji. Each command gets at least one worked example.

    ## Verification

    - Page builds and renders.
    - Every flag and option cross-checked against the actual `clap` derive structure in `src/cli.rs`.
    - Exit codes cross-checked against the actual implementation.
- id: reference-cli-state-commands-projects-backlog-memory-session-log-set-phase-related-components
  title: 'Reference: CLI state commands (projects, backlog, memory, session-log, set-phase, related-components)'
  category: docs
  status: not_started
  dependencies: []
  description: |
    Write the CLI reference page for `ravel-lite state` and all its subcommands: projects, backlog, memory, session-log, set-phase, related-components.

    ## Scope

    - File: `docs/reference/cli-state.adoc`

    ### Subcommand groups

    - **`state projects`**: add, list, rename, remove. The projects registry. How rename cascades through related state (memory note: rename has three cascade points in `run_rename`; consider Trait-based registry before adding a fourth).
    - **`state backlog`**: every CRUD verb — list, show, add, init, set-status, set-results, set-description, set-handoff, clear-handoff, set-title, set-dependencies, reorder, delete, lint-dependencies, repair-stale-statuses. Filter syntax for `list`. Format options (yaml / markdown / json) and what each format includes (markdown drops ids by design — see render.rs module doc).
    - **`state memory`**: CRUD verbs and the four entry types (user, feedback, project, reference).
    - **`state session-log`**: CRUD verbs.
    - **`state set-phase`**: phase enum, validation rules, when manual phase setting is appropriate (vs letting the orchestrator transition naturally).
    - **`state related-components`**: list, add-edge, discover. The advanced cross-plan dispatch flow (one-paragraph mention here, deep dive in the cross-plan-files reference page; cross-link).

    ## Style

    Friendly prose. Command tables only when the surface is dense enough to warrant one (the backlog verbs almost certainly do; memory probably doesn't). No emoji.

    ## Verification

    - Page builds and renders.
    - Every verb cross-checked against the actual `clap` derive structure (`src/cli.rs` and any subcommand modules).
    - Worked examples for the most common verbs (list, set-status, set-results, set-dependencies).

    ## Note on size

    This is the largest CLI page in the mini-site. If it grows beyond ~3000 words during writing, propose a follow-up split task (e.g. `cli-state-backlog.adoc` as its own page) rather than letting the page balloon.
