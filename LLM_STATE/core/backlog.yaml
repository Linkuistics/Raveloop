tasks:
- id: research-richer-ontology-of-inter-project-relationships
  title: Research richer ontology of inter-project relationships
  category: research
  status: not_started
  dependencies: []
  description: |
    **Priority: HIGH.**

    Design and document a richer ontology of inter-project relationships to replace the current two-edge model (`sibling`, `parent-of`) used by `discover` / `related-projects`.

    ## Why

    The current Stage 2 discover pipeline collapses every relationship onto `sibling` or `parent-of`. Real projects have many kinds of coupling — shared types, shared protocols, runtime-IPC vs build-time-generation vs test-fixture-dependency — and forcing them into two buckets loses information. This surfaced concretely in the R7 smoke test: the proposed edges between Ravel-Lite and its consumer projects (Ravel, APIAnyware-MacOS, TestAnyware) came out as `parent-of`, which semantically isn't quite right — Ravel-Lite generates plan-state YAML *schemas* and *runtime agents*, not artifacts that those projects consume directly in the artifact-flow sense.

    ## Scope

    Produce a written ontology covering (at minimum):

    **Candidate edge kinds:**
    - `shares-types` — compile-time type compatibility (same struct/class/schema definition in both codebases)
    - `shares-protocols` — wire-format compatibility (protobuf, msgpack, JSON schema)
    - `shares-data-formats` — named data shapes without formal schema
    - `communicates-with` — runtime IPC (HTTP, gRPC, WebSocket, shared memory)
    - `invokes` — one project spawns the other as a subprocess
    - `generated-by` — one project's source is emitted by another's codegen
    - `orchestrated-by` — one project drives the lifecycle/build of another
    - `tests` — provides test infrastructure for another
    - `depends-on` (build/runtime) — library-level dependency with direction
    - `sibling-spec` — parallel implementations of the same external spec
    - (others emergent from the research)

    **Cross-cutting dimensions:**
    - **Runtime vs dev-time** — an edge can be active during app execution, during build/codegen, during test, or during development workflow. An edge kind + a lifecycle phase together pin the meaning.
    - **Direction and symmetry** — which edges are order-sensitive, which are symmetric, which are neither.
    - **Confidence / evidence grade** — some edges are derivable from static artifacts (type signatures match), others only from prose mentions.

    ## Cross-project concern — where does this live?

    This ontology is not purely a Ravel-Lite concern. Related/affected projects:
    - **Ravel-Lite** — owns the current `related-projects` graph and `discover` pipeline.
    - Other analysis/documentation projects the user runs.

    Decide during this research:
    1. Does the ontology live in a shared doc repo, or embedded in each analysis tool?
    2. Is there a common graph schema that multiple tools emit into?
    3. Who maintains the canonical edge-kind list?

    **Starting point for placement:** this task is filed under Ravel-Lite's core plan since that's where the current two-edge model lives, but the deliverable may recommend relocation or the creation of a cross-cutting plan.

    ## Deliverable

    A design doc (initially under `docs/`) that:
    1. Enumerates edge kinds with one-line definitions + examples.
    2. Specifies the lifecycle-phase dimension.
    3. Proposes a concrete YAML schema extending `schema_version` of `related-projects.yaml`.
    4. Recommends where the ontology + tooling should live across the user's project portfolio.
    5. Lists migration steps for the current `sibling` / `parent-of` edges.

    No implementation yet — research + design only. Implementation follows in a separate task once the ontology is accepted.
- id: fix-proposalsfile-source-tree-shas-field-misnomer-capture-dirty-hash-too
  title: Fix ProposalsFile::source_tree_shas field misnomer (capture dirty_hash too)
  category: maintenance
  status: done
  dependencies: []
  description: |
    Rename or extend `ProposalsFile::source_tree_shas` to reflect that the cache key is now `(tree_sha, dirty_hash)` rather than just `tree_sha`.

    ## Why

    The R7 smoke test introduced `compute_project_state { tree_sha, dirty_hash }` and changed the cache key to the pair. `ProposalsFile::source_tree_shas` now only stores the `tree_sha` component, so the field name is misleading — it implies the cache state is fully captured by a single SHA, when in fact the dirty-hash half is silently omitted.

    ## Options

    1. **Rename only** — rename to `source_project_states` (or `source_tree_states`) and accept that `dirty_hash` is still not persisted (cache read is unaffected by this field).
    2. **Rename + extend** — rename to `source_project_states` and extend the value type to capture `{ tree_sha, dirty_hash }`, giving full fidelity of the cache state at proposal-generation time.

    Option 2 is preferred: it makes the proposals file self-documenting and avoids the subtle semantic gap.

    ## Scope

    - `src/discover/schema.rs` — rename field and update value type if extending.
    - `src/discover/mod.rs` — update write site to populate both fields.
    - Tests that construct or assert `ProposalsFile` structs.
    - Round-trip YAML tests.

    No user-visible behaviour change; this is a schema cosmetic + internal correctness fix.
  results: |
    Chose **Option 2** from the task description — rename + extend — so the
    proposals file now records full `{ tree_sha, dirty_hash }` per project
    rather than just `tree_sha`. The field name and its contents now match
    the actual cache key used by Stage 1.

    ## What changed

    - `src/discover/schema.rs` — renamed `source_tree_shas: BTreeMap<String, String>`
      → `source_project_states: BTreeMap<String, ProjectState>`. Reused the
      existing `ProjectState` from `tree_sha.rs` rather than defining a parallel
      type, so the on-disk representation literally is the in-memory cache key.
    - `src/discover/tree_sha.rs` — added `Serialize, Deserialize` derives to
      `ProjectState` and `#[serde(default)]` to its `dirty_hash` field
      (mirrors the same pattern already applied to `SurfaceFile::dirty_hash`
      for read-compat).
    - `src/discover/stage2.rs` — populates the new field with a full
      `ProjectState` built from each surface's `tree_sha` + `dirty_hash`.
    - `src/discover/mod.rs` — empty-surfaces early-exit path + round-trip
      test updated to new field name/type.
    - `src/discover/apply.rs` — test helper `mk_proposals` updated.

    ## Tests

    - `proposals_file_round_trips_via_yaml` — updated to use `ProjectState`
      values, covers both `dirty_hash: "dirty-alpha"` and `dirty_hash: ""`.
    - `proposals_file_reads_legacy_source_tree_shas_as_empty_states`
      (new) — asserts on-disk files written before the rename deserialise
      cleanly with `source_project_states` empty; the legacy key is silently
      ignored since it is informational only.
    - `project_state_reads_without_dirty_hash_as_default` (new) —
      forward-compat guard: a `ProjectState` with `tree_sha` only still
      deserialises, yielding `dirty_hash: ""`.
    - All 415 lib tests pass; all integration crates green.

    ## Design decisions

    - **Reused `ProjectState` rather than a schema-local twin.** The struct
      is two strings; duplicating it would add weight without benefit.
      If the on-disk and in-memory representations later need to diverge,
      the split is trivial. This keeps the field "self-documenting" in the
      sense the task called for: proposals files now serialise the exact
      same struct Stage 1 uses as a cache key.
    - **Silent legacy field drop is acceptable.** `source_project_states`
      (and its predecessor) is never consulted for cache correctness — it
      is pure documentation of the cache state at generation time.
      Stale-file readers get an empty map instead of a parse error, which
      is the friendliest behaviour. If the field ever becomes
      load-bearing, this would need revisiting.
    - **No schema_version bump.** Per the task: "No user-visible
      behaviour change; this is a schema cosmetic + internal correctness
      fix." Since the field is informational and `#[serde(default)]`
      handles missing fields on both sides of the rename, a version bump
      would be overkill and would force a migration on existing files for
      no real benefit.

    ## What this suggests next

    - The R7 smoke-test follow-up that filed this task also called out
      the `parent-of` / `sibling` ontology as semantically thin — that is
      tracked by the HIGH-priority
      `research-richer-ontology-of-inter-project-relationships` task and
      remains the next meaningful piece of discover-pipeline work.
    - If at any point `source_project_states` is used to drive behaviour
      (e.g., "has this project's state changed since last proposal?"),
      the silent-drop-legacy decision above should be revisited and
      schema_version bumped.
