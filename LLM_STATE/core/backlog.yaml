tasks:
- id: add-scripts-release-doctor-sh-prereq-verification-before-release-pipeline
  title: 'Add scripts/release-doctor.sh: prereq verification before release pipeline'
  category: infra
  status: done
  dependencies: []
  description: |
    Add a `scripts/release-doctor.sh` script (or integrate an upfront check into `release-build.sh`) that verifies all four prerequisites for running the release pipeline and emits a punch-list of anything missing.

    ## Why

    The first end-to-end release run (v1.0.2) found that three rustup targets (`x86_64-apple-darwin`, `aarch64-unknown-linux-gnu`, `x86_64-unknown-linux-gnu`) and two binaries (`zig`, `cargo-zigbuild`) were absent from the dev machine. The README lists them under "one-time setup" but nothing automated enforces their presence before `release-build.sh` is invoked. A doctor script surfaces missing prereqs immediately rather than failing partway through the build.

    ## Scope

    Prerequisites to verify:

    - `zig` is installed and on PATH (`which zig` or `zig version`)
    - `cargo-zigbuild` is installed (`cargo zigbuild --help` exits 0)
    - rustup targets present: `aarch64-apple-darwin`, `aarch64-unknown-linux-gnu`, `x86_64-unknown-linux-gnu` (via `rustup target list --installed`)
    - `gh auth status` exits 0 (GitHub CLI authenticated)

    Output format:

    - Print each check with a pass/fail marker
    - If any fail, print a remediation command for each missing item and exit non-zero
    - If all pass, print "All prerequisites met" and exit 0

    Integration option:

    - Standalone `scripts/release-doctor.sh` is the primary deliverable
    - Optionally invoke it as the first step of `release-build.sh` so the check is automatic; gate on exit code

    ## Decisions

    - Check-only; the script never installs anything itself
    - Standalone invocability required (user should be able to run it before committing to a release attempt)
    - Minimal dependencies; pure bash, no external tools beyond those already on the release path

    ## Verification

    - Running `scripts/release-doctor.sh` on a clean machine with all prereqs missing prints four failure lines and exits 1
    - Running it on the dev machine (all prereqs present since v1.0.2) prints four pass lines and exits 0
    - `release-build.sh` (if wired) fails fast with the doctor output rather than progressing to a build failure
  results: |
    ## What landed

    Added `scripts/release-doctor.sh` (~100-line bash script, executable)
    and wired it as the first step of `release-build.sh`'s `main()`.

    ### Doctor script

    - Verifies four prereqs in this order: `zig`, `cargo-zigbuild`, all
      four rustup targets used by the release pipeline, and `gh auth`
      status.
    - Each check has a single failure mode and a single remediation line
      lifted from the README's "Release tooling prerequisites" section.
    - Exits 0 when every check passes, 1 otherwise. Crucially does NOT
      short-circuit on the first failure — every check runs every time, so
      the user gets the complete punch list in a single invocation.
    - Pure bash, no external deps. Style matches `release-publish.sh`
      (strict mode, ERR trap, `main()` at the bottom). All variable
      expansions quoted, `[[ ... ]]` over `[ ... ]`, `(( ... ))` for
      arithmetic, `local` inside functions — per the project's bash
      coding-style guide.
    - The four rustup targets are duplicated between the doctor and
      `release-build.sh`'s `TARGETS` array. The doctor has a comment
      flagging the requirement to keep them in sync; not extracted to a
      shared file because two duplicates beats the indirection of a
      third sourced file.

    ### release-build.sh integration

    - One added line in `main()`, right after `cd "$REPO_ROOT"`. With
      `set -euo pipefail` already in place, a non-zero exit from the
      doctor kills `release-build.sh` immediately — no toolchain work
      starts on a misconfigured machine.

    ## Verification

    - **Dev-machine path** (this workstation, all prereqs present from
      v1.0.2):

      ```
      ✓ zig: 0.16.0
      ✓ cargo-zigbuild: available
      ✓ rustup target: aarch64-apple-darwin
      ✓ rustup target: x86_64-apple-darwin
      ✓ rustup target: aarch64-unknown-linux-gnu
      ✓ rustup target: x86_64-unknown-linux-gnu
      ✓ gh: authenticated
      release-doctor: all prerequisites met
      EXIT=0
      ```

    - **Clean-machine path** simulated by stripping PATH to `/usr/bin:/bin`
      so every required tool is absent:

      ```
      ✗ zig: not on PATH
            remediation: brew install zig
      ✗ cargo-zigbuild: not installed
            remediation: cargo install cargo-zigbuild
      ✗ rustup: not on PATH
            remediation: install rustup from https://rustup.rs/
      ✗ gh: not installed
            remediation: brew install gh && gh auth login
      release-doctor: missing prerequisites — fix the items marked above
      EXIT=1
      ```

      Matches the task's verification criteria: four failure lines, four
      remediation hints, exit 1.

    - Both scripts pass `bash -n` syntax check.

    ## What didn't / partial

    - `shellcheck` and `shfmt` aren't installed on this workstation, so
      style enforcement was reduced to `bash -n`. The script was written
      to the bash style guide (quoted expansions, `[[`, `(( `, `local`,
      ERR trap), but a human-or-CI shellcheck pass before publish would be
      worthwhile.
    - The intermediate cases — `rustup` present but a target missing,
      `gh` present but unauthenticated — share their failure paths with
      the "all missing" simulation. Verified by inspection rather than
      separate runs, since each branch is a 3-line if/else with no shared
      state.

    ## Suggests next

    - Install `shellcheck` + `shfmt` on the dev workstation (or add a CI
      gate) so future bash work is mechanically style-checked.
    - If the `TARGETS` list ever needs to diverge between doctor and
      builder, extract `scripts/lib/release-targets.sh` and source it
      from both. Until then, the duplicate-with-comment is the simpler
      choice.
    - Document `release-doctor.sh` in the README's Releasing section as
      the recommended first step before `cargo release`.
- id: v1-to-v2-migration-with-auto-cleanup-of-materialised-defaults
  title: v1 to v2 migration with auto-cleanup of materialised defaults
  category: feature
  status: not_started
  dependencies: []
  description: |
    On the first command that consumes config in a legacy v1 plan/config
    dir, detect the v1 layout, translate `config.yaml` (+ optional
    `*.local.yaml` deep-merged) into `config.lua`, delete every
    tool-materialised file, and stamp `config_version = 2`. Idempotent;
    runs at most once per dir.

    ## Why

    When the lua-config + embedded-defaults landings ship (separate
    tasks), every existing config dir on disk is in v1 layout: it
    contains materialised prompts, agent definitions, `config.yaml`, and
    possibly `config.local.yaml`. Without cleanup, those files become
    dead clutter the new binary ignores. Auto-migration on first run
    gives the user a zero-step upgrade and a clean disk.

    Zero current users → migration code only handles one transition
    (v1 → v2) and only runs once per dir. After the first cycle past
    this landing, every dir in existence is v2; the migration code can
    be deleted in a future v3.

    ## Scope

    Detection:

    - A config dir is v1 iff `config.lua` is absent AND any of
      (`config.yaml` exists, any `*.local.yaml` exists, `prompts/` dir
      exists, `agents/` dir exists with materialised content) is true.
    - Otherwise v2 (or fresh, indistinguishable for our purposes).

    Translation:

    - Read `<config>/config.yaml` deep-merged with
      `<config>/config.local.yaml` using the existing `merge_yaml`
      logic. The YAML reader stays available specifically for
      migration.
    - Same for each `<config>/agents/<name>/config.yaml` and
      `tokens.yaml` (+ their `.local.yaml` overlays).
    - Translate the merged maps into a single Lua source string: emit
      setter calls / table assignments equivalent to the YAML keys, plus
      `ravel.config.config_version = 2`.
    - Write `<config>/config.lua` first (with version stamp).

    Deletion:

    - Delete every file in the embedded-defaults set that exists on disk
      under the config dir, plus `config.yaml`, `config.local.yaml`, all
      agent `config.yaml` / `config.local.yaml` / `tokens.yaml` /
      `tokens.local.yaml` files, and any now-empty directories.
    - Order: write new `config.lua` first; delete legacy files last. If
      a deletion step fails, the next run re-detects v1 (because legacy
      files still exist) and retries cleanly.

    Tests:

    - Golden directory transformation: a captured v1 fixture dir → run
      migration → assert the resulting v2 dir matches an expected file
      list and the `config.lua` content matches a golden string.
    - Idempotency: re-running migration on a v2 dir is a no-op.
    - Crash recovery: simulate a crash between writing `config.lua` and
      deleting legacy files; assert the next run completes the migration
      cleanly.

    ## Decisions already made

    - One-jump migration (v1 → v2 directly). No intermediate v1.5 step.
    - Customised prompt content (rare/nonexistent given zero current
      users) is deleted without warning. Acceptable simplification.
    - `config_version = 2` stored in `config.lua` is the only marker
      needed; there is no separate sentinel file.
    - Migration is unconditional and silent (no prompt). Cost of
      upgrading.

    ## Verification

    - A captured v1 fixture dir migrates to a v2 dir whose only files
      are `config.lua` (new) plus, for the global dir, anything that's
      truly user-owned (in practice: just `config.lua`).
    - Re-running migration on a v2 dir is a no-op (same file mtimes
      acceptable, same content required).
    - A crash injected between writing `config.lua` and deleting legacy
      files leaves the dir in a state where the next run completes the
      migration without losing data.

    ## Dependencies

    Depends on the lua-config landing (the Lua reader must exist) and
    the embedded-defaults landing (so we know which paths to delete).
