tasks:
- id: auto-exit-work-phase-claude-after-plan-completion
  title: Auto-exit work-phase claude after plan completion
  category: infra
  status: blocked
  blocked_reason: 'User design decision (2026-04-28): work-phase claude must remain interactive after plan completion so the user can add more input. The cross-talk symptom this task targeted is now to be fixed downstream in the capture script (see fix-scenario-run-chapter-03-chapter-04-cross-talk task).'
  dependencies: []
  description: |
    Ravel-lite spawns claude interactively with TTY-inherited stdio for the work phase. Claude completes its work and outputs "Stop" (or similar) but does not exit the TUI. Ravel-lite blocks indefinitely waiting for claude's exit code. In the capture run this manifested as the 20-min poll timing out; the workaround was manually sending `/exit`.

    ## Options considered

    (a) **Principled fix in ravel-lite**: detect "claude reached end of plan and is idling" (e.g., by watching for the plan-completion marker in phase.md or the `analyse-work` phase transition) and programmatically send `/exit` to the claude subprocess. This is the correct layer — ravel-lite owns the work-phase lifecycle.

    (b) **Capture-script workaround**: `scenario_run` polls for the `phase.md == analyse-work` marker and at that point sends `/exit` to the GUI Terminal via `testanyware input`. This is capture-only and leaves the production loop broken for non-VM use.

    ## Decision

    Implement option (a). The work-phase driver in ravel-lite should watch for the plan-completion signal and auto-exit claude. The exact signal needs investigation: either the analyse-work phase transition in `phase.md`, or a sentinel written by the analyse-work phase itself to indicate it has finished (e.g., `commits.yaml` exists or `phase.md == git-commit-work`).

    ## Reference

    The claude invocation for the work phase is in the ravel-lite source (investigate `src/` for the claude_code work-phase spawn). The pattern used in `claude_code.rs` for the PTY-capture debug path (see the blocked PTY infra task) may be relevant — it already has visibility into the subprocess's stdio.

    ## Done when

    A full capture run completes the work phase without any manual `/exit` intervention, and the non-VM production loop also benefits (work phase auto-exits after plan completion).
- id: add-pty-capture-debug-path-to-pi-rs-invoke-interactive-parity-with-claude-code-rs
  title: Add PTY-capture debug path to pi.rs::invoke_interactive (parity with claude_code.rs)
  category: infra
  status: blocked
  blocked_reason: Not needed yet; defer until pi-side TUI debugging actually requires it
  dependencies: []
  description: |
    Add the same PTY-capture path to `pi.rs::invoke_interactive` that was
    built for `claude_code.rs` in the PTY-capture task. The mechanism is
    already implemented in `src/agent/pty_capture.rs`; this task is a
    small scope wiring job.

    ## Why

    When debug logging is enabled, `claude_code.rs::invoke_interactive` now
    routes through `pty_capture::run_pty_session`, capturing every byte
    exchanged with the claude subprocess in the debug log. The `pi.rs`
    equivalent still uses inherited stdio (`stdio: inherited (no transcript
    available)` per the Results from the PTY-capture task). A pi TUI hang
    would have the same diagnostic blind spot the claude hang had before the
    PTY work shipped.

    ## Scope

    - In `src/agent/pi.rs::invoke_interactive`, add an early branch:
      when `debug_log::is_enabled()`, call
      `pty_capture::run_pty_session("pi", &args, &cwd, "pi")` via
      `spawn_blocking`, matching the pattern in `claude_code.rs`.
    - Existing argv construction is shared; only the spawn mechanism differs.
    - Update the log entry text to read `stdio: pty (full byte transcript
      follows)` on the debug path, matching the claude path.

    ## Verification

    - `cargo test` passes (all PTY-capture unit/integration tests still
      pass; the pi tests are unaffected because none exercise the debug path).
    - Non-debug pi invocation: TUI renders identically, no behaviour change.
    - Debug-enabled pi invocation: TUI renders identically AND debug log
      captures the pi byte stream.
