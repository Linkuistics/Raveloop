tasks:
- id: expand-state-filenames-constants-to-cover-subagent-dispatch-yaml-commits-yaml-phase-md-related-components-yaml-dream-word-count
  title: Expand state::filenames constants to cover subagent-dispatch.yaml, commits.yaml, phase.md, related-components.yaml, dream-word-count
  category: core
  status: done
  dependencies: []
  description: |
    Expand `src/state/filenames.rs` to cover the remaining literal filename strings: `subagent-dispatch.yaml`, `commits.yaml`, `phase.md`, `related-components.yaml`, and `dream-word-count`. Each of these appears in multiple call sites as an unguarded string literal; the refactoring done for the four state-file constants established both the pattern and the module location.

    ## Why

    The adopt-shared-constants task (completed this cycle) closed the rename-drift bug class for the four primary state files. The results noted that `subagent-dispatch.yaml`, `commits.yaml`, `phase.md`, `related-components.yaml`, and `dream-word-count` still appear as scattered literals — one rename away from the same drift. Completing the expansion closes the class entirely.

    ## Scope

    - Add constants to `src/state/filenames.rs`:
      - `SUBAGENT_DISPATCH_FILENAME = "subagent-dispatch.yaml"`
      - `COMMITS_FILENAME = "commits.yaml"`
      - `PHASE_FILENAME = "phase.md"`
      - `RELATED_COMPONENTS_FILENAME = "related-components.yaml"`
      - `DREAM_WORD_COUNT_FILENAME = "dream-word-count"`
    - Grep for each literal and replace with the constant at every non-legacy call site in `src/`.
    - The `PHASE_HIGHLIGHTS` subagent-dispatch regex should use `filename_suffix_regex(SUBAGENT_DISPATCH_FILENAME)` (same pattern as the four existing constants).

    ## Verification

    - `cargo test --quiet` passes.
    - `cargo clippy --all-targets` clean.
    - `grep -rn '"subagent-dispatch\.yaml"\|"commits\.yaml"\|"phase\.md"\|"related-components\.yaml"\|"dream-word-count"' src/` returns only the constant definitions themselves.
  results: |
    ## What was done

    Added five constants to `src/state/filenames.rs`:

    - `SUBAGENT_DISPATCH_FILENAME = "subagent-dispatch.yaml"`
    - `COMMITS_FILENAME = "commits.yaml"`
    - `PHASE_FILENAME = "phase.md"`
    - `RELATED_COMPONENTS_FILENAME = "related-components.yaml"`
    - `DREAM_WORD_COUNT_FILENAME = "dream-word-count"`

    Replaced every non-legacy literal use across `src/`:

    - `src/dream.rs` — all 14 `"dream-word-count"` sites (production + tests).
    - `src/subagent.rs` — all 3 `"subagent-dispatch.yaml"` sites.
    - `src/format.rs` — both `filename_suffix_regex(...)` rule sites
      (`commits.yaml`, `subagent-dispatch.yaml`) plus the `path_to_check.contains("phase.md")` filter at line 239.
    - `src/create.rs` — scaffold writes and assertions.
    - `src/phase_loop.rs` — `read_phase`, `write_phase`, plus tests.
    - `src/main.rs` — `run_phase_loop` plan-dir validation.
    - `src/multi_plan.rs` — `build_plan_dir_map` validation and tests.
    - `src/git.rs` — all 11 `"commits.yaml"` sites in `apply_commits_spec`
      and the test fixtures.
    - `src/state/phase.rs` — `run_set_phase` target path, error message,
      and all test fixtures.
    - `src/survey/discover.rs` — `load_plan` plus 4 test fixtures.

    ## Bonus consolidation

    `src/related_components.rs` previously declared its own
    `RELATED_COMPONENTS_FILE` constant with a different naming
    convention (`_FILE` suffix) than the rest of `state::filenames`
    (`_FILENAME` suffix). Per the universal coding-style rule "Use
    uniform naming semantics", the local constant was deleted and all
    five usages (3 in `related_components.rs`, 1 in `projects.rs`, plus
    test references via `super::*`) now route through
    `state::filenames::RELATED_COMPONENTS_FILENAME`. One canonical
    home for every plan-state filename now.

    ## Boundary preserved

    `src/ontology/yaml_io.rs` is a deliberately host-agnostic library
    module (per its docstring: "Host-agnostic: callers supply the full
    path to the file, not a config root"). Importing the host's
    filename constant there would couple the destined-for-workspace-crate
    library to the host adapter. Instead, the test fixtures in that file
    were renamed from `"related-components.yaml"` to `"edges.yaml"` —
    neutral name, signals the library doesn't care, eliminates the grep
    hit while preserving the architectural boundary.

    ## Verification

    - `cargo build`: clean.
    - `cargo test --quiet`: 590 unit tests + every integration suite green.
    - `cargo clippy --all-targets`: clean (no warnings under `[lints.rust] warnings = "deny"`).
    - `grep -rn '"subagent-dispatch\.yaml"\|"commits\.yaml"\|"phase\.md"\|"related-components\.yaml"\|"dream-word-count"' src/`
      returns only the five constant definitions in `src/state/filenames.rs`.

    ## What this suggests next

    The rename-drift bug class for plan-state filenames is now fully closed.
    The same pattern would apply to other scattered filename literals if any
    remain — none surfaced during this sweep. If a future rename is
    contemplated (e.g., to disambiguate `dream-word-count` from a more
    descriptive name), it is now a single-file change.
- id: add-minimal-github-actions-ci-workflow-build-test-clippy
  title: 'Add minimal GitHub Actions CI workflow: build, test, clippy'
  category: infra
  status: not_started
  dependencies: []
  description: |
    Add a minimal `.github/workflows/ci.yml` that runs on every push and pull request targeting `main`, exercising the three gates: `cargo build`, `cargo test --quiet`, and `cargo clippy --lib --all-targets`.

    ## Why

    `Cargo.toml` already declares `[lints.rust] warnings = "deny"`, which makes `cargo clippy` strict for any developer who runs it locally. But nothing forces a developer to run it before pushing. The `fix-clippy` cycle surfaced this gap: the first GitHub Actions workflow closes the automatic enforcement loop without requiring any changes to the manifest-level strictness settings.

    ## Scope

    - One file: `.github/workflows/ci.yml`
    - Triggers: `push` and `pull_request` on `main`
    - Steps: checkout → `actions/cache` for `~/.cargo` and `target/` → `cargo build` → `cargo test --quiet` → `cargo clippy --lib --all-targets`
    - No matrix (single `ubuntu-latest` runner is sufficient for enforcement; the binary is cross-compiled for release separately via cargo-dist)
    - Rust toolchain: `stable`; pin to a channel, not a specific version

    ## Decisions already made

    - No `--no-deps` on clippy; all-targets is the right scope.
    - The `[lints.rust] warnings = "deny"` manifest setting already propagates `-D warnings` to clippy lint evaluation, so no extra flags are needed in the workflow body.
    - `cargo-dist` will supply its own release workflow via `cargo dist generate`; this CI workflow is strictly for correctness gating on every commit, not for release automation.

    ## Verification

    - Workflow runs green on a test push to a branch.
    - A deliberate clippy violation introduced on a branch causes the workflow to fail.
    - Merge to main only after the workflow passes.
