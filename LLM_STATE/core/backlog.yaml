tasks:
- id: add-pty-capture-debug-path-to-pi-rs-invoke-interactive-parity-with-claude-code-rs
  title: Add PTY-capture debug path to pi.rs::invoke_interactive (parity with claude_code.rs)
  category: infra
  status: blocked
  blocked_reason: Not needed yet; defer until pi-side TUI debugging actually requires it
  dependencies: []
  description: |
    Add the same PTY-capture path to `pi.rs::invoke_interactive` that was
    built for `claude_code.rs` in the PTY-capture task. The mechanism is
    already implemented in `src/agent/pty_capture.rs`; this task is a
    small scope wiring job.

    ## Why

    When debug logging is enabled, `claude_code.rs::invoke_interactive` now
    routes through `pty_capture::run_pty_session`, capturing every byte
    exchanged with the claude subprocess in the debug log. The `pi.rs`
    equivalent still uses inherited stdio (`stdio: inherited (no transcript
    available)` per the Results from the PTY-capture task). A pi TUI hang
    would have the same diagnostic blind spot the claude hang had before the
    PTY work shipped.

    ## Scope

    - In `src/agent/pi.rs::invoke_interactive`, add an early branch:
      when `debug_log::is_enabled()`, call
      `pty_capture::run_pty_session("pi", &args, &cwd, "pi")` via
      `spawn_blocking`, matching the pattern in `claude_code.rs`.
    - Existing argv construction is shared; only the spawn mechanism differs.
    - Update the log entry text to read `stdio: pty (full byte transcript
      follows)` on the debug path, matching the claude path.

    ## Verification

    - `cargo test` passes (all PTY-capture unit/integration tests still
      pass; the pi tests are unaffected because none exercise the debug path).
    - Non-debug pi invocation: TUI renders identically, no behaviour change.
    - Debug-enabled pi invocation: TUI renders identically AND debug log
      captures the pi byte stream.
- id: implement-tui-screenshot-capture-for-tutorial-chapters-04-05-and-fold-into-chapter-prose
  title: Implement TUI screenshot capture for tutorial chapters 04-05 and fold into chapter prose
  category: docs
  status: blocked
  blocked_reason: Script side complete; chapter prose update requires user-driven live TestAnyware VM run
  dependencies: []
  description: |
    Implement TUI screenshot capture mechanism for tutorial chapters 04 and 05
    (`ravel-lite run` work phase and subsequent phases), then fold captured screenshots
    into the chapter prose.

    ## Why

    Chapters 01-03 were updated with verbatim captured output in the previous cycle.
    Chapters 04-05 cover the TUI-driven `run` phase and are screenshot-driven by nature —
    the Ratatui interface cannot be captured as text. The capture mechanism for these
    chapters is a separate concern from the `transcript_at` / interactive-response
    approach used in chapters 01-03.

    The `scenario_run` step is intentionally commented out in `scripts/capture/ravel-lite-tutorial.sh`
    pending this task.

    ## Mechanism design

    TestAnyware screenshot capture via `testanyware screenshot` at key TUI states:
    - Pre-work-phase prompt (the "continue / switch plan / exit" inter-cycle prompt)
    - Active work phase banner and TUI layout
    - Phase transitions visible in the terminal title (OSC escape)
    - Post-run state tree visible in the terminal

    The hybrid pattern established for chapter 03 applies: screenshots for volatile TUI
    views, `transcript_at` for deterministic post-command state.

    ## What `--from <step>` would unlock

    The capture script currently runs all chapters top-to-bottom; re-running just chapters
    04-05 wastes ~2 minutes re-executing chapters 01-03. A `--from <step>` flag (accepting
    a step name like `chapter03` or `chapter04`) should be added to the capture script
    during this task so iterative development of the 04-05 captures is cheap.

    ## Scope

    - Add `--from <step>` flag to `scripts/capture/ravel-lite-tutorial.sh`.
    - Implement `scenario_run` section in the capture script: drive the TUI with
      `testanyware input type` / `testanyware screenshot`, capture screenshots at each
      key TUI state.
    - Validate mechanism against a live TestAnyware VM.
    - Replace illustrative listings and screenshots in chapters 04 and 05 with
      verbatim captured output.
    - Re-render with `scripts/render-docs.sh` and spot-check HTML.

    ## Done when

    Chapters 04 and 05 use verbatim captured screenshots and the rendered HTML passes
    a visual spot-check.
  results: |
    ## What was done

    Implemented the script side of the chapter 04-05 capture mechanism. The work splits cleanly into two halves; this session delivered the first half (script implementation) and surfaced the dependency for the second half (live VM run + chapter prose update).

    ### Script changes (`scripts/capture/ravel-lite-tutorial.sh`)

    - Added flag parsing for `--from <step>`, `--vm-id <id>`, `--keep-vm`. Validates `--from` against the allowed step set (`chapter01`, `chapter02`, `chapter03`, `chapter04`, `final`) and refuses `--from chapter02|03|04|final` without a `--vm-id` (the prerequisite VM state is missing on a fresh VM).
    - Added a focused `--help` block describing the iteration pattern: first run with `--keep-vm` to complete chapters 01-03, then `--vm-id <id> --from chapter04` to iterate on chapter 04-05 captures cheaply.
    - Made VM lifecycle ownership explicit (`OWN_VM` flag): when the user supplied `--vm-id`, the script skips `vm_lifecycle_start` and the cleanup trap leaves the VM alone. When the user passed `--keep-vm`, cleanup also skips teardown and prints the resume command for the next iteration.
    - Introduced a `maybe_run <step-name> <fn>` gating helper. Step names group by chapter so granular flag values don't proliferate. The first call whose name matches `--from` flips an internal `STARTED` flag; every subsequent call runs.
    - Reworked `main()` to wrap each chapter-grouped function call in `maybe_run`. Re-enabled `scenario_run` (was commented out as `# scenario_run`).
    - Replaced the placeholder `scenario_run` body (which had a wrong `find-text "phase: work"` target — that string only appears in YAML, not the TUI) with a complete implementation:
      - Pre-cycle: snapshot `phase.md` and capture pre-run HEAD SHA so the polling can detect when HEAD has actually advanced (necessary for iterative `--from chapter04` re-runs where the prior cycle's tail is already a `save-work-baseline` commit).
      - Drive `ravel-lite run`, screenshot the WORK banner via `find-text "WORK" --timeout 60`, screenshot the work-phase prompt after a 25s settle delay.
      - Type the task choice from `responses/04-task-choice.txt`.
      - Poll every 10s for up to ~20 minutes; completion = `phase.md == work` AND `HEAD != pre_run_sha` AND most-recent commit matches `save-work-baseline`. Periodic mid-cycle screenshots every 60s.
      - Screenshot the `Proceed to next work phase?` prompt (verbatim string from `src/phase_loop.rs:463`), type `n` + return, screenshot the post-exit terminal.
      - Capture six post-cycle deterministic transcripts: pre/post `phase.md`, post-cycle `git log --oneline -10`, `state session-log show-latest`, `state memory list`, `state backlog list`.

    ### Response file

    - Added `scripts/capture/responses/04-task-choice.txt` with the chapter's illustrative selection (`the distributed-systems entries`).

    ### Verification done in this session

    - `bash -n` syntax-checks clean.
    - `--help` renders the focused usage block correctly.
    - `--from <bad-step>` rejects with the allowed-steps list.
    - `--from chapter04` without `--vm-id` rejects with the prereq-state warning.
    - `--from chapter04 --vm-id fake-vm` traces correctly: `chapter01..chapter03` skipped, `scenario_run` invoked, fails at first `testanyware exec` against the non-existent VM (expected).
    - The cleanup trap honours `--vm-id` and `--keep-vm` correctly in both traced runs.

    ## What is NOT done (the chapter-prose half)

    The task's "Done when" criterion — `Chapters 04 and 05 use verbatim captured screenshots and the rendered HTML passes a visual spot-check` — cannot complete in this session. It requires:

    1. The user runs `scripts/capture/ravel-lite-tutorial.sh --keep-vm` against a live TestAnyware VM.
    2. Inspect the produced screenshots in `docs/captures/ravel-lite-tutorial/screens/04-*.png` and transcripts in `transcripts/04-*.txt` / `transcripts/05-*.txt` — confirm the TUI states are legible and the post-cycle deterministic state captures are accurate.
    3. Tune `responses/04-task-choice.txt` if claude's seeded backlog doesn't match the illustrative `the distributed-systems entries` task name. Iterate cheaply via `--vm-id <id> --from chapter04`.
    4. Replace illustrative `[source,text]` blocks in `docs/tutorial/04-the-first-cycle.adoc` and `05-further-cycles.adoc` with verbatim transcripts from `04-git-log-post-cycle.txt`, `04-session-log-latest.txt`, `05-memory-after-reflect.txt`, `05-backlog-after-triage.txt`.
    5. Decide whether to embed selected screenshots inline (chapter 03 doesn't currently embed images, so the convention is "captures inform the prose, not always shown" — but the TUI banners may be worth showing visually).
    6. Re-render with `scripts/render-docs.sh` and spot-check.

    ## Suggested next steps

    - **Triage option A**: split this task into "implement scenario_run" (done) + new task "Run capture script and fold chapter 04-05 prose". The latter is small, well-shaped, and gates only on the user's VM availability. This is probably cleaner than carrying a half-done task.
    - **Triage option B**: keep as one task, leave blocked. Resume from a future work session that begins by running the capture script.

    Recommend option A — the script side is a tangible, testable deliverable that should be visible as `done` in the audit trail.

    ## Side note (not in scope, recorded for triage awareness)

    In response to a finding during this session — that the website publish pipeline snapshots tag trees immutably via `git archive`, so docs written *for* a tag but committed *after* it never appear in the `/v<minor>/` snapshot — the user asked me to file an issue in the sibling `www.linkuistics.com` project. I bootstrapped `LLM_STATE/core/` there with the four scaffold files (`phase.md`, `backlog.yaml`, `memory.yaml`, `dream-word-count`) and added one task: `resolve-docs-vs-tag-staging-gap-post-tag-doc-updates-miss-the-versioned-snapshot` (category `publish-flow`). Those files are uncommitted in `www.linkuistics.com/` for the user to commit when ready — they are outside Ravel-Lite's pathspec scope so analyse-work in this repo will not touch them.
