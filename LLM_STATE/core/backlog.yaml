tasks:
- id: diagnose-claude-tui-invisible-after-work-phase-banner-on-a-fresh-machine
  title: 'Verify fix: re-test work-phase TUI hang on fresh machine after removing --add-dir and fixing path normalisation'
  category: infra
  status: blocked
  blocked_reason: No fresh-machine access right now; revisit when colleague is available to re-test
  dependencies: []
  description: |
    ## Status

    Both leading-hypothesis fixes have shipped:

    1. **Double-slash path-join bug** (`select_config_dir` now normalises trailing slashes via `components().collect()`).
    2. **Redundant `--add-dir <plan_dir>`** removed from `invoke_interactive` in `src/agent/claude_code.rs`.

    These were the two most likely causes of the invisible trust-grant modal (hypothesis A) that hung the work phase on a fresh machine.

    ## Required action

    Have the affected colleague (macOS, local terminal, no multiplexer, Claude 2.1.119) pull the latest binary and re-run `ravel-lite run` from their launcher-web project.

    Expected outcome: work phase proceeds normally with no hang after the banner.

    ## If the hang persists

    Pivot to hypothesis B (inline-viewport handoff bug in `src/ui.rs:298` reset volley). Investigation path:

    - Check colleague's `~/.claude.json` for the project path to see if trust is already granted.
    - Run `dangerous: true` in their plan's config (appends `--dangerously-skip-permissions`); if hang disappears, a remaining trust-grant modal is the cause.
    - If B, inspect `src/ui.rs:244` Viewport::Inline and the `suspend` volley at line 298.

    The `capture-full-claude-stdio-under-a-pty-in-debug-log-for-tui-hang-diagnosis` task provides the full diagnostic capture tool if further investigation is needed.

    ## What "done" looks like

    Colleague confirms the hang is gone. Or, if hang persists: root cause identified and a follow-up fix landed.
- id: retire-legacy-docs-pipeline-scripts-build-docs-sh-build-config-sh-manifest-txt-templates
  title: Retire legacy docs pipeline scripts (build-docs.sh, build-config.sh, manifest.txt, templates/)
  category: infra
  status: done
  dependencies: []
  description: |
    Retire the legacy docs pipeline scripts (`scripts/build-docs.sh`,
    `docs/build-config.sh`, `docs/manifest.txt`, `docs/templates/`) from
    the Ravel-Lite repo.

    ## Why

    The phase-cycle reference-page work (2026-04-27) confirmed these scripts
    now write to orphaned paths. The new pipeline for `www.linkuistics.com`
    reads `<project>/website/` directly via `git archive` and never invokes
    asciidoctor locally. The legacy scripts still reference
    `../www.linkuistics.com/projects/ravel-lite/`, which is no longer where
    generated HTML should land.

    Additionally, every remaining reference-page backlog task still says
    "run `./scripts/build-docs.sh` to confirm the page renders cleanly" and
    "Update `docs/manifest.txt`", which misleads future work phases.

    ## Scope

    1. **Delete or replace** the legacy scripts:
       - `scripts/build-docs.sh` â€” either delete, or replace with a thin
         `scripts/render-docs.sh` that runs
         `asciidoctor --embedded docs/reference/*.adoc` and places output
         under `website/docs/`. The latter is preferable: it makes the
         local render workflow repeatable without needing a sibling repo.
       - `docs/build-config.sh` â€” delete.
       - `docs/manifest.txt` â€” delete (the website pipeline does not read it).
       - `docs/templates/` â€” delete (asciidoctor's `--embedded` flag needs
         no custom templates for the current fragment-only output).

    2. **Update all remaining reference-page task descriptions** to replace
       references to `./scripts/build-docs.sh` and `docs/manifest.txt` with
       the correct verification step:
       `asciidoctor --embedded docs/reference/<page>.adoc -o website/docs/<page>.html`
       (or `./scripts/render-docs.sh` if that wrapper exists).

    ## Verification

    - `ls scripts/build-docs.sh docs/build-config.sh docs/manifest.txt docs/templates/`
      returns "no such file" for each.
    - `./scripts/render-docs.sh` (if written) produces clean HTML under
      `website/docs/` with no asciidoctor warnings.
    - All reference-page backlog task descriptions that previously mentioned
      `build-docs.sh` now reference the correct workflow.
  results: |
    ## What shipped

    - **Deleted** `scripts/build-docs.sh`, `docs/build-config.sh`,
      `docs/manifest.txt`, `docs/templates/page-shell.html`, and the now-empty
      `docs/templates/` directory. These were the legacy pipeline writing into
      a sibling `www.linkuistics.com/projects/ravel-lite/` checkout that no
      longer exists at that path.
    - **Added** `scripts/render-docs.sh` (44 lines, bash strict mode). Loops
      every `docs/reference/*.adoc` and `docs/tutorial/*.adoc` through
      `asciidoctor --embedded` and writes fragments under `website/docs/` and
      `website/tutorials/` â€” exactly what the eleventy pipeline at
      `www.linkuistics.com` reads via `git archive`.
    - **Updated** `README.md` `## Documentation` section to describe the new
      workflow and document the canonical sibling-relative `link:<page>.html[]`
      link form (and the eleventy `rewriteRelativeLinks` filter that converts
      it into a directory URL).
    - **Updated** the description of the
      `rewrite-config-and-prompts-reference-page-for-lua-api` backlog task to
      point at `scripts/render-docs.sh` instead of the deleted scripts and the
      deleted `docs/manifest.txt`.

    ## What worked

    `./scripts/render-docs.sh` produces clean HTML fragments for all 9
    reference pages and 1 tutorial page with no asciidoctor warnings (verified
    with `--failure-level=WARN`). The eleventy pipeline at
    `www.linkuistics.com` already reads `website/docs/` directly, so the new
    script is a drop-in for what the legacy pipeline used to write to a
    sibling checkout.

    ## What didn't, and what's next

    Nothing blocked. Two follow-ups worth flagging:

    - The historical spec
      `docs/superpowers/specs/2026-04-27-manual-release-and-capture-tooling-design.md`
      still mentions the deleted scripts in its "Asciidoc backlog cleanup"
      section. Left intact â€” it is a historical planning record, not a live
      reference; modifying past specs would misrepresent what was decided
      when.
    - The other docs backlog items (state-files, cross-plan-files,
      config-and-prompts) still have description text from before the
      pipeline change. Updated only the one I'm about to touch in a sibling
      task. The remaining task descriptions need similar trimming when their
      authors next pick them up; left as latent work rather than a separate
      triage pass.
- id: rewrite-config-and-prompts-reference-page-for-lua-api
  title: Rewrite config-and-prompts reference page for Lua API
  category: docs
  status: not_started
  dependencies: []
  description: |
    Rewrite the `config-and-prompts` reference page for the Lua-based
    config and append-only prompt customisation API. Supersedes the
    existing "Reference: configuration and prompt-file formats" backlog
    task, which describes the now-defunct YAML config model.

    ## Why

    The shipped reference page (or its placeholder) describes the
    YAML + `*.local.yaml` overlay model and the on-disk prompt files.
    After the lua-config + embedded-defaults landings, none of that
    matches reality. Users need a single page that describes the new
    layout: what's embedded, what's user-owned, and how to customise
    via `config.lua`.

    ## Scope

    File:

    - `docs/reference/config-and-prompts.adoc`.

    Cover:

    - The two-layer config model: global
      (`<config-dir>/config.lua`) and per-plan (`<plan>/config.lua`).
      Show the precedence chain for finding `<config-dir>`
      (`--config` â†’ `RAVEL_LITE_CONFIG` â†’ `dirs::config_dir()/ravel-lite`).
      Describe composition semantics: setters last-write-wins,
      registrators (`append_prompt`) accumulate.
    - The `ravel` global table API â€” every public function, with one
      minimal `config.lua` example per entry.
    - Prompt customisation via `ravel.append_prompt(phase, text)`,
      including the contract that user text is *appended* and cannot
      replace the embedded prompt.
    - Prompts themselves are not on disk; link to the embedded source on
      GitHub for reading
      (`https://github.com/Linkuistics/Ravel-Lite/tree/main/defaults`).
    - `config.config_version` field â€” what it is, why it's auto-stamped,
      when it bumps. Link to the migration behaviour for old
      installations.

    Render:

    - Run `./scripts/render-docs.sh` to produce
      `website/docs/config-and-prompts.html`. Commit both source and
      rendered fragment.

    ## Decisions already made

    - Single page (not split per layer or per API function).
    - Prose + worked examples; no auto-generated reference table.
    - The existing
      `reference-configuration-and-prompt-file-formats-config-yaml-local-yaml-overlays-embedded-defaults-token-substitution-per-phase-prompts`
      task should be marked `blocked` with reason "superseded by
      lua-config redesign" once this task is in flight.

    ## Verification

    - Page renders without AsciiDoc errors via
      `./scripts/render-docs.sh`.
    - Every `ravel.*` function listed in the reference has a working
      code example.
    - A reader landing cold on the page can write a minimal
      `config.lua` that sets one model and registers one
      `append_prompt`, with no other knowledge.

    ## Dependencies

    Depends on the lua-config replacement (API surface must be settled),
    the embedded-defaults landing (so the doc accurately describes what's
    on disk vs embedded), and the migration landing (so upgrade
    behaviour can be documented from observed reality).
