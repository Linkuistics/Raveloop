tasks:
- id: remove-dead-commit-message-md-branch-from-git-commit-plan
  title: Remove dead commit-message.md branch from git_commit_plan
  category: core
  status: done
  dependencies: []
  description: |
    Remove the dead `commit-message.md` branch from `git_commit_plan` in `src/git.rs` and its associated highlight rule at `src/format.rs:101`.

    ## What

    The `commit-message.md` branch inside `git_commit_plan` is unreachable in production — no current phase prompt authors `commit-message.md`. The `fix-stale-references` cycle confirmed this and updated the doc comment to say so explicitly. Two pieces need removal:

    1. The `if commit-message.md exists, read it and delete it` branch inside `git_commit_plan` in `src/git.rs`.
    2. The UI highlight rule for `commit-message.md` at `src/format.rs:101`.

    ## Why

    Dead code that's documented as dead is still dead code. The doc comment update from `fix-stale-references` made the state visible; the next step is removal. A reader landing on `git_commit_plan` should see only the current mechanism, not a legacy path with a "this doesn't fire" comment.

    ## Precondition

    Before removing: confirm no out-of-tree plan dir or external plan prompt currently authors `commit-message.md`. A grep across `defaults/` and any user-local plan overrides at `LLM_STATE/` is sufficient.

    ## Scope

    - Remove the `commit-message.md` read-and-delete branch from `git_commit_plan` in `src/git.rs`.
    - Remove the highlight rule at `src/format.rs:101`.
    - Update the doc comment on `git_commit_plan` (the current comment still says "legacy branch" — rewrite to describe the default message path only).
    - No behaviour change; no other callers affected.

    ## Verification

    - `cargo test --quiet` passes with no regressions.
    - `grep -r "commit-message.md" src/` returns no matches (aside from tests or comments that are now obsolete and also removed).
  results: |
    ## What was done

    - **`src/git.rs`** — removed the `commit-message.md` read-and-delete branch from `git_commit_plan`. The function now always uses the default `run-plan: {phase_name} ({plan_name})` message. Doc comment rewritten to describe the default-message-only behaviour and to point at `apply_commits_spec` against `commits.yaml` as the work-phase mechanism.
    - **`src/format.rs`** — removed the `HighlightRule` for `commit-message.md` (the "Writing commit message" label) from `PHASE_HIGHLIGHTS[LlmPhase::AnalyseWork]`.
    - **`tests/phase_loop.rs`** — `ContractMockAgent::invoke_headless` for `AnalyseWork` now writes `commits.yaml` (a single spec entry covering `paths: ["."]` with the legacy custom message) instead of `commit-message.md`. Updated assertion 2 to check `commits.yaml` was consumed by `git-commit-work`. Updated two error-message strings ("expected …commit-message.md" → "…commits.yaml"). Updated the `ContractMockAgent` doc comment.
    - **`tests/pi_agent.rs`** — fake-pi shell script now `cat`s `commits.yaml` (with the same single-entry shape) instead of `commit-message.md`. Updated the test's doc comment and the log-assertion error message.

    ## What worked

    - The grep across `defaults/` and `LLM_STATE/` confirmed the precondition (no production prompt or plan dir authors `commit-message.md`).
    - The migration of test mocks from `commit-message.md` → `commits.yaml` is mechanical: `apply_commits_spec` now drives the custom message directly via the YAML spec file, instead of relying on the side-effect chain where `commit-message.md` lingered through `apply_commits_spec` and was consumed by the next `git_commit_plan` call (`save-reflect-baseline`). That side-effect was the actual mechanism the tests were exercising — surfacing it as the task description's "dead branch in `git_commit_plan`" was misleading; the branch was reachable, just only via tests.
    - Verification: `grep -rn "commit-message" src/ tests/ defaults/` returns zero matches. Full test suite passes (`cargo test` — 586 unit + all integration tests, no failures). `cargo build --tests` clean.

    ## What didn't / wrinkles

    - The backlog precondition only mentioned `defaults/` and `LLM_STATE/` — it did not flag the active test fixtures that still wrote `commit-message.md`. The `(aside from tests or comments that are now obsolete and also removed)` clause in the verification step covered the case but the scope statement could have been more explicit.
    - The PHASE_HIGHLIGHTS for `AnalyseWork` now has only one rule (`latest-session.md`). It would be reasonable to add a `commits.yaml` highlight rule ("Writing commit spec" or similar) so the UI feedback covers analyse-work's other major file write — but that is scope-creep against this task. Filed as a suggestion below.

    ## What this suggests next

    - Add a `HighlightRule` for `commits.yaml` in `PHASE_HIGHLIGHTS[LlmPhase::AnalyseWork]` to surface the file write in TUI progress.
    - The memory entries at `memory.yaml:558-561` (`commit-message-md-branch-in-git-commit-plan-is-dead`) and `memory.yaml:65` (`pi_phase_cycle_substitutes_tokens_and_streams_events` description, which still references "audit commit via `commit-message.md`") are now stale. Reflect should retire/update them next cycle.
    - The task description called the branch "dead in production" but the test fixtures kept it alive via a side-effect chain. Worth a small post-mortem note: if a "dead code" task surfaces again, the precondition check should always include `tests/` not just production prompts.
- id: fix-clippy-unnecessary-sort-by-in-render-rs-and-enforce-clean-clippy-in-ci
  title: Fix clippy unnecessary_sort_by in render.rs and enforce clean clippy in CI
  category: core
  status: not_started
  dependencies: []
  description: |
    Fix the pre-existing clippy `unnecessary_sort_by` warning at `src/state/backlog/render.rs:95` and add `cargo clippy --lib -- -D warnings` to the CI check (or pre-commit hook) so future violations surface immediately.

    ## What

    `cargo clippy --lib` on `main` warns at `src/state/backlog/render.rs:95`:

    ```
    warning: use of `sort_by` with a comparison function that can be replaced with `sort_by_key`
      --> src/state/backlog/render.rs:95:N
       |
       |     .sort_by(|a, b| a.something.cmp(&b.something))
       |                                                         ^ help: try: `.sort_by_key(|k| k.something)`
    ```

    The fix is a one-line mechanical replacement: `sort_by(|a, b| a.x.cmp(&b.x))` → `sort_by_key(|k| k.x)`.

    ## Why

    The `add-snapshot-test` cycle surfaced this as a pre-existing warning. It was out of scope for that task (unrelated to the snapshot test) but is worth addressing so `cargo clippy -- -D warnings` can be added to CI without noise. A clean clippy baseline makes future violations visible the moment they land rather than accumulating into a backlog.

    ## Scope

    1. Fix the `unnecessary_sort_by` at `src/state/backlog/render.rs:95`.
    2. Run `cargo clippy --lib -- -D warnings`; if other pre-existing warnings surface, fix them in the same commit (do not suppress with `#[allow(...)]` unless there is a documented reason).
    3. Add `cargo clippy --lib -- -D warnings` to whatever CI script / Makefile target runs checks.

    ## Verification

    - `cargo clippy --lib -- -D warnings` exits 0.
    - `cargo test --quiet` passes with no regressions.
