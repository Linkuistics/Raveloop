      - `src/migrate_v1_to_v2.rs` (new file, ~600 lines including tests) implements the migration: detects legacy layout by intersecting embedded-defaults paths with what's actually on disk, translates merged `config.yaml` + `config.local.yaml` + per-agent `config.yaml` / `tokens.yaml` into a `config.lua` with version marker, then deletes the legacy files and prunes newly-empty dirs. Crash recovery is safe: writes happen before deletes, so a crash between the two leaves legacy files on disk and the next call completes cleanup. Seven unit tests covering: empty dir no-op, already-v2 no-op, full v1 translation + deletion + dir prune, idempotency, crash recovery, existing-lua marker append, user-owned file blocks dir prune, deep-merge logic, `lua_quote` escaping.
