    - Renamed `tests/state_related_projects.rs` → `tests/state_related_components.rs`, rewritten end-to-end for v2 shapes (symmetric-kind canonicalisation, deprecated-alias forwarding with stderr warning, legacy-v1-file hard-error path).
    - Bumped proposals schema to v2 in `src/discover/schema.rs`: `ProposalRecord` gains `lifecycle`, `evidence_grade`, `evidence_fields`, `rationale`; `PROPOSALS_SCHEMA_VERSION = 2`.
    - Updated `src/discover/apply.rs` to construct v2 `Edge` values from v2 proposals; narrowed `find_directional_conflict` to directed-kind + same-lifecycle + reversed-participants only.
    - Updated `src/main.rs`: added `mod ontology`; new `StateCommands::RelatedComponents` variant; old `RelatedProjects` variant retained as a deprecated alias with stderr warning; `MigrateRelatedProjects` / `print_migration_report` deleted.
