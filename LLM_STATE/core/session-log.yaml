    ### Session 30 (2026-04-23T09:39:50Z) — Wire {{ONTOLOGY_KINDS}} token into Stage 2 prompt

    - **What was attempted:** Complete task `rewrite-stage-2-discover-prompt-for-ontology-v2-vocabulary` — replace the hard-coded edge-kinds section in `defaults/discover-stage2.md` with a `{{ONTOLOGY_KINDS}}` template token rendered at launch time from `defaults/ontology.yaml`, wire the substitution into `src/discover/stage2.rs`, and add drift tests asserting bijection between the rendered block and `EdgeKind::all()`.

    - **What worked:** All deliverables shipped. `defaults/discover-stage2.md` now has `{{ONTOLOGY_KINDS}}` where the static kind list was, plus a new nine-step "Decision tree" section and a rewritten "Insufficient signals" section repositioned as the `weak` evidence-grade threshold. `src/ontology/defaults.rs` gained `render_kinds_for_prompt(&OntologyYaml) -> String` and `render_embedded_kinds_for_prompt() -> Result<String>`; both re-exported from `src/ontology/mod.rs`. `src/discover/stage2.rs` calls `render_embedded_kinds_for_prompt()` first (before `{{PROPOSALS_OUTPUT_PATH}}`), then runs `assert_no_dangling_tokens`. Four drift tests in `src/discover/stage2.rs::tests` and six unit tests in `src/ontology/defaults.rs::tests` and `src/ontology/mod.rs::drift_tests` were added. `cargo build` clean; `cargo test --lib` 453 passed; `cargo test --tests` all suites green.

    - **What this suggests trying next:** Task `extend-cli-for-ontology-v2-and-add-stage-1-interaction-role-hints` is now unblocked. It adds `interaction_role_hints` to Stage 1 surface records and extends the CLI for v2 `lifecycle`/`evidence-grade` arguments. The Stage 2 decision tree should have a paragraph added explaining how to consume hints as priors once Stage 1 starts emitting them.

    - **Key learnings / notes:**
      - The `{{ONTOLOGY_KINDS}}` substitution must happen *before* `{{PROPOSALS_OUTPUT_PATH}}` to prevent the fake-claude shim's `grep -oE '/[^[:space:]]+\.yaml'` extractor in `tests/discover.rs` from latching onto a `.yaml` mention that might appear in the rendered ontology block. Ordering substitutions defensively is the correct pattern.
      - Task brief references to `docs/component-ontology.md §13.2/§14.1` do not exist; those numbers belong to the migration companion doc (`docs/component-ontology-migration.md §5.2`). Triage should update the sibling task `extend-cli-for-ontology-v2-and-add-stage-1-interaction-role-hints` description to cite the correct section.
      - Golden-file test deferred: structural drift tests + existing e2e cover the shape; a golden file for LLM output would be non-deterministic to regenerate and duplicate what's already pinned.
      - Manual smoke test (`ravel-lite state related-components discover --apply` against a real catalog) still outstanding; requires a live claude subagent and a v2-ready catalog. Deferred to user execution.
