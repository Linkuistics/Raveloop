    - `src/discover/schema.rs` — renamed field, updated type to `ProjectState`, updated round-trip test, added two new compat tests.
    - `src/discover/tree_sha.rs` — added `Serialize, Deserialize` to `ProjectState`; added `#[serde(default)]` to `dirty_hash` for read-compat with pre-dirty-hash files.
