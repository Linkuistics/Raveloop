    - Updated `defaults/discover-stage2.md` to emit v2 proposal shape (9-kind transitional subset; full vocabulary swap is next task).
    - Updated `defaults/phases/work.md` and `defaults/create-plan.md` to reference `state related-components` and `discover --apply`.
    - Changed LICENSE from MIT to Apache 2.0.
    - All 500 tests pass.

    - Worked well: the v2 types in `src/ontology/` were already complete, making the migration primarily mechanical caller-by-caller substitution. The legacy-v1-file hard-error path and deprecated-alias test coverage were straightforward to add.
    - Surprises: the fake-claude shim in `tests/discover.rs` extracts the output path via `grep -oE '/[^[:space:]]+\.yaml'`, which greedily matches any `.yaml` filename in the prompt — a mention of `defaults/ontology.yaml` in the Stage 2 prompt would have hijacked it. Worked around by omitting that filename from the prompt; the next task's prompt rewrite should harden the shim to extract from a dedicated marker.
    - Linting surprise: `src/ontology/mod.rs` pub-re-exports are consumed only by lib-side `#[cfg(test)]` drift tests; main.rs sees them as unused. Resolved with targeted `#[allow(unused_imports)]` / `#[allow(dead_code)]` — worth removing when the next task's prompt-rendering code uses those symbols.

    - Unblocked: `rewrite-stage-2-discover-prompt-for-ontology-v2-vocabulary` (next task). Its prompt rewrite should also harden the fake-claude shim.
    - Latent design question: `find_directional_conflict` uses the narrow reading of §7.4 (same lifecycle only for reversed-pair conflicts). Whether cross-lifecycle reversals should also be flagged is not settled; surfaced in the task results for the next triage cycle.
