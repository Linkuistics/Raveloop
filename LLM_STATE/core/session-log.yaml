    - Implemented PTY-based capture of the claude work-phase subprocess, gated behind `--debug`.
    - Added `src/agent/pty_capture.rs`: new module with `tee_to` (byte-copy primitive with tap closure), `pump_stdin_with_shutdown` (libc::poll-based stdin pump with AtomicBool shutdown), `drive_pty_io` (three-thread orchestrator: stdout pump, stdin pump, SIGWINCH forwarder), `run_pty_session` (production entry with raw-mode RAII guard), and `current_terminal_size` (TIOCGWINSZ with 24x80 fallback).
