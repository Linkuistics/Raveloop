    - Added `portable-pty = "0.9"` and `libc = "0.2"` as direct Cargo dependencies.
    - All tests pass (700+ across lib + integration files, including five new tests in `pty_capture::tests`).

    - What worked: MasterPty `Send`-but-not-`Sync` constraint cleanly resolved by moving the master into the resize thread and taking reader/writer before the move. The `libc::poll` + AtomicBool shutdown pattern avoided the spawn_blocking cancellation problem.
    - What didn't: No e2e test for `log_pty_chunk` writing to the actual singleton debug log file (OnceLock singleton makes per-test isolation expensive); renderer is unit-tested in isolation instead. No SIGWINCH unit test (interacts with test runner's terminal). Pi agent not converted (out of scope for this task).

    - What this suggests next: Live verification with `--debug` on a real claude run (confirm TUI renders identically, log captures the byte stream, resize reflows). Then report back on the `diagnose-claude-tui-invisible-after-work-phase-banner-on-a-fresh-machine` task with findings. If PTY capture proves its value, promote pi.rs to parity (same shape, smaller patch).
