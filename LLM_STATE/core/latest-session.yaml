  ### Session 67 (2026-04-27T08:33:06Z) — Add release-doctor.sh prereq verification

  - Added `scripts/release-doctor.sh`: a ~100-line pure-bash script that verifies all four prerequisite categories for the release pipeline (zig, cargo-zigbuild, four rustup targets, gh auth) and emits a complete punch-list of anything missing before exiting non-zero
  - Wired the doctor as the first step in `release-build.sh`'s `main()` so misconfigured machines fail fast before any build work starts
  - Both paths verified: dev-machine path exits 0 with all-pass markers; simulated clean-machine path (PATH stripped) exits 1 with failure lines and remediation commands for each missing item
  - The four rustup targets are intentionally duplicated between `release-doctor.sh` and `release-build.sh`'s TARGETS array with a sync comment; no shared sourced file introduced (two duplicates beats the indirection of a third file)
  - A new backlog task was added to diagnose the claude TUI becoming invisible after the work-phase banner on a fresh machine (a user-reported issue with `--add-dir`, the trust modal, and the inline-viewport handoff)
