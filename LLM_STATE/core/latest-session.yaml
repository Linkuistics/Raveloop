  ### Session 35 (2026-04-24T02:05:18Z) — Ontology CLI extraction and deprecated alias removal

  - Attempted and completed two refactor tasks: (1) extract three ontology parse helpers from `src/main.rs` into a new `src/ontology/cli.rs` submodule, and (2) remove the deprecated `state related-projects` CLI alias along with its test and migration doc.
  - Both tasks succeeded fully. `cargo build --release` clean, `cargo test` passing (538+ tests total including 6 new unit tests in `ontology::cli`).
  - Also deleted five stale design/plan documents (`docs/r7-related-projects-discovery-design.md`, `docs/r7-related-projects-discovery-plan.md`, `docs/structured-backlog-r1-plan.md`, `docs/structured-plan-state-design.md`, `docs/survey-pivot-design.md`) that had been superseded by the current backlog-driven workflow — net removal of ~6.6k lines of obsolete docs.
  - `docs/architecture.md` and `docs/component-ontology.md` were updated for accuracy (expanded file tree, corrected stale descriptions).
  - Key learning from the `cli.rs` extraction: the new module uses `super::{EdgeKind, LifecycleScope, EvidenceGrade}` rather than going through `related_components`'s re-exports, which avoids a subtle dependency inversion if/when Atlas extracts a standalone ontology crate.
  - No blockers. Backlog is now empty after these two completions.
