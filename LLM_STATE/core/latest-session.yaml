  ### Session 32 (2026-04-23T12:30:01Z) — Audit r7 design doc post-ontology-v2

  - Audited `docs/r7-related-projects-discovery-design.md` against the post-ontology-v2 state of the codebase and documentation.
  - Four classes of drift identified and resolved: (1) file name / CLI verb drift (`related-projects.yaml` → `related-components.yaml`, `state related-projects` → `state related-components`); (2) v1 edge-kind vocabulary superseded by 17-kind v2 ontology — sections updated to cross-reference `component-ontology.md` rather than duplicate; (3) dirty-tree handling: spec said "bail on dirty subtree" but shipped implementation folds dirty state into `dirty_hash` cache key; (4) Agent-trait open question resolved — Stage 1 spawns `claude -p` directly via `spawn_claude_with_cwd`.
  - Status line updated to "Shipped. Historical design record." and a top-level banner added pointing to `component-ontology.md` and `component-ontology-migration.md` as authoritative vocabulary sources.
  - §Rust Module Layout rewritten to describe the shipped layout (`src/discover/{mod,cache,stage1,stage2,apply,schema,tree_sha}.rs` + `src/ontology/`); §Open Questions reframed as "Resolved during implementation".
  - All v1 references either removed, marked with `> _Historical note._` blocks, or placed inside clearly framed transition prose.
  - No code changes; documentation only. Diff stat: 233 insertions, 101 deletions in a single file.
  - The companion plan doc (`docs/r7-related-projects-discovery-plan.md`) was not audited — it has ~15 occurrences of `related-projects` and v1 kind references, but as a frozen implementation record it is lower priority.
  - `docs/architecture.md` was not audited; may carry stale v1 vocabulary.
