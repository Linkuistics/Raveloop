body: |
  ### Session 68 (2026-04-27T00:00:00Z) — Add --debug flag to ravel-lite run

  - Implemented `--debug` flag on `ravel-lite run` to instrument all ravel ↔ claude interaction
  - Added `src/debug_log.rs`: a `OnceLock<DebugLog>` singleton with `enable`, `is_enabled`, `log`, `log_stream_line`, and `format_argv`; constants `CLAUDE_DEBUG_FILE` and `EMBEDDING_DEBUG_FILE` centralise the `/tmp/` paths so spawn sites and the CLI handler share one source of truth
  - Instrumented four spawn sites: `src/agent/claude_code.rs` (interactive and headless), `src/agent/pi.rs` (interactive and headless), `src/agent/common.rs` (`pump_stdout_to_ui` + `spawn_stderr_drain` + exit in `run_streaming_child`), `src/survey/invoke.rs::spawn_claude_and_read`
  - For interactive (TUI) paths, stdio is inherited and not capturable; the log entry explicitly records "stdio: inherited (no transcript available)" to avoid silent lossiness
  - `cargo build` clean; 604 tests pass including 3 new tests in `debug_log`; smoke test confirmed `/tmp/ravel-embedding-debug.log` is created and truncated on `ravel-lite run --debug`
  - `create::run_create` and `discover::stage1` were explicitly left uninstrumented — they are not reachable from `run`, and `--debug` is a `run` flag only
  - Singleton approach chosen over threading `Option<Arc<DebugLog>>` through the call graph because debug-on/off is process-wide state; the alternative would have changed five-plus function signatures across unrelated call sites

  - The hang-diagnosis task (`diagnose-claude-tui-invisible-after-work-phase-banner-on-a-fresh-machine`) is now more tractable: a colleague can re-run with `--debug` and share both files for offline root-cause analysis
  - The `remove-redundant-add-dir-from-invoke-interactive-work-phase-spawn` task can now be validated empirically: run with `--debug`, apply the change, confirm the trust-grant modal disappears on a fresh machine
