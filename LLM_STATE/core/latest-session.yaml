  ### Session 79 (2026-04-28T06:25:02Z) — Fold live-captured transcripts into tutorial chapters 04 and 05

  - Attempted: run `scripts/capture/ravel-lite-tutorial.sh` against a live TestAnyware macOS VM to capture chapters 04-05 transcripts, then fold the output into the tutorial prose and re-render HTML.
  - What worked: all target transcripts captured (git log, session-log show-latest, memory list, backlog list after triage); folded into chapters 04 and 05 replacing all illustrative placeholders; two capture-script bugs found and fixed during the run; HTML re-rendered cleanly.
  - Three prose corrections that came out of comparing illustrative vs. real output: (a) first cycle has no leading save-work-baseline between the scaffold and the work commit; (b) triage removes done tasks rather than leaving them open; (c) work commit messages are diff-authored, not templated as `run-plan: work`. Chapter 05 task names also normalised to match the real create-flow output from chapter 03.
  - Three script bugs encountered: (1) `transfer_claude_auth` RETURN trap dereferenced `$creds_file` under `set -u` — fixed with `${creds_file:-}`; (2) `scenario_run` pre-run SHA capture had no failure tolerance for cold-agent 30s timeout — fixed with `|| pre_run_sha=""`; (3) chapter-03 driver doesn't wait for claude to exit before typing into the GUI Terminal — not fixed, worked around manually.
  - What this suggests next: fix the chapter-03/chapter-04 cross-talk (add `/exit` wait after the polling-for-backlog check); decide which layer owns work-phase auto-exit (ravel-lite vs. capture script).
