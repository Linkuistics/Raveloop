  ### Session 18 (2026-04-22T12:58:46Z) — R7.2–R7.6: discover schema, cache, tree-SHA, Stage 1

  - **What was attempted:** Implement R7.2 through R7.6 of the related-projects discovery pipeline in a single session via parallel subagents. Covered: ProposalsFile/ProposalRecord schemas (R7.2), tree-SHA helper (R7.3), per-project surface cache (R7.4), rename cascade into cache dir (R7.5), and Stage 1 orchestration + prompt template (R7.6).
  - **What worked:** All five tasks shipped and are marked done. New files: `src/discover/cache.rs`, `src/discover/tree_sha.rs`, `src/discover/stage1.rs`, `defaults/discover-stage1.md`. Modified: `src/discover/mod.rs`, `src/discover/schema.rs`, `src/init.rs`, `src/main.rs`, `src/projects.rs`. Full lib suite passes (399 tests); clippy clean.
  - **What didn't:** No failures. One notable deviation in R7.3: macOS `TempDir` paths go through `/var → /private/var` symlink but `git rev-parse --show-toplevel` canonicalises through it, so `strip_prefix` required `std::fs::canonicalize` before the call. Correct production behaviour, not a test hack.
  - **What this suggests next:** R7.7 (Stage 2 orchestration + `defaults/discover-stage2.md`) is now fully unblocked — both its dependencies (R7.2, R7.6) are done. R7.9 (apply) is also unblocked (depends only on R7.2). R7.8 (top-level orchestrator) needs R7.7 first.
  - **Key learnings:** (1) Binary crate needs `mod discover;` once `projects.rs` imports `crate::discover::cache::rename` — gated with `#[allow(dead_code)]` until R7.10 wires CLI subcommands. (2) Stage 1 avoided the `chrono` dep by rolling a tested proleptic-Gregorian `format_unix_utc` — `analysed_at` is display-only so a heavyweight date crate is disproportionate. (3) The per-stage submodule shape (`run_<stage>`, `<Stage>Config`, `<Stage>Outcome`) is a reusable template for future multi-stage LLM pipelines.
