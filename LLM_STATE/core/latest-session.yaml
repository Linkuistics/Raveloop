  ### Session 80 (2026-04-28T10:17:07Z) — Fix chapter-03/chapter-04 cross-talk in capture script

  - **Attempted:** Fix the chapter-03 → chapter-04 cross-talk bug where `scenario_run` started typing `ravel-lite run ...` into the GUI Terminal while claude's TUI was still active after plan creation, causing input to be absorbed by claude rather than the shell.
  - **Worked:** Added a `/exit` + sentinel-echo handshake at the tail of `capture_chapter03_create_session` in `scripts/capture/ravel-lite-tutorial.sh`. The fix sends `/exit` + Return into the GUI Terminal, then types `echo CHAPTER_03_CLAUDE_EXITED` + Return, and uses `testanyware find-text … "CHAPTER_03_CLAUDE_EXITED" --timeout 30` to confirm the shell is back before the function returns. The fix is robust to claude having already exited — `/exit` becomes a harmless command-not-found and the sentinel still renders. Also updated a stale docstring comment in the same function.
  - **Didn't work / deferred:** Full end-to-end verification (a clean chapter-01-through-04 capture run) was not feasible inside this work phase — it requires a real TestAnyware VM. The sentinel handshake is the right failure mode: if it times out, the script errors loudly rather than silently misfiring.
  - **Blocked:** `auto-exit-work-phase-claude-after-plan-completion` was moved to `blocked`. User design decision (2026-04-28): work-phase claude must remain interactive after plan completion. The cross-talk fix therefore belongs in the capture script, not in ravel-lite core.
  - **Next:** Run the capture script end-to-end to empirically confirm chapter-03 → chapter-04 no longer cross-talks. Also stop the kept TestAnyware VM `ravel-lite-tutorial-20260428T045749Z` (separate backlog item).
