  ### Session 50 (2026-04-24T12:26:24Z) — Rewrite analyse-work commit-message guidance

  - Worked on rewriting `defaults/phases/analyse-work.md` to stop instructing the LLM to embed task ids in commit messages
  - Changed the "Backlog transitions" section preamble to describe the block as context for understanding what moved, not as a source for commit titles
  - Added explicit prohibition: "Do not author commit titles or bodies around these task ids"
  - Rewrote step 5 (repair-stale-statuses) to say "note the *kind* of repair" rather than "include the reported task ids"
  - Rewrote step 6 (source commit) to emphasise the message must make sense in `git log` a year from now without plan-execution context
  - Rewrote step 9 (plan-state commit) to replace "draw title from task ids" with "describe change by shape not by slot," including good/bad examples
  - The commit was made in the work phase itself (commit 1fdab9e); no source-file changes remain uncommitted
  - Also updated backlog: two completed tasks removed, one title/dependency updated, two task titles updated for clarity
