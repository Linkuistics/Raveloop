body: |
  ### Session 61 (2026-04-26T23:29:57Z) — Fix .md→.yaml filename drift and centralise filename constants

  - Completed three related tasks cleaning up the `.md` → `.yaml` storage-rename aftermath
  - Fixed the active correctness bug in `src/subagent.rs:35-36` where dispatched subagent prompts directed peer plans to read `backlog.md` and `memory.md` — files that no longer exist. Subagents are now directed at `backlog.yaml` / `memory.yaml`.
  - Fixed scattered doc-comment and test-fixture drift across `src/format.rs`, `src/ui.rs`, `src/phase_loop.rs`, `src/survey/schema.rs`, `src/survey/invoke.rs`, `src/survey.rs`, and `defaults/fixed-memory/memory-style.md`. Deliberately preserved legitimate `.md` references in `src/main.rs` (Migrate subcommand docs) and `src/state/migrate.rs` (legacy file conversion logic).
  - Extended `src/format.rs::format_tool_call` to detect `ravel-lite state <subcommand>` Bash invocations and map them to canonical filenames so `PHASE_HIGHLIGHTS` regexes fire correctly. Added four new unit tests covering the session-log, memory, and backlog state-CLI paths. Discovered and fixed a `skip_while`/`nth` iterator semantic trap in the first version of `ravel_state_target_file`.
  - Created `src/state/filenames.rs` with four `pub const` items (`BACKLOG_FILENAME`, `MEMORY_FILENAME`, `SESSION_LOG_FILENAME`, `LATEST_SESSION_FILENAME`) and replaced all literal string occurrences across `src/state/{backlog,memory,session_log}/yaml_io.rs`, `src/state/migrate.rs`, `src/format.rs`, `src/phase_summary.rs`, `src/create.rs`, `src/backlog_transitions.rs`, `src/survey/discover.rs`, and `src/git.rs`.
  - All tests pass: 590 lib tests (4 new), 0 failures. Clippy clean. Grep for literal filename strings in `src/` returns only the four constant definitions.
  - The `PHASE_HIGHLIGHTS` regexes now use `filename_suffix_regex(CONSTANT)` via a helper wrapping `regex::escape`, so a future constant rename cascades automatically into highlight detection.
  - Prompt files (`defaults/*.md`) were left with literal filenames by design — converting them would require token substitution or build-time replacement, adding complexity without proportional benefit.
