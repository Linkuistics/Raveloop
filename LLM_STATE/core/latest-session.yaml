body: |
  ### Session 27 (2026-04-23T07:28:36Z) — ontology v2 foundation + backlog set-description

  - **What was attempted:** Two tasks in one session: (1) `implement-ontology-v2-types-and-defaults-ontology-yaml-additive` — introduce the schema-v2 ontology types and `defaults/ontology.yaml` additively without touching v1 code; (2) `add-set-description-verb-to-backlog-cli` — add the missing `set-description` verb so task descriptions can be refreshed without hand-editing `backlog.yaml`.
  - **What worked:** Both tasks shipped completely. `src/ontology/` landed with four files (schema.rs, yaml_io.rs, defaults.rs, mod.rs) mirroring the `src/state/backlog/` layout. EdgeKind has 17 variants (not 16 as stated in the task brief — the spec's conforms-to family has three members, not two). `defaults/ontology.yaml` is embedded via EMBEDDED_FILES in `init.rs`. Five drift tests guard YAML ↔ Rust bijection for kinds, lifecycles, evidence grades, directed flags, and lifecycle reference validity. `run_set_description` in `verbs.rs` rejects empty/whitespace bodies, normalises trailing newlines, and preserves all sibling fields; 5 unit tests + 5 integration tests cover the full surface. 34 new unit tests from the ontology module; full workspace green (927 tests).
  - **What didn't work:** The task brief said "16 kebab-case EdgeKind variants" — the canonical spec lists 17. Implementation went with the spec. Any future task or description that cites a count should read from `EdgeKind::all()` or `defaults/ontology.yaml`, not from this session log.
  - **What this suggests trying next:** `migrate-callers-and-rename-to-related-components-no-migrator-delete-and-regenerate` is now unblocked. Its dependency `implement-ontology-v2-types-and-defaults-ontology-yaml-additive` is `done`. `parse_embedded_ontology_yaml()` is already exported from `ontology::` for task #3's `{{ONTOLOGY_KINDS}}` prompt renderer.
  - **Key learnings:** The dual-independent schema versioning (related-components.yaml at `SCHEMA_VERSION=2`, ontology file at `ONTOLOGY_FILE_SCHEMA_VERSION=1`) makes the two evolutions orthogonal. The "unsorted symmetric participants" test caught a real gap — `Edge::validate` must enforce sorting, not just distinctness, or canonical-key dedup silently fails for reversed participant order.
