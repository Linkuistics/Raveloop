entries:
- id: all-prompt-loading-routes-through-substitute-tokens
  title: All prompt loading routes through `substitute_tokens`
  body: |
    Ad-hoc `str::replace` bypasses the hard-error guard regex. Any prompt-loading path that does not delegate to `substitute_tokens` silently passes unresolved tokens through. Drift guards require one canonical substitution path.
- id: shipped-pi-prompts-have-no-dangling-tokens-test-guards-pi-prompts
  title: '`shipped_pi_prompts_have_no_dangling_tokens` test guards pi prompts'
  body: |
    The test iterates every on-disk pi prompt file and asserts no unresolved tokens remain. Enforcement mechanism for the canonical-substitution-path rule.
- id: config-overlays-use-deep-merge-via-load-with-optional-overlay-t
  title: Config overlays use deep-merge via `load_with_optional_overlay<T>()`
  body: |
    `src/config.rs` implements `*.local.yaml` overlays. Deep-merge: scalar collisions go to overlay, map collisions recurse. A `models.work: ""` overlay blanks only that key without losing sibling keys.
- id: pi-subagent-definitions-live-at-agents-pi-subagents
  title: Pi subagent definitions live at `agents/pi/subagents/`
  body: |
    `defaults/agents/pi/subagents/` holds pi subagent definitions (brainstorming, tdd, writing-plans); `init.rs` embed paths and `pi.rs` reads reference this location.
- id: init-rs-drift-detection-test-guards-coding-style-registration
  title: init.rs drift test guards all defaults/ file registration
  body: |
    `every_file_under_defaults_is_registered_in_embedded_files` recursively walks the entire `defaults/` tree and asserts every file has a matching `EmbeddedFile` entry in `src/init.rs`. Adding any file under `defaults/` without registering it fails the test.
- id: embedded-defaults-are-valid-asserts-non-empty-model-and-provider
  title: '`embedded_defaults_are_valid` asserts non-empty model and provider'
  body: |
    Every (agent, phase) pair in `defaults/agents/claude-code/config.yaml` must have a non-empty model string and non-empty provider. The test catches omissions that would silently delegate model/provider selection to the spawn context.
- id: work-phase-must-not-commit-source-files
  title: Work phase must not commit source files
  body: |
    The work phase leaves non-plan paths dirty; source-commit authority belongs to `analyse-work`.
- id: analyse-work-commits-all-non-plan-paths
  title: Analyse-work commits all non-plan paths
  body: |
    Analyse-work stages and commits every path outside the plan dir, or justifies each skipped path in the session log. Mechanism: `commits.yaml` spec authored in step 9; see `Analyse-work writes commits.yaml; git-commit-work applies it`.
- id: analyse-work-receives-dirty-tree-snapshot-as-work-tree-status
  title: Analyse-work receives dirty-tree snapshot as `{{WORK_TREE_STATUS}}`
  body: |
    `phase_loop.rs` calls `git::work_tree_snapshot(project_dir, baseline_sha)` when entering `LlmPhase::AnalyseWork` and inserts the result under `{{WORK_TREE_STATUS}}`. Captured at prompt-compose time so hand-edits made after work exits are included.
- id: streamlineoutcome-enum-distinguishes-ignored-vs-malformed-stream-lines
  title: '`StreamLineOutcome` enum distinguishes ignored vs malformed stream lines'
  body: |
    `StreamLineOutcome` distinguishes `valid-but-no-display` from parse failure; an `Option` return collapses both into `None`. Apply this enum pattern wherever an `Option` conflates two semantically distinct outcomes.
- id: survey-stdout-read-has-300s-timeout
  title: Survey stdout read has 300s timeout
  body: |
    `src/survey/invoke.rs` wraps the stdout read in `tokio::time::timeout` (`DEFAULT_SURVEY_TIMEOUT_SECS = 300`); on expiry the child is killed and the error includes elapsed time, captured bytes, partial stdout, and remediations. Override via `--timeout-secs`.
- id: phase-contract-test-validates-per-phase-file-writes
  title: Phase contract test validates per-phase file writes
  body: |
    `phase_contract_round_trip_writes_expected_files` runs `phase_loop` from `analyse-work` via `ContractMockAgent`; assertions cover latest-session.md, memory.md updated, backlog.md updated, phase.md ends at `work`, and git log subjects. `commit-message.md` is absent from the flow; analyse-work authors `commits.yaml` instead. See: `Analyse-work writes commits.yaml; git-commit-work applies it`.
- id: tool-read-token-scoped-to-work-md-only
  title: '`{{TOOL_READ}}` token scoped to `work.md` only'
  body: |
    Headless phases (analyse-work, reflect, dream) must not include `{{TOOL_READ}}`; an unresolved token in a headless phase fails integration tests. A universal "all tokens substitute cleanly" drift guard produces false negatives for the same reason: `{{TOOL_READ}}` is intentionally absent from headless-phase prompts.
- id: substitute-tokens-expands-content-macros-before-path-tokens
  title: '`substitute_tokens` expands content macros before path tokens'
  body: |
    RELATED_PLANS and custom tokens expand first; atomic path tokens ({{DEV_ROOT}} etc.) expand second. Reversing the order causes fatal errors when RELATED_PLANS content itself contains path tokens.
- id: pi-stderr-captured-in-4096-byte-rolling-buffer
  title: Pi stderr captured in 4096-byte rolling buffer
  body: |
    `PiAgent::invoke_headless` pipes stderr into a fixed-size rolling buffer (`STDERR_BUFFER_CAP = 4096`). Tail surfaces in error messages on failure; eliminates TUI bleed-through during headless invocation.
- id: pi-phase-cycle-test-guards-runtime-token-substitution
  title: '`pi_phase_cycle` test guards runtime token substitution'
  body: |
    `pi_phase_cycle_substitutes_tokens_and_streams_events` runs a full `phase_loop` cycle with a real `PiAgent` and a fake `pi` shell script; asserts zero unresolved `{{…}}` tokens in the captured prompt, correct `UIMessage` variant fan-out (`Progress`, `Persist`, `AgentDone`), and audit commit via `commits.yaml`.
- id: pi-invoke-headless-test-guards-stderr-tail-surfacing
  title: '`pi_invoke_headless` test guards stderr-tail surfacing'
  body: |
    `pi_invoke_headless_surfaces_stderr_tail_on_failure` asserts a non-zero `pi` exit (code 17) surfaces the stderr tail in the returned error. Guards the buffered-stderr fix. See: `Pi stderr captured in 4096-byte rolling buffer`.
- id: pi-dispatch-subagent-test-pins-dispatch-argv-contract
  title: '`pi_dispatch_subagent` test pins dispatch argv contract'
  body: |
    `pi_dispatch_subagent_invokes_pi_with_target_plan_args` pins the exact argv for `dispatch_subagent`: `--no-session`, `--append-system-prompt`, `--provider anthropic`, `--mode json`, `-p`, prompt.
- id: envoverride-serialises-env-mutation-in-integration-tests
  title: '`EnvOverride` serialises env mutation in integration tests'
  body: |
    `EnvOverride` holds a process-wide `OnceLock<Mutex<()>>`; struct-field drop order keeps the lock held until `PATH`/`HOME` restoration completes, preventing fake-pi `PATH` from leaking into concurrent test runners.
- id: gitcommitwork-appends-latest-session-yaml-to-session-log-yaml
  title: '`GitCommitWork` appends `latest-session.yaml` to `session-log.yaml`'
  body: |
    `append_session_log` in `phase_loop.rs` delegates to `session_log::append_latest_to_log`. Idempotent by session id; missing `latest-session.yaml` is a graceful no-op.
- id: write-phase-precedes-git-commit-plan-in-all-commit-handlers
  title: '`write_phase` precedes `git_commit_plan` in all commit handlers'
  body: |
    All four `ScriptPhase::GitCommit*` handlers in `phase_loop.rs` call `write_phase(next)` before `git_commit_plan`. Phase.md is captured in the same commit as other plan-state writes; the plan tree is clean at every user-prompt point.
- id: work-baseline-seeded-atomically-in-the-triage-commit
  title: Work-baseline seeded atomically in the triage commit
  body: |
    `GitCommitTriage` calls `git_commit_plan` first, then `git_save_baseline(plan_dir, "work-baseline")`, so `work-baseline` records the triage commit SHA (not the reflect commit). A follow-on save-baseline commit lands the file; plan tree is dirty-free at user prompt. `LlmPhase::Work` seeds work-baseline only when the file is absent (first-run fallback). `git_save_baseline(plan_dir, filename)` is the generalized helper used by all four `GitCommit*` handlers.
- id: llmphase-work-does-not-delete-latest-session-yaml
  title: '`LlmPhase::Work` does not delete `latest-session.yaml`'
  body: |
    Analyse-work overwrites `latest-session.yaml` unconditionally on entry; the Work handler does not delete it.
- id: plan-tree-cleanliness-asserted-via-git-status-porcelain
  title: Plan-tree cleanliness asserted via `git status --porcelain`
  body: |
    `git_commit_triage_leaves_plan_tree_clean_at_user_prompt` and `git_commit_work_leaves_plan_tree_clean_at_user_prompt` assert `git status --porcelain -- <plan_dir>` is empty after `phase_loop` returns from a user-declined exit.
- id: spawn-blocking-does-not-cancel-cleanly-in-tokio-select
  title: '`spawn_blocking` does not cancel cleanly in `tokio::select!`'
  body: |
    Use `tokio::time::sleep` for tty event polling. A `spawn_blocking` thread is not dropped when the select arm is cancelled; it races the spawned child for the tty. `tokio::time::sleep` is properly cancellable and eliminates the race.
- id: dream-word-count-sums-entry-titles-and-bodies
  title: Dream word-count sums entry titles and bodies
  body: |
    `dream.rs` computes word count by summing title and body text across all parsed `MemoryEntry` values; markdown punctuation is excluded. `update_baseline_counts_entry_titles_and_bodies` regression test pins this contract. `update_dream_baseline` self-corrects after the first successful dream if a prior raw-markdown baseline drifts.
- id: dream-baseline-seeded-from-three-call-sites
  title: dream-word-count seeded from three call sites
  body: |
    `seed_dream_word_count_if_missing` in `src/dream.rs` is called from `run_create` (post-session scaffolding), `run_set_phase` (every LLM phase transition including coordinators), and `GitCommitReflect`. Seeds `dream-word-count` to 0, not current word count; seeding to current count silently delays the first dream by `headroom` words on populated plans. Legacy migration: if `dream-word-count` is missing and `dream-baseline` parses as a usize, the value is copied and the legacy file is deleted. `dream-baseline` is a SHA file; `dream-word-count` is the word-count store.
- id: phase-prompts-use-ravel-lite-state-cli-verbs
  title: Phase prompts use `ravel-lite state` CLI verbs
  body: |
    All `defaults/phases/*.md` and `create-plan.md` use `ravel-lite state <verb>` for plan-state operations. Direct writes to plan-state files bypass `Phase::parse` validation; LLM phases must use the CLI. `run_set_phase` refuses to create a plan dir that does not already exist.
- id: cli-integration-tests-use-cargo-bin-exe-ravel-lite
  title: CLI integration tests use `CARGO_BIN_EXE_ravel-lite`
  body: |
    CLI integration tests shell out via `CARGO_BIN_EXE_ravel-lite` and assert on-disk effects; the Cargo-idiomatic pattern for end-to-end CLI testing.
- id: build-rs-emits-timestamp-git-describe-and-sha
  title: '`build.rs` emits timestamp, git-describe, and SHA'
  body: |
    `build.rs` emits `BUILD_TIMESTAMP`, `GIT_DESCRIBE`, and `GIT_SHA` as compile-time env vars; `main.rs` concatenates them into a `VERSION` constant used by both `--version` and the `version` subcommand.
- id: release-toml-disables-publish-and-push
  title: '`release.toml` disables publish and push'
  body: |
    `release.toml` sets `publish=false` and `push=false`; `cargo release patch --execute` bumps the version and tags locally without touching crates.io or the remote.
- id: term-title-rs-sets-phase-title-via-osc-escape
  title: '`term_title.rs` sets phase title via OSC escape'
  body: |
    `src/term_title.rs` exposes `set_title(project, plan, phase)` (side-effecting) and `format_title_escape` (testable helper). Writes to stdout; clean side-channel because Ratatui uses stderr backend. Includes tmux passthrough (doubled inner ESCs). Called at `LlmPhase` entry in `phase_loop` and `run_single_plan`. Phase labels uppercased to match the phase-header banner convention.
- id: reflect-phase-runs-automatically-after-git-commit-work
  title: Reflect phase runs automatically after git-commit-work
  body: |
    The runner proceeds from `GitCommitWork` to reflect without user confirmation; no pre-reflect gate exists.
- id: fake-pi-script-must-be-phase-aware
  title: Fake-pi script must be phase-aware
  body: |
    The fake-pi script in `pi_phase_cycle` uses a case statement on the current phase to emit distinct next-phase values. Writing `git-commit-work` unconditionally causes an infinite loop; each phase must map to a different output.
- id: contractmockagent-for-triage-appends-not-overwrites
  title: '`ContractMockAgent` for Triage appends, not overwrites'
  body: |
    `ContractMockAgent::invoke_headless` uses append mode for `Triage` so the safety-net test can observe analyse-work's status flips written earlier in the same cycle.
- id: hand-off-fields-are-live-in-analyse-work-and-triage-prompts
  title: Hand-off fields are live in analyse-work and triage prompts
  body: |
    `defaults/phases/analyse-work.md` and `defaults/phases/triage.md` include the hand-off convention. Analyse-work writes a hand-off block; triage reads it on entry. See: `[HANDOFF] integration tests guard promote-vs-archive cycle`.
- id: handoff-integration-tests-guard-promote-vs-archive-cycle
  title: '`[HANDOFF]` integration tests guard promote-vs-archive cycle'
  body: |
    `handoff_marker_in_analyse_work_is_promoted_by_triage` and `handoff_marker_in_analyse_work_is_archived_by_triage` in `tests/phase_loop.rs` run the full analyse-work → git-commit-work → reflect → git-commit-reflect → triage → git-commit-triage cycle. CI-protects the hand-off convention. See: `ContractMockAgent has opt-in handoff injection`.
- id: contractmockagent-has-opt-in-handoff-injection
  title: '`ContractMockAgent` has opt-in handoff injection'
  body: |
    `handoff_injection: Option<HandoffInjection>` field with `with_handoff_injection()` builder. `HandoffDisposition` inside `HandoffInjection` pins promote-vs-archive without hardcoding LLM reasoning, keeping hand-off tests deterministic.
- id: task-blocks-delimited-by-n-separator
  title: Task blocks delimited by `\n---` separator
  body: |
    `inject_handoff_into_task_block` and `extract_handoff_from_block` both split on `\n---`. Protocol for separating the main task block from an appended hand-off block.
- id: warn-if-project-tree-dirty-is-advisory-only
  title: '`warn_if_project_tree_dirty` is advisory-only'
  body: |
    `warn_if_project_tree_dirty` at `GitCommitWork` entry has no user-facing gate; the warning fires but the phase proceeds unconditionally. If this becomes unacceptable, promote to a hard error rather than re-adding a gate.
- id: phase-loop-is-single-cycle-run-single-plan-holds-the-inter-cycle-prompt
  title: '`phase_loop` is single-cycle; `run_single_plan` holds the inter-cycle prompt'
  body: |
    `phase_loop` is a single-cycle function. The inter-cycle user prompt ("continue / switch plan / exit") lives in `run_single_plan`, which wraps `phase_loop` in a loop. Multi-plan dispatch calls `phase_loop` directly via `dispatch_one_cycle` in `src/multi_plan.rs`.
- id: src-multi-plan-rs-owns-survey-driven-multi-plan-routing
  title: '`src/multi_plan.rs` owns survey-driven multi-plan routing'
  body: |
    `src/multi_plan.rs` implements `build_plan_dir_map`, `options_from_response`, `select_plan_interactive`, and `run_multi_plan`. `ravel-lite run` accepts 1..N plan dirs; `--survey-state` is required when N > 1. Routes to the next plan via `dispatch_one_cycle`.
- id: ravel-lite-survey-emits-structured-yaml
  title: '`ravel-lite survey` emits structured YAML'
  body: |
    `src/survey/schema.rs` defines the output schema with `Serialize` derives and a `schema_version` marker. `input_hash` is seeded in Rust post-parse. `task_counts` is injected by Rust via `inject_task_counts` / `collect_task_counts`; `unblocked`, `blocked`, and `received` are injected via `inject_plan_row_counts` / `plan_row_counts`. Survey prompts forbid the LLM from emitting any of these injected fields. `survey-format` subcommand renders YAML output to human-readable form. See: `PlanRowCounts injects unblocked/blocked/received into survey`.
- id: survey-compose-wraps-content-in-yaml-fences
  title: Survey compose wraps content in YAML fences
  body: |
    `src/survey/compose.rs` wraps backlog and memory content in ` ```yaml ` fences, labeling sections `backlog.yaml` and `memory.yaml`. `survey.md` and `survey-incremental.md` reference these labels. `PlanSnapshot::backlog` and `.memory` carry re-serialised YAML strings.
- id: incremental-survey-splits-invoke-rs-into-two-functions
  title: Incremental survey splits `invoke.rs` into two functions
  body: |
    `compute_survey_response` is the in-memory core; `run_survey` is the CLI wrapper. `src/survey/delta.rs` owns hash-comparison and delta-merge. `--prior` names the baseline state; `--force` skips the hash guard. `defaults/survey-incremental.md` is the prompt template for the delta path.
- id: push-plan-stack-yaml-and-src-pivot-rs-removed
  title: '`push-plan`, `stack.yaml`, and `src/pivot.rs` removed'
  body: |
    `push-plan` CLI verb, `run_stack`, `stack.yaml`, and `src/pivot.rs` are deleted. `src/state.rs` reduced from ~230 to ~80 lines; `src/phase_loop.rs` de-pivoted. Multi-plan routing is exclusively in `src/multi_plan.rs`.
- id: project-root-for-plan-derives-project-root-as-plan
  title: '`project_root_for_plan` derives project root as `<plan>/../..`'
  body: |
    Pure path math; no disk walk, no `.git` requirement. Contract: `<plan>` must be at least three path components deep.
- id: git-query-functions-scope-to-project-dir-via-pathspec
  title: Git query functions scope to project dir via pathspec
  body: |
    `working_tree_status`, `paths_changed_since_baseline`, and `work_tree_snapshot` append `-- <project_dir>` pathspec. `git_commit_plan` is intentionally unscoped; it runs from `plan_dir` CWD, already limiting `git add .` to plan-state files.
- id: integration-tests-use-three-level-project-llm-state-plan-layout
  title: Integration tests use three-level `<project>/LLM_STATE/<plan>` layout
  body: |
    Integration tests and `src/multi_plan.rs` tests construct `<project>/LLM_STATE/<plan>` directory trees matching ravel-lite convention. New integration tests must follow this layout.
- id: format-result-text-renders-as-continuation-lines
  title: '`format_result_text` renders `→` as continuation lines'
  body: |
    Lines matching `^\s*→\s*(.*)` immediately after an action marker are re-indented to the detail column and styled with the preceding action's intent. Blank lines, insight blocks, and non-continuation lines break the chain. `last_action_intent: Option<Option<Intent>>` encodes "no prior action" (outer None) vs "prior action with no intent" (Some(None)).
- id: promoted-and-archived-are-valid-action-tags
  title: '`PROMOTED` and `ARCHIVED` are valid action tags'
  body: |
    `ACTION_INTENTS` in `src/format.rs` includes `PROMOTED` and `ARCHIVED` as triage hand-off markers; they emit new backlog tasks or memory entries.
- id: work-phase-allows-multiple-tasks-when-requested
  title: Work phase allows multiple tasks when requested
  body: |
    `work.md` step 10 allows multiple tasks per session when the user explicitly requests them; the default remains single-task-per-phase.
- id: dream-output-uses-label-continuation-format
  title: Dream output uses label + `→` continuation format
  body: |
    `defaults/phases/dream.md` specifies a two-line entry layout (label line + `→ detail` continuation) matching the continuation-line renderer in `format_result_text`.
- id: read-related-plans-markdown-centralises-related-plans-md-access
  title: '`read_related_plans_markdown` centralises `related-plans.md` access'
  body: |
    `read_related_plans_markdown(plan_dir)` is the single access point for plan-local `related-plans.md` prose. Returns `""` gracefully on absent file; `{{RELATED_PLANS}}` token substitutes to an empty block. Both `src/main.rs` and `src/multi_plan.rs` route through it.
- id: related-plans-stored-as-global-name-indexed-edge-list
  title: '`related-components.yaml` stores global name-indexed edge list'
  body: |
    `related-components.yaml` stores project-level (not plan-level) edges keyed by component name, shareable across all plans in a project. Schema version 2; uses v2 `EdgeKind` vocabulary. Full CRUD with `Edge::validate` (rejects self-loops, unsorted symmetric participants). See: `run_rename needs a Trait registry before fourth cascade`.
- id: sibling-edges-dedup-by-sorted-participants-parent-of-by-order
  title: Sibling edges dedup by sorted participants; parent-of by order
  body: |
    In `src/related_components.rs` and `src/discover/apply.rs`, symmetric edge kinds use sorted participants for identity (order-insensitive dedup); directed edge kinds preserve participant order. Reversing this rule silently creates duplicate or missing edges. See: `Edge::validate must enforce participant sort order`.
- id: plan-state-md-readers-fully-migrated
  title: LLM_STATE/core plan-state migrated to typed YAML
  body: |
    `src/dream.rs` and `src/survey/discover.rs` use the typed YAML API; `.md` originals deleted from `LLM_STATE/core`. `src/multi_plan.rs` and `src/main.rs` tolerate absent `.md` files.
- id: state-migrate-takes-plan-dir-as-positional-argument
  title: '`state migrate` takes `PLAN_DIR` as positional argument'
  body: |
    `--plan-dir` is not a valid flag; the CLI expects `PLAN_DIR` positionally. Correct usage: `ravel-lite state migrate <PLAN_DIR>`.
- id: plan-state-migration-requires-atomicity-idempotency-dry-run-validation
  title: Plan-state migration requires atomicity, idempotency, dry-run, validation
  body: |
    Any plan-state migration tool must apply changes atomically, be safe to re-run (idempotent), support `--dry-run` preview, and validate round-trip fidelity.
- id: migrate-rs-uses-parse-all-then-write-all-planner
  title: '`migrate.rs` uses parse-all-then-write-all planner'
  body: |
    `plan_backlog_migration`, `plan_memory_migration`, `plan_session_log_migration`, and `plan_latest_session_migration` each return `Option<PendingMigration>`; `run_migrate` errors if set is empty, then writes all only after all parses succeed.
- id: state-memory-parses-headings-empty-body-is-an-error
  title: '`state::memory` parses `^## ` headings; empty body is an error'
  body: |
    `parse_md.rs` in `state::memory` splits on `^## ` (not `### ` as backlog uses). An entry with an empty body after the heading is a parse error, not silently skipped. See: `split_into_task_blocks splits on ### headings`.
- id: src-projects-rs-holds-projectscatalog
  title: '`src/projects.rs` holds `ProjectsCatalog`'
  body: |
    `ProjectsCatalog` (schema_version 1) maps project names to absolute in-memory paths; on disk, paths are relative via `RawProjectsCatalog`/`RawProjectEntry` (resolved on load, relativised on save). `auto_add` is pure and returns `AlreadyCatalogued`/`Added`/`NameCollision`. `ensure_in_catalog_interactive` is generic over `Read + Write`. Saves are atomic. See: `projects.yaml DTO layer separates serde from in-memory shape`.
- id: state-projects-add-rejects-relative-paths
  title: '`state projects add` resolves relative paths against CWD'
  body: |
    `state projects add` resolves relative paths against the caller's CWD via `std::path::absolute`; stores the absolute form. No filesystem access required.
- id: state-projects-rename-cascades-into-related-projects-yaml
  title: '`state projects rename` cascades into `related-components.yaml`'
  body: |
    `rename` updates the catalog name and cascades via `rename_component_in_edges` in `src/related_components.rs`.
- id: register-projects-from-plan-dirs-runs-before-tui-startup
  title: '`register_projects_from_plan_dirs` runs before TUI startup'
  body: |
    Called in `Commands::Run` before Ratatui alternate-screen takeover so any `NameCollision` prompt reaches a real tty.
- id: src-state-module-structure
  title: '`src/state/` uses module-per-area layout'
  body: |
    `src/state.rs` restructured into `src/state/` with `phase.rs`, `backlog/` (schema, yaml_io, parse_md, verbs, mod), `memory/` (schema, yaml_io, parse_md, verbs, mod), `session_log/` (schema, yaml_io, parse_md, verbs, mod), and `migrate.rs`. New state areas follow this layout.
- id: find-task-centralises-backlog-id-lookup
  title: '`find_task` centralises backlog id-lookup'
  body: |
    `find_task` in `src/state/backlog/verbs.rs` is the single resolution point for task-id lookup; all mutation verbs call it. Do not duplicate id-lookup logic.
- id: backlogfile-task-counts-injects-counts-into-survey
  title: '`BacklogFile::task_counts` injects counts into survey'
  body: |
    `TaskCounts { total, not_started, in_progress, done, blocked }` lives in `state::backlog::schema`. `collect_task_counts` gathers per-plan counts; `inject_task_counts` in `survey/schema.rs` writes them onto `PlanRow`. Survey prompts (`survey.md`, `survey-incremental.md`) explicitly forbid the LLM from emitting `task_counts`. See: `PlanRowCounts injects unblocked/blocked/received into survey` for the analogous dep-traversal-based injection.
- id: state-session-log-provides-full-verb-surface
  title: '`state session-log` provides full verb surface'
  body: |
    `src/state/session_log/` holds `SessionRecord` / `SessionLogFile` types. CLI verbs: `list`, `show`, `append`, `set-latest`, `show-latest`. `append_record` is idempotent by session id; duplicate appends are silently skipped.
- id: split-into-task-blocks-splits-on-headings
  title: '`split_into_task_blocks` splits on `### ` headings'
  body: |
    `split_into_task_blocks` uses `### ` heading boundaries, not `\n---`; `\n---` incorrectly fragments `[HANDOFF]` blocks appended to task bodies. See: `Task blocks delimited by \n--- separator`.
- id: dispatch-state-routes-state-subcommands
  title: '`dispatch_state` routes state subcommands'
  body: |
    `main.rs` routes `ravel-lite state` via `dispatch_state`, which delegates to `dispatch_backlog`, `dispatch_memory`, `dispatch_session_log`, or `dispatch_related_components`. New state areas extend `dispatch_state`; new area verbs extend their own dispatcher.
- id: r7-design-llm-driven-related-projects-discovery
  title: '`discover` runs two-stage fan-out pipeline to `discover-proposals.yaml`'
  body: |
    `state related-components discover` fans out one subagent per project (two-stage pipeline: per-project interaction-surface extraction then global edge proposal) and writes `discover-proposals.yaml`; `discover-apply` merges after human review. Cache key is `(tree_sha, dirty_hash)` pair; see `Discover cache key is tree_sha + dirty_hash pair`.
- id: state-migrate-force-required-when-yaml-predates-md
  title: state migrate --force required when .yaml predates .md
  body: |
    When pre-existing `.yaml` files are stale relative to the authoritative `.md` originals, `state migrate` aborts without `--force`. `--force` re-derives from `.md` and overwrites `.yaml`. `.md` is the authoritative source; `.yaml` is a derived cache.
- id: std-path-absolute-does-pure-path-math-anchored-to-cwd
  title: std::path::absolute does pure path math anchored to CWD
  body: |
    `std::path::absolute` performs pure path math anchored to the process CWD without touching the filesystem or resolving symlinks; use when recording a user-stated path without requiring the directory to exist.
- id: projects-add-name-optional-defaults-to-basename
  title: projects add --name optional; defaults to basename
  body: |
    `projects add --name` is optional; omitting it defaults the catalog name to the directory basename via `basename_as_name`. `basename_as_name` is a shared helper called by both `auto_add` and `run_add`.
- id: src-discover-schema-surfacefile-and-surfacerecord-r7-1
  title: '`SurfaceFile` and `SurfaceRecord` schema in `src/discover/`'
  body: |
    `src/discover/schema.rs` defines `SurfaceFile` (identity fields: `plan_name`, `tree_sha`) and `SurfaceRecord` (data fields). Two round-trip YAML tests guard the schema. Module wired at `src/lib.rs` as `pub mod discover`.
- id: discover-schema-serde-default-on-data-fields-only
  title: 'Discover schema: serde(default) on data fields only'
  body: |
    In `SurfaceRecord`, data fields carry `#[serde(default)]` to tolerate partial LLM emission; identity fields on `SurfaceFile` deliberately omit `default` so a missing identity field hard-fails on deserialise.
- id: macos-tempdir-path-needs-canonicalize-before-strip-prefix
  title: macOS TempDir path needs canonicalize before strip_prefix
  body: |
    `git rev-parse --show-toplevel` resolves through macOS's `/var → /private/var` symlink; `TempDir` paths do not. Call `std::fs::canonicalize` on both sides before `strip_prefix` or the prefix check silently fails.
- id: display-only-timestamps-avoid-chrono-dep
  title: Display-only timestamps avoid chrono dep
  body: |
    `format_unix_utc` in `src/discover/stage1.rs` hand-rolls proleptic-Gregorian formatting for the `analysed_at` field. When a timestamp is display-only (never parsed back), a small tested helper avoids the `chrono` dependency entirely.
- id: multi-stage-llm-pipeline-uses-run-config-outcome-submodule-shape
  title: Multi-stage LLM pipeline uses run/Config/Outcome submodule shape
  body: |
    Each stage in `src/discover/` exposes `run_<stage>`, `<Stage>Config`, and `<Stage>Outcome`. Internal shape: `Config` → `pub async run` fn → helper `spawn` fn → unit tests. Stages mirror each other; reuse this template for new stages.
- id: rename-cascade-registry-design-consideration
  title: '`run_rename` needs a Trait registry before fourth cascade'
  body: |
    `run_rename` in `src/projects.rs` cascades into three places: catalog, `related-components.yaml`, and `<config-dir>/discover-cache/<name>.yaml`. Before adding a fourth cascade point, extract into a `RenameHook` Trait registry rather than threading in ad-hoc.
- id: find-conflicting-kind-misses-parent-of-direction-reversals
  title: '`find_directional_conflict` requires same-lifecycle for reversed-pair conflicts'
  body: |
    `src/discover/apply.rs::find_directional_conflict` flags a conflict when a directed-kind edge with the same lifecycle and reversed participants already exists. Cross-lifecycle reversals are not flagged; whether they should be is an open design question. See: `Sibling edges dedup by sorted participants; parent-of by order`.
- id: discover-e2e-uses-a-fake-claude-bash-shim-per-stage
  title: Discover e2e uses a fake-claude bash shim per stage
  body: |
    Discover e2e tests use a fake-claude bash shim that distinguishes Stage 1 vs Stage 2 by grepping the prompt header. Stage 1: extracts the YAML surface-file path from the prompt body and writes a canned YAML surface response. Stage 2: issues `ravel-lite state discover-proposals add-proposal` CLI calls for each canned proposal edge; no YAML path extraction.
- id: sharedconfig-headroom-has-no-serde-default-tests-must-supply-it
  title: SharedConfig.headroom has no serde default; tests must supply it
  body: |
    `SharedConfig` has no `#[serde(default)]` on the `headroom: usize` field. Minimal config YAML snippets in e2e tests must include `headroom: <usize>` or deserialization fails.
- id: discover-cache-key-is-tree-sha-dirty-hash-pair
  title: Discover cache key is tree_sha + dirty_hash pair
  body: |
    `compute_project_state` returns `{ tree_sha, dirty_hash }`. `dirty_hash` is SHA-1 (via `git hash-object --stdin`) over `git diff HEAD -- <rel>` plus untracked file paths and contents (subtree-scoped via `git ls-files --others -- <rel>`). Clean working trees use `dirty_hash = ""`. Cache hit requires both fields to match.
- id: stage-1-injects-catalog-projects-to-scope-edge-evidence
  title: Stage 1 injects CATALOG_PROJECTS to scope edge evidence
  body: |
    `{{CATALOG_PROJECTS}}` (catalog minus the current project) is injected into the Stage 1 prompt. Rules forbid non-catalog entries in `explicit_cross_project_mentions`. Without scoping, third-party projects appear as sibling evidence (e.g. Raycast, swift-lispkit).
- id: stage-2-must-not-propose-edges-from-weak-signals-alone
  title: Stage 2 must not propose edges from weak signals alone
  body: |
    `defaults/discover-stage2.md` forbids proposals based solely on: shared upstream dependencies, same ecosystem, trivial glob overlap, or shared generic tools. These signals in combination can still contribute; any one alone is insufficient.
- id: stage-1-yaml-list-items-forbid-parenthetical-colon-annotations
  title: Stage 1 YAML list items forbid parenthetical colon annotations
  body: |
    Parenthetical annotations with colons inside YAML list items (e.g., `- foo (format: bar)`) cause `data_formats[n]: invalid type: map` deserialization failures. Disambiguation belongs in the `notes` field, not inline in the list item.
- id: stage-2-skips-when-all-stage-1-outcomes-are-cached
  title: Stage 2 skips when all Stage 1 outcomes are Cached
  body: |
    When every Stage 1 outcome is `Cached` and no failures occurred, `discover` skips Stage 2 and preserves the existing `discover-proposals.yaml`. Prevents non-deterministic LLM output from overwriting user-curated proposals on incremental re-runs.
- id: stage-2-skips-when-all-stage-1-attempts-failed
  title: Stage 2 skips when all Stage 1 attempts failed
  body: |
    When every Stage 1 attempt produces `Stage1Outcome::Failed`, Stage 2 is skipped and a failure-only proposals file is written. Each failure surfaces via `eprintln!`. Inferring edges from zero surfaces is meaningless.
- id: discover-stage-spawns-need-allowed-tools-and-add-dir
  title: Discover stage spawns need --allowed-tools and --add-dir
  body: |
    `--setting-sources project,local` excludes the user's allowlist; writes to dirs outside cwd are silently blocked. Stage 1 spawns require `--allowed-tools "Read,Grep,Glob,Bash,Write,Task"` and `--add-dir <cache-dir>`. Stage 2 spawns require only `--allowed-tools Bash` and `--add-dir <config_root>`; Stage 2 issues CLI calls rather than writing files directly.
- id: opportunistic-discover-on-catalog-changes-deferred-idea
  title: Opportunistic discover on catalog changes is a deferred idea
  body: |
    Analyse-work or triage could run `discover` opportunistically when project composition changes (new projects added, catalog membership shifts), keeping `related-projects.yaml` fresher without manual invocation. Ontology v2 design is complete; trigger conditions are not yet defined.
- id: proposalsfile-source-project-states-stores-full-projectstate
  title: ProposalsFile.source_project_states stores full ProjectState
  body: |
    `ProposalsFile.source_project_states` is `BTreeMap<String, ProjectState>` (tree_sha + dirty_hash per surface), not `BTreeMap<String, String>`. The proposals file cache-state is now identical to the in-memory cache key. Legacy `source_tree_shas` key is silently dropped on read; `proposals_file_reads_legacy_source_tree_shas_as_empty_states` pins this behaviour. See: `Discover cache key is tree_sha + dirty_hash pair`.
- id: serde-default-on-added-fields-avoids-schema-version-bump
  title: serde(default) on added fields avoids schema version bump
  body: |
    Adding `#[serde(default)]` to a newly introduced field on an existing serialised struct maintains read-compat with pre-existing files. No schema_version bump needed when the field is informational (not identity-determining). `ProjectState.dirty_hash` demonstrates this pattern.
- id: component-ontology-v2-spec-at-docs-component-ontology-md
  title: Component ontology v2 spec at docs/component-ontology.md
  body: |
    `docs/component-ontology.md` is the canonical v2 ontology spec (reference section only); migration guidance is in a separate companion doc. Implementation pending. See: `Component ontology v2 uses kind × lifecycle × direction axes`.
- id: component-ontology-v2-uses-kind-lifecycle-direction-axes
  title: Component ontology v2 uses kind × lifecycle × direction axes
  body: |
    Three orthogonal axes (kind, lifecycle, direction) give sufficient expressiveness without hyperedges or numeric confidence. Vocabulary anchored in SPDX 3.0.1's `RelationshipType × LifecycleScopeType` factoring. See: `Component ontology v2 spec at docs/component-ontology.md`.
- id: generated-derived-artifacts-need-no-migrators-delete-and-regenerate
  title: Generated derived artifacts need no migrators; delete-and-regenerate
  body: |
    `related-projects.yaml` is a generated artifact; delete-and-regenerate is the upgrade path when the schema changes. No v1→v2 migrator is needed. Generalises: generated derived files never need forward-migration tools.
- id: unquoted-paths-in-error-messages-hide-empty-path-bugs
  title: Unquoted paths in error messages hide empty-path bugs
  body: |
    Quote all path values in user-facing error messages so an empty path appears as `""` rather than a silent double-space gap. Applies anywhere a path is interpolated into a string literal. An unquoted empty path is indistinguishable from surrounding whitespace, delaying diagnosis.
- id: project-root-for-plan-uses-canonicalize-latent-catalog-path-mismatch-risk
  title: project_root_for_plan uses canonicalize; latent catalog-path mismatch risk
  body: |
    `project_root_for_plan` in `src/git.rs:153` uses `canonicalize` with a raw-path fallback; `plan_project_path` and `projects::run_add` both use `std::path::absolute`. On macOS with symlinks in `/Users` or `/Development`, `canonicalize` introduces `/private/...` prefixes that desynchronise lookup from catalog-stored paths. No current consumer cross-compares the two outputs. Fix `project_root_for_plan` to use `std::path::absolute` only if a comparison against a catalog-stored path is introduced.
- id: edgekind-has-17-variants-task-briefs-may-cite-16
  title: EdgeKind has 17 variants; task briefs may cite 16
  body: |
    `EdgeKind::all()` in `src/ontology/schema.rs` defines 17 kebab-case variants. The `conforms-to` family has three members, not two. Prose references (including task briefs) that cite 16 are wrong. Authoritative count: `EdgeKind::all()` or `defaults/ontology.yaml`.
- id: edge-validate-must-enforce-participant-sort-order
  title: Edge::validate must enforce participant sort order
  body: |
    Distinctness checks alone do not catch reversed symmetric-participant pairs; canonical-key dedup silently fails for `[A, B]` vs `[B, A]`. `Edge::validate` must sort participants and reject unsorted input, not merely check uniqueness. See: `Sibling edges dedup by sorted participants; parent-of by order`.
- id: ontology-and-related-components-schema-versions-are-orthogonal
  title: Ontology and related-components schema versions are orthogonal
  body: |
    `related-components.yaml` uses `SCHEMA_VERSION=2`; `defaults/ontology.yaml` uses `ONTOLOGY_FILE_SCHEMA_VERSION=1`. Separate version fields keep the two evolutions independent; a bump in one does not imply a bump in the other.
- id: action-lines-split-title-reason-into-two-row-layout
  title: Action lines split title/reason into two-row layout
  body: |
    \`format_result_text\` in \`src/format.rs\` splits action-line detail text on \`" — "\` (em-dash with spaces) via \`str::split_once\`; the title row keeps the intent colour, the reason row is indented to the detail column and rendered dim. A \`trim().is_empty()\` guard suppresses the second row when the separator is trailing. The \` — \` separator is now load-bearing protocol in phase prompts: using \`-\` or \`–\` instead silently collapses back to single-row output.
- id: render-embedded-kinds-for-prompt-injects-edgekind-vocabulary-into-stage-2
  title: render_embedded_kinds_for_prompt injects EdgeKind vocabulary into Stage 2
  body: |
    `src/ontology/defaults.rs` exposes `render_kinds_for_prompt(&OntologyYaml) -> String` and `render_embedded_kinds_for_prompt() -> Result<String>`. Both are re-exported from `src/ontology/mod.rs`. `src/discover/stage2.rs` calls `render_embedded_kinds_for_prompt()` to substitute `{{ONTOLOGY_KINDS}}` in the Stage 2 prompt. This is the sole injection point for the EdgeKind vocabulary into LLM prompts.
- id: interaction-role-hints-spec-is-in-migration-doc-5-2-not-ontology-doc
  title: interaction_role_hints spec is in migration doc §5.2, not ontology doc
  body: |
    `docs/component-ontology.md` has no §13.2 or §14.1. The `interaction_role_hints` design lives in `docs/component-ontology-migration.md §5.2`. Task briefs that cite the former section numbers are wrong; use the migration companion doc.
- id: prompt-vocab-enum-variant-bijection-tests-guard-llm-code-alignment
  title: Prompt vocab ↔ enum variant bijection tests guard LLM/code alignment
  body: |
    A test asserting bijection between an enum's variants and a prompt's listed vocabulary (e.g. `InteractionRoleHint` vs `defaults/discover-stage1.md`) catches prompt-vocabulary drift before any production run. Adding a new enum variant without updating the prompt fails the test; adding a new prompt term without a matching variant also fails. Apply for any closed-vocabulary enum whose terms appear in an LLM prompt.
- id: format-result-text-inserts-blank-line-between-consecutive-action-blocks
  title: '`format_result_text` inserts blank line between consecutive ACTION blocks'
  body: |
    `src/format.rs::format_result_text` inserts a blank line when an `[ACTION]` marker immediately follows a previous `[ACTION]` block (including its continuation lines). Keeps multi-action output visually scannable; phase prompts do not need manual blank lines between action outputs.
- id: remove-edge-requires-lifecycle-v1-style-calls-fail-at-clap
  title: '`remove-edge` requires --lifecycle; v1-style calls fail at clap'
  body: |
    `ravel-lite state related-components remove-edge` requires `--lifecycle`; omitting it is a clap parse error. v1-style two-argument invocations (without lifecycle) are not accepted. See: `related-components.yaml stores global name-indexed edge list`.
- id: stage-2-hints-as-priors-enforcement-is-prose-only-hard-assertion-deferred
  title: Stage 2 hints-as-priors enforcement is prose-only; hard assertion deferred
  body: |
    Stage 2 `priors-not-verdicts` section is prose only. If real discover runs show Stage 2 over-weighting `interaction_role_hints` (e.g., proposing `strong` edges where the only evidence is a hint), consider adding a per-edge hard assertion: `evidence_fields must include at least one non-hint field for strong-grade proposals`. The prompt change alone may be sufficient.
- id: docs-architecture-md-not-audited-for-v1-vocabulary
  title: docs/architecture.md has no v1 edge-kind vocabulary
  body: |
    `docs/architecture.md` carries no v1 edge-kind vocabulary or `related-projects` references. Matches for `sibling`/`parent`/`child` are filesystem or process-context English, not ontology edge kinds.
- id: stage-2-writes-proposals-via-per-edge-add-proposal-cli
  title: Stage 2 writes proposals via per-edge add-proposal CLI
  body: |
    `run_stage2` spawns claude with `--allowed-tools Bash`; the LLM issues `ravel-lite state discover-proposals add-proposal` for each edge. Validation in `src/state/discover_proposals/` enforces: clap enum parsing, participant count, catalog-membership, `Edge::validate()`, and exact-duplicate rejection. Post-spawn, `run_stage2` loads the accumulated `discover-proposals.yaml`. The prior `RawStage2Output` YAML-parse approach is removed. Mirrors the main phase-loop CLI pattern.
- id: pre-initialise-output-file-before-cli-driven-spawn
  title: Pre-initialise output file before CLI-driven spawn
  body: |
    Pre-initialise the output file before spawning an LLM with CLI write tools: the zero-calls case produces a valid empty file (load succeeds) rather than a missing-file error. Seed prior-phase failures into the initial file so they survive the round-trip regardless of LLM output. `run_stage2` demonstrates this: creates `discover-proposals.yaml` with Stage 1 failures before spawning Stage 2.
- id: ontology-cli-rs-imports-from-super-not-related-components
  title: ontology/cli.rs imports from super, not related_components
  body: |
    `src/ontology/cli.rs` imports `{EdgeKind, LifecycleScope, EvidenceGrade}` via `super::`, not via `related_components` re-exports. Avoids a dependency inversion that would block Atlas's standalone ontology crate extraction.
- id: create-spawn-binds-purpose-via-invariant-in-prompt-and-template
  title: '`create` spawn binds purpose via INVARIANT in prompt and template'
  body: |
    `compose_create_prompt` in `src/create.rs` appends an INVARIANT paragraph after the path instruction. `defaults/create-plan.md` §0 leads with the invariant heading before the §1 clarification dialogue. Without both, the agent interprets a concrete problem description (bug report, feature request) as a pivot signal and skips plan creation. Single-task plans are explicitly named as valid to prevent "only one thing to do" being treated as a non-plan.
- id: compose-prompt-asserts-plan-only-output-invariant-guards-the-create-invariant
  title: '`compose_prompt_asserts_plan_only_output_invariant` guards the create INVARIANT'
  body: |
    `compose_prompt_asserts_plan_only_output_invariant` in `src/create.rs` tests asserts both key phrases are present in the composed prompt. Guards the INVARIANT binding against drift. See: `create` spawn binds purpose via INVARIANT in prompt and template.
- id: projects-yaml-dto-layer-separates-serde-from-in-memory-shape
  title: projects.yaml DTO layer separates serde from in-memory shape
  body: |
    `RawProjectsCatalog`/`RawProjectEntry` handle serde; rich in-memory `ProjectsCatalog`/`ProjectEntry` own logic without derive macros. Load-time resolves relative disk paths to absolute; save-time relativises back via `pathdiff::diff_paths` + `PathClean`. Reuse this pattern for any catalog struct needing on-disk/in-memory shape divergence.
- id: projects-yaml-migrates-silently-to-relative-paths-on-first-save
  title: projects.yaml migrates silently to relative paths on first save
  body: |
    Pre-existing all-absolute `projects.yaml` files load without error and are rewritten to relative form on the next mutating command. No explicit migration step needed; users with git-shared catalogs benefit automatically.
- id: bash-var-pat-repl-treats-in-replacement-as-matched-text
  title: Bash ${var//pat/repl} treats & in replacement as matched text
  body: |
    In bash 5.2+, `&` in the replacement side of `${var//pat/repl}` expands to the matched pattern, not a literal ampersand. HTML entities like `&lt;` in replacement content become the matched text, silently corrupting output. Escape `&` → `\&` before using content as a replacement string.
- id: build-docs-sh-esc-must-wrap-every-substitution-replacement
  title: build-docs.sh esc() must wrap every substitution replacement
  body: |
    The `esc()` helper in `scripts/build-docs.sh` escapes `&` → `\&` before every bash string substitution call. Omitting it on any substitution silently corrupts HTML entities. This is a mandatory pipeline invariant; the comment block above the substitution calls documents it. See: `Bash ${var//pat/repl} treats & in replacement as matched text`.
- id: clap-empty-string-normalisation-belongs-at-dispatch-boundary
  title: Clap empty-string normalisation belongs at dispatch boundary
  body: |
    Clap `value_delimiter` + `--arg ""` hands back `[""]`, not `[]`. Unit tests miss this (they receive `&[String]` directly and never exercise the clap parse path); only CLI integration tests surface it. Normalise empty strings at dispatch in `main.rs`, not inside the library verb, to keep the library contract clean.
- id: triage-prose-dep-reconciliation-is-a-mechanical-scan
  title: '`backlog lint-dependencies` detects prose-dep drift'
  body: |
    `state backlog lint-dependencies <PLAN_DIR>` reports drift between prose task-id mentions in task descriptions and structured `dependencies:` fields. Byte-scan whole-word matching; `[a-zA-Z0-9_-]` chars are id-body, any other byte is a boundary. Output is `LintReport`/`TaskDrift` serde types (YAML/JSON). Linter output is advisory, not authoritative; triage uses `set-dependencies` to reconcile. Triage prompt leads with a **Preflight** directive instructing the LLM to run the linter before triage work.
- id: analyse-work-stale-status-repair-is-a-mechanical-scan
  title: '`repair-stale-statuses` exits 1 on drift, 0 on clean'
  body: |
    `src/state/backlog/repair_stale_statuses.rs` exposes `analyse_repairs` and `run_repair_stale_statuses`; types `Repair`, `RepairReport`, `RepairReason`. Flips stale in-progress/blocked statuses. Exit 1 when repairs apply, 0 when no drift.
- id: datalog-evaluator-deferred-imperative-verbs-sufficient
  title: Datalog evaluator deferred; imperative verbs sufficient
  body: |
    A Datalog query evaluator for backlog queries was considered and explicitly deferred. All current LLM query needs (dep-traversal, count derivation) are satisfiable by purpose-built imperative Rust verbs; Datalog adds complexity without corresponding expressiveness gain.
- id: lint-dependencies-id-slug-collision-risk
  title: lint-dependencies id-slug collision risk
  body: |
    `lint_dependencies` word-boundary matching will false-match any task id that coincides with a common English word; every occurrence of that word in any task description is reported as drift. Risk is low with current slug generation (ids are long title-derived strings), but audit `allocate_id` if very short ids appear in practice.
- id: backlog-transitions-token-computed-by-src-backlog-transitions-rs
  title: '{{BACKLOG_TRANSITIONS}} token computed by src/backlog_transitions.rs'
  body: |
    `src/backlog_transitions.rs` diffs `backlog.yaml` at the work-baseline SHA against the current state. Covers status flips, result additions/modifications, added/deleted tasks, dependency changes, and handoff changes. Soft-fails to a human-readable placeholder on any error. Wired into `phase_loop.rs` `AnalyseWork` branch alongside `{{WORK_TREE_STATUS}}`; `analyse-work.md` presents the block as context for understanding what moved — the commit title must describe the shape of the changes (e.g., "Extract auth module", "Remove deprecated sync path"), not cite task ids. The commits.yaml authoring step in `analyse-work.md` explicitly forbids task ids in commit titles or bodies.
- id: work-baseline-is-prior-triage-commit-triage-additions-bleed-into-backlog-transitions
  title: Work-baseline is prior triage commit; triage additions bleed into {{BACKLOG_TRANSITIONS}}
  body: |
    The work-baseline SHA is captured at the triage commit (end of the previous cycle), not at session start. Triage additions from the prior cycle therefore appear in the `{{BACKLOG_TRANSITIONS}}` diff alongside this cycle's work changes. `analyse-work.md` includes a caveat about this. A cleaner fix requires a separate session-start baseline snapshot. See: `Work-baseline seeded atomically in the triage commit`.
- id: llm-reasoning-preamble-in-reflect-dream-triage-is-a-preserved-feature
  title: LLM reasoning preamble in reflect/dream/triage is a preserved feature
  body: |
    The LLM-authored prose preamble above the label list in reflect, dream, and triage is intentional — it carries the LLM's reasoning, not just the action list. Preserve it across prompt and renderer changes: label-rendering code replaces only the label block, not the whole output; `format_result_text` must not filter paragraph text, only structural noise (`---` separators, stray code fences). Output-format sections in `defaults/phases/{reflect,dream,triage}.md` must explicitly list every intent label the LLM is expected to emit in the preamble — omitting the list causes the LLM to silently drop them. `format_result_text` handles all intent labels; a missing label in output is always a prompt omission, not a renderer gap.
- id: run-create-pre-seeds-plan-dir-in-rust-before-llm-spawn
  title: run_create pre-seeds plan dir in Rust before LLM spawn
  body: |
    `src/create.rs` scaffolds the plan directory — creating `backlog.yaml`, `memory.yaml`, and related plan-state files — via CLI calls before the create-plan LLM spawn. Eliminates format drift between LLM-authored YAML and CLI-serialised YAML; `defaults/create-plan.md` carries no scaffolding instructions. See: `Pre-initialise output file before CLI-driven spawn`.
- id: headless-output-filters-hr-lines-in-rust
  title: Headless output filters `---` HR lines in Rust
  body: |
    `src/format.rs` strips bare `---` horizontal-rule lines from headless phase output (reflect, dream, triage). Only `---` is filtered; `***` and `___` variants are not.
- id: planrowcounts-injects-unblocked-blocked-received-into-survey
  title: PlanRowCounts injects unblocked/blocked/received into survey
  body: |
    `PlanRowCounts { unblocked, blocked, received }` lives in `state::backlog::schema`. `BacklogFile::plan_row_counts()` computes all three in one dep-traversal pass. `inject_plan_row_counts()` in `survey/schema.rs` writes them onto `PlanRow` across cold, incremental, and `is_noop` fast paths. Survey prompts forbid the LLM from emitting these fields. See: `survey blocked count is status-blocked-or-dep-unmet union`; `survey received count is handoff-based not session-diff`.
- id: survey-received-count-is-handoff-based-not-session-diff
  title: survey received count is handoff-based not session-diff
  body: |
    `PlanRow.received` counts tasks in the current backlog that carry handoff data (a `[HANDOFF]` block). It is NOT the count of tasks that transitioned to in_progress/done this cycle. `SessionRecord` carries only id/timestamp/phase/body — no structured backlog snapshot — making a cycle-diff computation impossible. See: `PlanRowCounts injects unblocked/blocked/received into survey`.
- id: survey-blocked-count-is-status-blocked-or-dep-unmet-union
  title: survey blocked count is status-blocked-or-dep-unmet union
  body: |
    `PlanRow.blocked` (computed by `plan_row_counts()`) counts tasks with `status=blocked` OR `status=not_started` with at least one unmet dependency. Matches the `blocked` column key in `src/survey/render.rs:20`. Narrow `status==blocked`-only definitions undercount. See: `PlanRowCounts injects unblocked/blocked/received into survey`.
- id: analyse-work-writes-commits-yaml-git-commit-work-applies-it
  title: Analyse-work writes commits.yaml; git-commit-work applies it
  body: |
    `analyse-work.md` step 9 writes a `commits.yaml` spec (ordered `{paths, message}` list) covering the full work diff. `GitCommitWork` calls `apply_commits_spec` in `src/git.rs`, applies each commit scoped to the project subtree, then removes the spec file before staging to prevent self-inclusion. Fallback on missing/malformed/empty spec: single catch-all commit of the whole subtree. Plan-state is folded into the first/only source commit by default; no separate plan-state commit is produced. See: `Analyse-work commits all non-plan paths`.
- id: phase-summary-render-computes-structural-labels-only
  title: phase-summary render computes structural labels only
  body: |
    `state phase-summary render` computes structural labels only. Intent-required labels (e.g., a purposeful `[REPRIORITISED]`) are excluded because a diff alone cannot distinguish a deliberate reorder from an accidental one; the LLM preamble carries that reasoning. Structural label sets: `[DONE]`, `[NEW]`, `[OBSOLETE]`, `[REPRIORITISED]` (triage); `[NEW]`, `[OBSOLETE]`, `[STALE]` (reflect/dream); `[STATS]` (dream). Implementation in `src/phase_summary.rs`. See: `LLM reasoning preamble in reflect/dream/triage is a preserved feature`.
- id: phase-summary-render-prompt-wiring-needs-orchestrator-baseline
  title: Phase prompts invoke `phase-summary render` via CLI directive
  body: |
    `defaults/phases/{reflect,dream,triage}.md` `## Output format` sections each contain a single CLI directive: `ravel-lite state phase-summary render {{PLAN}} --phase <phase> --baseline $(cat {{PLAN}}/<phase>-baseline 2>/dev/null || echo "")`. Emitting that directive's output verbatim is the LLM's only structural obligation; the narrative preamble and intent-required labels remain the LLM's authoring responsibility. Baseline wiring: `GitCommitWork` → `reflect-baseline`; `GitCommitReflect` → `dream-baseline` (or `triage-baseline` when skipping dream); `GitCommitDream` → `triage-baseline`; `GitCommitTriage` → `work-baseline`.
- id: each-phase-baseline-holds-the-sha-from-the-preceding-commit
  title: Each <phase>-baseline holds the SHA from the preceding commit
  body: |
    Each `<phase>-baseline` file holds the commit SHA from just before that phase started — written by the preceding `git-commit-*` step, not by the phase itself. Mapping: `reflect-baseline` ← `GitCommitWork`; `dream-baseline` ← `GitCommitReflect`; `triage-baseline` ← `GitCommitDream` (or `GitCommitReflect` when `should_dream` is false); `work-baseline` ← `GitCommitTriage`. Enables `state phase-summary render --baseline $(cat <phase>-baseline)` calls from phase prompts.
- id: init-rs-drift-sentinel-checks-phase-prompts-for-state-phase-summary-render
  title: '`init.rs` drift sentinel checks phase prompts for `state phase-summary render`'
  body: |
    `src/init.rs` contains a drift-guard sentinel asserting phase prompt templates include the substring `state phase-summary render`. Any change to how phase prompts emit their output requires updating this sentinel.
- id: ops-log-yaml-mechanism-for-intent-label-capture-deferred
  title: ops.log.yaml mechanism for intent-label capture (deferred)
  body: |
    `src/phase_summary.rs:21-23` docstring describes an `ops.log.yaml` mechanism: mutating verbs record `--intent <label>` and `--reason "<text>"` at mutation time; the renderer merges structural diff with intent records, removing the LLM's responsibility for emitting intent labels.

    This aligns with the "code over LLM for mechanical work" rule and is the proper long-term architecture for intent-label capture.

    **Deferred** because intent is currently *reasoning* (the LLM is the right author); the prompt-level fix in `restore-intent-label-richness-in-headless-phase-preamble-for-action-renderer` is correct for now. Only worth pursuing if intent capture becomes truly mechanical — i.e., the verb caller already holds the intent value in hand before calling the verb, making LLM authorship redundant.
- id: triage-reprioritised-requires-an-llm-authored-reason
  title: Triage `[REPRIORITISED]` requires an LLM-authored reason
  body: |
    `defaults/phases/triage.md` requires a ` — <reason>` suffix on every `[REPRIORITISED]` action line. The renderer at `src/format.rs:134` classifies `REPRIORITISED` as `Intent::Changed`; a missing reason collapses to single-row output with no dim reason row. See: `action-lines-split-title-reason-into-two-row-layout`.
- id: dead-code-grep-must-include-tests-scope
  title: Dead-code grep must include tests/ scope
  body: |
    A code path that writes no production output may remain live through test fixture side-effects. Precondition greps for dead-code tasks must include `tests/`; production-source-only searches produce false negatives.
- id: latest-session-md-highlight-rule-targets-wrong-filename
  title: PHASE_HIGHLIGHTS labels unverified end-to-end despite .yaml fix
  body: |
    Four `PHASE_HIGHLIGHTS` regex patterns in `src/format.rs` target `.yaml` extensions (fixed from `.md`). `format_tool_call` matches only `Write`/`Edit` tool paths; ravel-lite state commands write via `--body-file <tmp>` with no file extension, and Bash calls carry no shell-redirect markers. Whether the TUI labels actually fire on real runs is unverified. End-to-end verification is a follow-up.
- id: tests-mirroring-stale-impl-values-cannot-detect-drift
  title: Tests mirroring stale impl values cannot detect drift
  body: |
    When a test hardcodes the same incorrect string as the implementation (e.g., a stale filename extension), both pass and the bug is invisible. The test only exposes the bug when the implementation is corrected — it then fails, revealing its own co-contamination. Test inputs must not copy internal implementation strings; prefer on-disk golden paths or independently-authored constants.
