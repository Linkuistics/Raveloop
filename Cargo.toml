[package]
name = "ravel-lite"
version = "0.1.0"
edition = "2021"
description = "An orchestration loop for LLM development cycles"

[dependencies]
tokio = { version = "1", features = ["full"] }
ratatui = "0.30"
crossterm = "0.29"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
indexmap = { version = "2", features = ["serde"] }
anyhow = "1"
async-trait = "0.1"
clap = { version = "4", features = ["derive"] }
regex = "1"
once_cell = "1"
dirs = "5"

[dev-dependencies]
tempfile = "3"

[lints.rust]
warnings = "deny"
